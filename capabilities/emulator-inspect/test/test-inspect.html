<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试 emulator-inspect 能力</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
    <l-m
      src="/capabilities/capability-diagnosis/src/capability-diagnosis.html"
    ></l-m>
    <l-m src="/comps/cap-request/cap-request.html"></l-m>
  </head>
  <body>
    <capability-diagnosis label="测试 emulator-inspect 能力">
      <iframe src="./test-cv.html" frameborder="0" slot="emulator"></iframe>
      <cap-request>
        <template
          name="emulator-inspect"
          cid="inspect-01"
          data-xpath="/html/body"
          desc="获取模拟器内的 body 下的元素"
        >
        </template>
      </cap-request>
      <template result cid="inspect-01">
        <script type="module">
          export default async function (result) {
            // 验证返回结果包含必要字段
            const hasRequiredFields =
              result.tag &&
              result.attrs &&
              Array.isArray(result.childs) &&
              result.styles &&
              result.rect;

            // 验证 body 元素有一个 div 子元素
            const hasCorrectChild =
              result.childs.length === 1 && result.childs[0].tag === "div";

            return {
              assert: hasRequiredFields && hasCorrectChild,
              content: result,
            };
          }
        </script>
      </template>
    </capability-diagnosis>
  </body>
</html>
