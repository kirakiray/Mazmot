<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <l-m src="/capabilities/test-capability/src/test-capability.html"></l-m>


    <test-capability label="测试文件系统完整功能">
      <cap-request>
        <template
          name="fs"
          cid="fs-01"
          desc="创建测试目录"
          data-mode="mkdir"
          data-path="mazmot/test"
        >
        </template>

        <template
          name="fs"
          cid="fs-02"
          desc="写入文件1"
          data-mode="write"
          data-path="mazmot/test/test1.txt"
          data-content="hello world"
        >
        </template>

        <template
          name="fs"
          cid="fs-03"
          desc="检查文件是否存在"
          data-mode="exists"
          data-path="mazmot/test/test1.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-04"
          desc="获取文件信息"
          data-mode="info"
          data-path="mazmot/test/test1.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-05"
          desc="列出目录内容"
          data-mode="list"
          data-path="mazmot/test"
        >
        </template>

        <template
          name="fs"
          cid="fs-06"
          desc="复制文件"
          data-mode="copy"
          data-path="mazmot/test/test1.txt"
          data-target-path="mazmot/test"
          data-target-name="test1_copy.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-07"
          desc="创建备份目录"
          data-mode="mkdir"
          data-path="mazmot/backup"
        >
        </template>

        <template
          name="fs"
          cid="fs-08"
          desc="移动文件到备份目录"
          data-mode="move"
          data-path="mazmot/test/test1.txt"
          data-target-path="mazmot/backup"
          data-target-name="test1_backup.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-09"
          desc="读取备份文件"
          data-mode="read"
          data-path="mazmot/backup/test1_backup.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-10"
          desc="读取复制文件"
          data-mode="read"
          data-path="mazmot/test/test1_copy.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-11"
          desc="删除测试文件"
          data-mode="delete"
          data-path="mazmot/test/test1_copy.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-12"
          desc="删除备份文件"
          data-mode="delete"
          data-path="mazmot/backup/test1_backup.txt"
        >
        </template>

        <template
          name="fs"
          cid="fs-13"
          desc="删除测试目录"
          data-mode="delete"
          data-path="mazmot/test"
        >
        </template>

        <template
          name="fs"
          cid="fs-14"
          desc="删除备份目录"
          data-mode="delete"
          data-path="mazmot/backup"
        >
        </template>

        <template
          name="fs"
          cid="fs-15"
          desc="验证文件已删除"
          data-mode="exists"
          data-path="mazmot/test/test1.txt"
        >
        </template>
      </cap-request>

      <template result cid="fs-01">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `创建目录结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-02">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `写入结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-03">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `文件存在: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-04">
        <script type="module">
          export default async function (result) {
            return {
              assert: result.kind === "file" && result.name === "test1.txt",
              content: `文件信息: ${JSON.stringify(result)}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-05">
        <script type="module">
          export default async function (result) {
            return {
              assert: Array.isArray(result) && result.length > 0,
              content: `目录内容: ${JSON.stringify(result)}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-06">
        <script type="module">
          export default async function (result) {
            return {
              assert:
                result.kind === "file" && result.name === "test1_copy.txt",
              content: `复制结果: ${JSON.stringify(result)}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-07">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `创建备份目录结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-08">
        <script type="module">
          export default async function (result) {
            return {
              assert:
                result.kind === "file" && result.name === "test1_backup.txt",
              content: `移动结果: ${JSON.stringify(result)}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-09">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === "hello world",
              content: `读取备份文件结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-10">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === "hello world",
              content: `读取复制文件结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-11">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `删除测试文件结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-12">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `删除备份文件结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-13">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `删除测试目录结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-14">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `删除备份目录结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-15">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === false,
              content: `文件已删除验证: ${result}`,
            };
          }
        </script>
      </template>
    </test-capability>
  </body>
</html>
