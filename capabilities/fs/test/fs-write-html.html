<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试写入HTML文件</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <l-m src="/capabilities/test-capability/src/test-capability.html"></l-m>

    <test-capability label="测试写入HTML文件">
      <cap-request>
        <template
          name="fs"
          cid="fs-html-01"
          desc="创建测试目录"
          data-mode="mkdir"
          data-path="mazmot/test"
        >
        </template>

        <template
          name="fs"
          cid="fs-html-02"
          desc="写入HTML文件"
          data-mode="write"
          data-path="mazmot/test/index.html"
          data-content="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;zh-CN&quot;&gt;
&lt;head&gt;
  &lt;meta charset=&quot;UTF-8&quot;&gt;
  &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
  &lt;title&gt;Welcome to Mazmot&lt;/title&gt;
  &lt;style&gt;
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      text-align: center;
    }
    h1 {
      color: #667eea;
      font-size: 3em;
      margin-bottom: 20px;
      font-weight: 700;
    }
    p {
      color: #666;
      font-size: 1.2em;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 40px;
    }
    .feature {
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }
    .feature:hover { transform: translateY(-5px); }
    .feature-icon { font-size: 2em; margin-bottom: 10px; }
    .feature-title { font-weight: 600; color: #333; margin-bottom: 5px; }
    .feature-desc { font-size: 0.9em; color: #888; }
    @media (max-width: 768px) {
      .features { grid-template-columns: 1fr; }
      h1 { font-size: 2em; }
    }
  &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
  &lt;div class=&quot;container&quot;&gt;
    &lt;h1&gt;🚀 Mazmot&lt;/h1&gt;
    &lt;p&gt;一个现代化的文件系统操作演示页面，展示了如何使用 NoneOS Core 进行文件操作。&lt;/p&gt;
    &lt;div class=&quot;features&quot;&gt;
      &lt;div class=&quot;feature&quot;&gt;
        &lt;div class=&quot;feature-icon&quot;&gt;📝&lt;/div&gt;
        &lt;div class=&quot;feature-title&quot;&gt;文件写入&lt;/div&gt;
        &lt;div class=&quot;feature-desc&quot;&gt;支持写入各种文件格式&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;feature&quot;&gt;
        &lt;div class=&quot;feature-icon&quot;&gt;📖&lt;/div&gt;
        &lt;div class=&quot;feature-title&quot;&gt;文件读取&lt;/div&gt;
        &lt;div class=&quot;feature-desc&quot;&gt;快速读取文件内容&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;feature&quot;&gt;
        &lt;div class=&quot;feature-icon&quot;&gt;🔄&lt;/div&gt;
        &lt;div class=&quot;feature-title&quot;&gt;文件管理&lt;/div&gt;
        &lt;div class=&quot;feature-desc&quot;&gt;复制、移动、删除文件&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/body&gt;
&lt;/html&gt;"
        >
        </template>
      </cap-request>

      <template result cid="fs-html-01">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `创建目录结果: ${result}`,
            };
          }
        </script>
      </template>

      <template result cid="fs-html-02">
        <script type="module">
          export default async function (result) {
            return {
              assert: result === true,
              content: `写入HTML文件结果: ${result}`,
            };
          }
        </script>
      </template>
    </test-capability>
  </body>
</html>
