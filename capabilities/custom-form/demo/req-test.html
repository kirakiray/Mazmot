<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <l-m src="/capabilities/test-cap/src/test-cap.html"></l-m>

    <test-cap label="测试 fetch-url 能力">
      <cap-request>
        <template name="custom-form" cid="custom-form-01" desc="自定义提交表单">
          [ { "type": "radio", "name": "gender", "desc": "请选择您的性别",
          "required": true, "defaultValue": "male", "options": [ { "label":
          "男", "value": "male" }, { "label": "女", "value": "female" } ] }, {
          "type": "text", "name": "name", "desc": "姓名", "required": true,
          "placeholder": "请输入您的姓名" }, { "type": "textarea", "name":
          "bio", "desc": "个人简介", "placeholder": "请输入个人简介",
          "maxlength": 200 }, { "type": "select", "name": "country", "desc":
          "国家/地区", "required": true, "placeholder": "请选择国家", "options":
          [ { "label": "中国", "value": "cn" }, { "label": "美国", "value": "us"
          }, { "label": "日本", "value": "jp" } ] }, { "type": "checkbox",
          "name": "hobbies", "desc": "兴趣爱好", "required": true,
          "defaultValue": ["reading"], "options": [ { "label": "阅读", "value":
          "reading" }, { "label": "运动", "value": "sports" }, { "label":
          "音乐", "value": "music" }, { "label": "旅行", "value": "travel" } ]
          }, { "type": "switch", "name": "notifications", "desc": "接收通知",
          "label": "启用通知", "defaultValue": true }, { "type": "submit",
          "name": "提交" }, { "type": "cancel", "name": "取消" } ]
        </template>
      </cap-request>
      <template result cid="custom-form-01">
        <script type="module">
          export default async function (result) {
            // 直接获取内容

            return {
              assert: true,
              content: result,
            };
          }
        </script>
      </template>
    </test-cap>
  </body>
</html>
