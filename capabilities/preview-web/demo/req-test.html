<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Web 能力测试</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <l-m src="/capabilities/test-capability/src/test-capability.html"></l-m>

    <test-capability label="测试 preview-web 能力">
      <cap-request>
        <template name="preview-web" cid="preview-web-01" desc="预览网页内容">
          { "url": "/capabilities/preview-web/demo/sample-page.html", "title":
          "示例网页预览", "width": "100%", "height": "600px" }
        </template>
      </cap-request>
      <template result cid="preview-web-01">
        <script type="module">
          export default async function (result) {
            return {
              assert: result.success === true,
              content: result,
            };
          }
        </script>
      </template>
    </test-capability>
  </body>
</html>
