<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例网页</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        margin: 0;
        padding: 40px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
      }
      h1 {
        font-size: 36px;
        margin-bottom: 20px;
      }
      p {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 20px;
      }
      .feature-list {
        list-style: none;
        padding: 0;
      }
      .feature-list li {
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 16px;
      }
      .feature-list li:last-child {
        border-bottom: none;
      }
      .button {
        display: inline-block;
        padding: 12px 24px;
        background: white;
        color: #667eea;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        margin-top: 20px;
        transition: transform 0.2s;
      }
      .button:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎉 欢迎使用 Preview Web</h1>
      <p>
        这是一个示例网页，用于演示 preview-web 能力的预览功能。
        你可以在这里看到网页的实际渲染效果。
      </p>
      
      <h2>✨ 主要特性</h2>
      <ul class="feature-list">
        <li>✅ 支持本地网页文件预览</li>
        <li>✅ 实时渲染和交互</li>
        <li>✅ 支持自定义窗口大小</li>
        <li>✅ 提供刷新和新窗口打开功能</li>
        <li>✅ 错误处理和加载状态显示</li>
      </ul>
      
      <h2>🎮 交互测试</h2>
      <p>点击下面的按钮测试交互功能：</p>
      <button class="button" onclick="alert('按钮点击成功！')">
        点击测试
      </button>
      
      <p style="margin-top: 30px; font-size: 14px; opacity: 0.8;">
        当前时间：<span id="time"></span>
      </p>
    </div>
    
    <script>
      function updateTime() {
        const now = new Date();
        document.getElementById('time').textContent = now.toLocaleString('zh-CN');
      }
      updateTime();
      setInterval(updateTime, 1000);
    </script>
  </body>
</html>
