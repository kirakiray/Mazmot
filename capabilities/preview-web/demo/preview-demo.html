<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Web 演示组件</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <o-page src="../src/preview.html"></o-page>
    <script type="module">
      await new Promise((resolve) => setTimeout(resolve, 300));

      const page = $("o-page");

      const config = {
        url: "/capabilities/preview-web/demo/sample-page.html",
        title: "示例网页预览",
        width: "100%",
        height: "600px",
      };

      page.init(config);

      page.on("load", (e) => {
        console.log("Preview loaded:", e.data);
      });

      page.on("error", (e) => {
        console.error("Preview error:", e.data);
      });
    </script>
  </body>
</html>
