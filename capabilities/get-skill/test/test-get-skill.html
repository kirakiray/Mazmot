<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试 get-skill 能力</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <l-m src="/capabilities/test-capability/src/test-capability.html"></l-m>

    <test-capability label="测试获取所有技能列表">
      <cap-request>
        <template
          name="get-skill"
          cid="get-skill-01"
          desc="获取所有技能列表"
          data-all="true" 
        >
        </template>
      </cap-request>
      <template result cid="get-skill-01">
        <script type="module">
          export default async function (result) {
            return {
              assert: Array.isArray(result) && result.length > 0,
              content: `获取到 ${result.length} 个技能`,
            };
          }
        </script>
      </template>
    </test-capability>

    <test-capability label="测试获取指定技能详情">
      <cap-request>
        <template
          name="get-skill"
          cid="get-skill-02"
          desc="获取 ofajs-docs 技能详情"
          data-name="ofajs-docs"
        >
        </template>
      </cap-request>
      <template result cid="get-skill-02">
        <script type="module">
          export default async function (result) {
            const hasContent = result.name === "ofajs-docs" && result.content;
            return {
              assert: hasContent,
              content: hasContent ? "成功获取技能详情" : "获取失败",
            };
          }
        </script>
      </template>
    </test-capability>
  </body>
</html>
