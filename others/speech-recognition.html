<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeechRecognition API 语音识别</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: 8px;
    }

    .status {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 14px;
      color: #555;
    }

    .status.ready {
      background: #d4edda;
      color: #155724;
    }

    .status.recording {
      background: #f8d7da;
      color: #721c24;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #recordBtn {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }

    #recordBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
    }

    #recordBtn.recording {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .settings {
      margin-bottom: 20px;
    }

    .setting-item {
      margin-bottom: 15px;
    }

    .setting-item label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .setting-item select,
    .setting-item input[type="checkbox"] {
      margin-right: 8px;
    }

    .setting-item select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }

    .result-section {
      margin-top: 20px;
    }

    .result-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: block;
    }

    .result-box {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      padding: 20px;
      min-height: 150px;
      font-size: 16px;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .result-box:empty::before {
      content: '识别结果将显示在这里...';
      color: #999;
    }

    .interim-result {
      background: #e7f3ff;
      border: 1px solid #b6d4fe;
      border-radius: 8px;
      padding: 12px;
      margin-top: 15px;
      font-size: 14px;
      color: #084298;
      min-height: 60px;
    }

    .interim-result:empty::before {
      content: '实时识别结果将显示在这里...';
      color: #6ea8fe;
    }

    .info-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #856404;
    }

    .info-box ul {
      margin-top: 8px;
      margin-left: 20px;
    }

    .info-box li {
      margin-bottom: 4px;
    }

    .copy-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .copy-btn:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 SpeechRecognition API<span class="badge">浏览器原生</span></h1>
    <p class="subtitle">使用浏览器内置的 Web Speech API 进行实时语音识别</p>

    <div class="info-box">
      ℹ️ <strong>注意事项：</strong>
      <ul>
        <li>需要 Chrome、Edge 或 Safari 浏览器支持</li>
        <li>需要网络连接（识别在云端进行）</li>
        <li>支持多种语言识别</li>
        <li>实时显示识别结果</li>
      </ul>
    </div>

    <div id="status" class="status ready">✅ 准备就绪，点击开始录音按钮开始识别</div>

    <div class="settings">
      <div class="setting-item">
        <label for="languageSelect">识别语言：</label>
        <select id="languageSelect">
          <option value="zh-CN">中文（简体）</option>
          <option value="zh-TW">中文（繁体）</option>
          <option value="en-US">英语（美国）</option>
          <option value="en-GB">英语（英国）</option>
          <option value="ja-JP">日语</option>
          <option value="ko-KR">韩语</option>
          <option value="fr-FR">法语</option>
          <option value="de-DE">德语</option>
          <option value="es-ES">西班牙语</option>
          <option value="ru-RU">俄语</option>
        </select>
      </div>

      <div class="setting-item">
        <label>
          <input type="checkbox" id="continuousCheck" checked>
          持续识别（连续监听）
        </label>
      </div>

      <div class="setting-item">
        <label>
          <input type="checkbox" id="interimResultsCheck" checked>
          显示中间结果
        </label>
      </div>
    </div>

    <div class="controls">
      <button id="recordBtn">🎙️ 开始录音</button>
    </div>

    <div class="result-section">
      <label class="result-label">最终识别结果：</label>
      <div class="result-box" id="finalResult"></div>
      <button class="copy-btn" id="copyBtn" style="display: none;">📋 复制结果</button>
    </div>

    <div class="result-section">
      <label class="result-label">实时识别结果：</label>
      <div class="interim-result" id="interimResult"></div>
    </div>
  </div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = '❌ 您的浏览器不支持 SpeechRecognition API，请使用 Chrome、Edge 或 Safari';
      document.getElementById('recordBtn').disabled = true;
    } else {
      const statusEl = document.getElementById('status');
      const recordBtn = document.getElementById('recordBtn');
      const finalResultEl = document.getElementById('finalResult');
      const interimResultEl = document.getElementById('interimResult');
      const languageSelect = document.getElementById('languageSelect');
      const continuousCheck = document.getElementById('continuousCheck');
      const interimResultsCheck = document.getElementById('interimResultsCheck');
      const copyBtn = document.getElementById('copyBtn');

      let recognition = null;
      let isRecording = false;
      let finalTranscript = '';

      function initRecognition() {
        if (recognition) {
          recognition.stop();
        }

        recognition = new SpeechRecognition();
        recognition.lang = languageSelect.value;
        recognition.continuous = continuousCheck.checked;
        recognition.interimResults = interimResultsCheck.checked;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          isRecording = true;
          recordBtn.textContent = '⏹️ 停止录音';
          recordBtn.classList.add('recording');
          statusEl.className = 'status recording';
          statusEl.textContent = '🔴 正在录音... 请说话';
        };

        recognition.onresult = (event) => {
          let interimTranscript = '';
          
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            
            if (event.results[i].isFinal) {
              finalTranscript += transcript + '\n';
            } else {
              interimTranscript += transcript;
            }
          }

          finalResultEl.textContent = finalTranscript;
          interimResultEl.textContent = interimTranscript;
          
          if (finalTranscript) {
            copyBtn.style.display = 'inline-block';
          }
        };

        recognition.onerror = (event) => {
          let errorMessage = '识别出错: ';
          
          switch(event.error) {
            case 'no-speech':
              errorMessage += '未检测到语音';
              break;
            case 'audio-capture':
              errorMessage += '未找到麦克风';
              break;
            case 'not-allowed':
              errorMessage += '麦克风权限被拒绝';
              break;
            case 'network':
              errorMessage += '网络错误';
              break;
            case 'aborted':
              errorMessage += '识别被中止';
              break;
            default:
              errorMessage += event.error;
          }
          
          statusEl.className = 'status error';
          statusEl.textContent = '❌ ' + errorMessage;
          stopRecording();
        };

        recognition.onend = () => {
          if (isRecording && continuousCheck.checked) {
            try {
              recognition.start();
            } catch (e) {
              stopRecording();
            }
          } else {
            stopRecording();
          }
        };
      }

      function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎙️ 开始录音';
        recordBtn.classList.remove('recording');
        statusEl.className = 'status ready';
        statusEl.textContent = '✅ 识别完成，点击开始录音按钮继续识别';
        interimResultEl.textContent = '';
      }

      recordBtn.addEventListener('click', () => {
        if (!isRecording) {
          initRecognition();
          finalTranscript = '';
          finalResultEl.textContent = '';
          interimResultEl.textContent = '';
          copyBtn.style.display = 'none';
          
          try {
            recognition.start();
          } catch (error) {
            statusEl.className = 'status error';
            statusEl.textContent = '❌ 启动识别失败: ' + error.message;
          }
        } else {
          if (recognition) {
            recognition.stop();
          }
          stopRecording();
        }
      });

      languageSelect.addEventListener('change', () => {
        if (isRecording) {
          initRecognition();
          try {
            recognition.start();
          } catch (error) {
            console.error('Error restarting recognition:', error);
          }
        }
      });

      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(finalTranscript.trim()).then(() => {
          const originalText = copyBtn.textContent;
          copyBtn.textContent = '✅ 已复制';
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 2000);
        }).catch(err => {
          alert('复制失败: ' + err.message);
        });
      });

      window.addEventListener('beforeunload', () => {
        if (recognition && isRecording) {
          recognition.stop();
        }
      });
    }
  </script>
</body>
</html>
