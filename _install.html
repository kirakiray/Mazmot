<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Install</title>
    <script src="https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.js#debug"></script>
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Microsoft Yahei,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji;
      }

      .mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--md-sys-color-surface);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <div class="mask">
      <nos-version auto-install></nos-version>
    </div>

    <script type="module">
      const load = lm(import.meta);

      $("nos-version").on("installed", () => {
        // 若来源页带了 redirect 参数，安装完成后回到原页面（如分享链接）
        const params = new URLSearchParams(location.search);
        const raw = params.get("redirect");
        let target = "/";
        if (raw) {
          try {
            const decoded = decodeURIComponent(raw);
            // 仅允许站内相对路径，避免 open redirect 风险
            if (decoded.startsWith("/") && !decoded.startsWith("//")) {
              target = decoded;
            }
          } catch (e) {
            // 解码失败则忽略
          }
        }
        location.href = target;
      });

      await load("https://core.noneos.com/nos-tool/comps/nos-version.html");
    </script>
  </body>
</html>
