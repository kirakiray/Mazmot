name: Browser Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start static server
        run: |
          npx http-server -p 30031 -c-1 --cors &
          sleep 2

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:30031 > /dev/null 2>&1; then
              echo "Static server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Static server did not start in time"
          exit 1

      - uses: ofajs/sibyl-test@v1
        with:
          browsers: 'chrome'

  test-firefox:
