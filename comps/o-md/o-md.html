<template component>
  <link rel="stylesheet" href="./github-markdown.css" />
  <link rel="stylesheet" href="./hljs.css" />

  <div class="markdown-body"></div>

  <script>
    export default async ({ load, url }) => {
      const { marked } = await load(
        "https://cdn.jsdelivr.net/npm/marked@17.0.1/lib/marked.esm.js",
      );

      const { default: hljs } = await load(
        "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/+esm",
      );

      marked.use({
        renderer: {
          code({ text, lang }) {
            const code = text || "";
            const language = lang || null;

            if (language && hljs.getLanguage(language)) {
              try {
                const highlighted = hljs.highlight(code, { language }).value;
                return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
              } catch (e) {
                console.warn(`Highlight error for language ${language}:`, e);
              }
            }

            try {
              const highlighted = hljs.highlightAuto(code).value;
              return `<pre><code class="hljs">${highlighted}</code></pre>`;
            } catch (e) {
              console.warn("Auto highlight error:", e);
              return `<pre><code>${code}</code></pre>`;
            }
          },
        },
      });

      return {
        tag: "o-md",
        attrs: {
          src: null,
        },
        data: {},
        attached() {
          this._renderMarkdown();
        },
        proto: {
          _getMarkdownContent() {
            const pre = this.$("pre");
            if (pre) {
              return pre.text;
            }
            return this.text;
          },
          _renderMarkdown() {
            const container = this.shadow.$(".markdown-body");
            if (!container) return;

            const markdownText = this._getMarkdownContent();
            if (markdownText) {
              container.html = marked.parse(markdownText);
            }
          },
          _handleLinkClick(e) {
            let target = e.target;
            while (target && target.tagName !== "A") {
              target = target.parentElement;
            }

            if (!target || target.tagName !== "A") {
              return;
            }

            const href = target.getAttribute("href");

            if (href && href.toLowerCase().endsWith(".md")) {
              e.preventDefault();
              this.emit("click-md-link", {
                data: {
                  href: href,
                  originalEvent: e,
                },
              });
            }
          },
        },
      };
    };
  </script>
</template>
