<template component>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/group.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <style>
    :host {
      position: relative;
      display: block;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--md-sys-color-neutral);
      border-radius: 12px;
      padding: 8px 16px;
      margin-bottom: 12px;
      background-color: var(--md-sys-color-surface);
      transition: all 0.2s ease;
      box-shadow: 0 0 0 1px var(--md-sys-color-neutral-container);
    }
    .skill-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .skill-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .skill-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
    }
    .skill-description {
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.5;
    }
    .skill-action {
      display: flex;
      align-items: center;
    }
    .debug-info {
      margin-top: 12px;
      padding: 12px;
      background-color: var(--md-sys-color-neutral-container);
      border-radius: 8px;
      font-size: 12px;
      color: var(--md-sys-color-on-neutral-container);
      font-family: "SF Mono", Monaco, Consolas, monospace;
      overflow-x: auto;
    }
  </style>

  <p-button-group style="position: absolute; right: -24px; top: -24px">
    <p-button size="small" icon>
      <n-icon icon="line-md:play"></n-icon>
    </p-button>
    <p-button
      size="small"
      icon
      on:click="debugMode = !debugMode"
      variant="outlined"
    >
      <n-icon icon="carbon:debug"></n-icon>
    </p-button>
  </p-button-group>
  <o-fill :value="requests">
    <div>
      <div class="item">
        <div class="skill-icon">⚡</div>
        <div class="skill-content">
          <div class="skill-name">{{$data.skill || $data.name}}</div>
          <div class="skill-description">{{$data.description}}</div>
        </div>
        <div class="skill-action">
          <p-button
            icon
            attr:color="$data.done ? 'success' : 'primary'"
            size="small"
            attr:disabled="$data.running"
            on:click="$host.runSkill($data)"
          >
            <o-if :value="$data.running">
              <n-icon icon="line-md:loading-twotone-loop"></n-icon>
            </o-if>
            <o-if :value="!$data.running && $data.done">
              <n-icon icon="material-symbols:done-rounded"></n-icon>
            </o-if>
            <o-if :value="!$data.running && !$data.done">
              <n-icon icon="line-md:play"></n-icon>
            </o-if>
          </p-button>
        </div>
      </div>
      <o-if :value="$host.debugMode">
        <div class="debug-info">{{$data}}</div>
      </o-if>
    </div>
  </o-fill>
  <script>
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";

    export default async function ({ load }) {
      return {
        tag: "skill-request",
        data: {
          requests: [
            {
              name: "",
              description: "",
              running: false,
              done: false,
            },
          ],
          debugMode: false,
        },
        proto: {
          async runSkill(skillData) {
            if (skillData.running || skillData.done) return;

            skillData.running = true;
            skillData.done = false;

            try {
              const skillName = skillData.skill || skillData.name;
              const url = `/skills/${skillName}/main.js`;

              const module = await load(url);
              const skillRunner = module.default;
              const result = await skillRunner(skillData.opts);

              const paths = this.composedPath();
              let dialogueHost = paths.find(
                (ele) =>
                  ele.getAttribute &&
                  ele.getAttribute("dialogue-host") !== null,
              );

              if (!dialogueHost) {
                throw new Error("No dialogue host found");
              }

              dialogueHost = $(dialogueHost);
              await dialogueHost.responseAssistant(skillData, result);

              skillData.running = false;
              skillData.done = true;
            } catch (e) {
              skillData.running = false;
              throw e;
            }
          },
          async loadData() {
            try {
              const data = yaml.load(this.text);
              this.requests = data.map((item) => ({
                ...item,
                running: false,
                done: false,
              }));
            } catch (e) {
              console.error("Failed to load requests:", e);
            }
          },
        },
        async attached() {
          await this.loadData();
        },
      };
    }
  </script>
</template>
