<template component>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      position: relative;
      display: block;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .item {
      border: 1px solid var(--md-sys-color-neutral);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      background-color: var(--md-sys-color-surface);
      transition: all 0.2s ease;
      box-shadow: 0 0 0 1px var(--md-sys-color-neutral-container);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .item:hover {
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }
    .skill-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .skill-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .skill-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
    }
    .skill-description {
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.5;
    }
    .skill-action {
      display: flex;
      align-items: center;
    }
    .debug-info {
      margin-top: 12px;
      padding: 12px;
      background-color: var(--md-sys-color-neutral-container);
      border-radius: 8px;
      font-size: 12px;
      color: var(--md-sys-color-on-neutral-container);
      font-family: "SF Mono", Monaco, Consolas, monospace;
      overflow-x: auto;
    }
  </style>

  <p-button
    size="small"
    icon
    on:click="debugMode = !debugMode"
    variant="text"
    style="position: absolute; right: -24px; top: -24px"
  >
    ⚙
  </p-button>
  <o-fill :value="requests">
    <div class="item">
      <div class="skill-icon">⚡</div>
      <div class="skill-content">
        <div class="skill-name">{{$data.skill || $data.name}}</div>
        <div class="skill-description">{{$data.description}}</div>
      </div>
      <div class="skill-action">
        <p-button color="primary" size="small" on:click="$host.runSkill($data)">
          运行
        </p-button>
      </div>
    </div>
    <o-if :value="$host.debugMode">
      <div class="debug-info">{{$data}}</div>
    </o-if>
  </o-fill>
  <script>
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";

    export default async function ({ load }) {
      return {
        tag: "skill-request",
        data: {
          requests: [
            {
              name: "",
              description: "",
            },
          ],
          debugMode: false,
        },
        proto: {
          async runSkill(skillData) {
            const skillName = skillData.skill || skillData.name;
            const url = `/skills/${skillName}/main.js`;

            const module = await load(url);
            const skillRunner = module.default;
            const result = await skillRunner(skillData.opts);

            const paths = this.composedPath();
            let dialogueHost = paths.find(
              (ele) =>
                ele.getAttribute && ele.getAttribute("dialogue-host") !== null,
            );

            if (!dialogueHost) {
              throw new Error("No dialogue host found");
            }

            dialogueHost = $(dialogueHost);
            await dialogueHost.responseAssistant(skillData, result);
          },
          async loadData() {
            try {
              this.requests = yaml.load(this.text);
            } catch (e) {
              console.error("Failed to load requests:", e);
            }
          },
        },
        attached() {
          this.loadData();
        },
      };
    }
  </script>
</template>
