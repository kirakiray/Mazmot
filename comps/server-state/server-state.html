<template component>
  <style>
    :host {
      display: block;
      --server-state-gap: 12px;
    }

    .server-state-container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--server-state-gap);
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .server-list {
      --list-gap: 4px;
    }

    .server-list p-list-item {
      --list-item-leading-space: 12px;
      --list-item-trailing-space: 8px;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background-color: var(--md-sys-color-outline);
    }

    .status-dot[data-connected="true"] {
      background-color: var(--md-sys-color-success);
      box-shadow: 0 0 0 2px var(--md-sys-color-success-container);
    }

    .status-dot[data-connected="false"] {
      background-color: var(--md-sys-color-outline);
    }

    .server-url {
      font-family: monospace;
      word-break: break-all;
    }

    .server-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background-color: var(--md-sys-color-surface-container-highest);
    }

    .meta-badge.version {
      font-family: monospace;
    }

    .latency-value {
      font-variant-numeric: tabular-nums;
    }

    .latency-good {
      color: var(--md-sys-color-success);
    }

    .latency-medium {
      color: var(--md-sys-color-tertiary);
    }

    .latency-high {
      color: var(--md-sys-color-error);
    }

    .server-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      --icon-color: var(--md-sys-color-on-surface-variant);
    }

    .connect-btn:hover {
      --icon-color: var(--md-sys-color-success);
    }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
    }

    .error-state {
      padding: 12px;
      border-radius: 12px;
      background-color: var(--md-sys-color-error-container);
      color: var(--md-sys-color-on-error-container);
      font-size: 13px;
      margin-bottom: var(--server-state-gap);
    }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--md-sys-color-outline-variant);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%;
      animation: server-state-spin 0.8s linear infinite;
    }

    @keyframes server-state-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <l-m src="https://punch-ui-v2.pages.dev/packages/list/list.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>

  <div class="server-state-container">
    <div class="header">
      <h3 class="title">服务器状态</h3>
      <div class="actions">
        <p-button
          class="icon-btn"
          variant="text"
          icon
          size="s"
          on:click="refreshServers"
          title="刷新服务器状态"
        >
          <n-icon icon="mdi:refresh"></n-icon>
        </p-button>
      </div>
    </div>

    <o-if :value="error">
      <div class="error-state">{{error}}</div>
    </o-if>

    <o-if :value="loading">
      <div class="loading-row">
        <div class="spinner"></div>
        <span>正在加载服务器状态...</span>
      </div>
    </o-if>

    <o-if :value="!loading && serverList.length === 0">
      <div class="empty-state">暂无服务器配置</div>
    </o-if>

    <o-if :value="!loading && serverList.length > 0">
      <p-list class="server-list">
        <o-fill :value="serverList">
          <p-list-item>
            <span
              slot="prefix"
              class="status-dot"
              attr:data-connected="$data.connected"
              attr:title="$data.connected ? '已连接' : '未连接'"
            ></span>
            <span class="server-url">{{$data.url}}</span>
            <div secondary class="server-meta">
              <o-if :value="$data.connected">
                <span class="meta-badge version" title="服务器版本">
                  <n-icon icon="mdi:tag-outline"></n-icon>
                  {{$data.version || "未知版本"}}
                </span>
              </o-if>
              <o-if :value="$data.connected && $data.rtt !== null">
                <span
                  class="meta-badge latency-value"
                  class:latency-good="$data.latencyLevel === 'good'"
                  class:latency-medium="$data.latencyLevel === 'medium'"
                  class:latency-high="$data.latencyLevel === 'high'"
                  title="往返延迟"
                >
                  <n-icon icon="mdi:clock-outline"></n-icon>
                  {{$data.rtt}} ms
                </span>
              </o-if>
              <o-if :value="$data.testing">
                <span class="meta-badge">
                  <n-icon icon="mdi:loading"></n-icon>
                  测试中
                </span>
              </o-if>
              <o-if :value="!$data.connected">
                <span class="meta-badge">未连接</span>
              </o-if>
            </div>
            <div slot="suffix" class="server-actions">
              <o-if :value="!$data.connected">
                <p-button
                  class="icon-btn connect-btn"
                  variant="text"
                  icon
                  size="s"
                  on:click="$host.connectServer($event, $data.url)"
                  title="连接服务器"
                >
                  <n-icon icon="mdi:lan-connect"></n-icon>
                </p-button>
              </o-if>
            </div>
          </p-list-item>
        </o-fill>
      </p-list>
    </o-if>
  </div>

  <script>
    import { getUser } from "/nos/user/main.js";

    function getLatencyLevel(rtt) {
      if (rtt === null || rtt === undefined) return null;
      if (rtt < 100) return "good";
      if (rtt < 300) return "medium";
      return "high";
    }

    export default async () => {
      return {
        tag: "server-state",
        attrs: {
          namespace: "mazmot",
        },
        data: {
          loading: true,
          error: "",
          serverList: [],
        },
        async ready() {
          await this._initUser();
          await this.refreshServers();
        },
        attached() {
          this._bindLatencyListener();
          this._startLatencyMonitor();
        },
        detached() {
          this._unbindLatencyListener();
          this._stopLatencyMonitor();
        },
        watch: {
          namespace() {
            this._resetUser();
            this.refreshServers();
          },
        },
        proto: {
          async _initUser() {
            try {
              this._user = await getUser(this.namespace);
              this._userReady = true;
            } catch (err) {
              this._userReady = false;
              this.error = "初始化用户失败：" + (err.message || String(err));
              console.error("[server-state] 初始化用户失败：", err);
            }
          },
          async _resetUser() {
            this._unbindLatencyListener();
            this._stopLatencyMonitor();
            this._user = null;
            this._userReady = false;
            await this._initUser();
            this._bindLatencyListener();
            this._startLatencyMonitor();
          },
          _bindLatencyListener() {
            if (!this._user) return;
            this._latencyHandler = (event) => {
              const { url, rtt, oneWayLatency } = event.detail || {};
              this._updateServerLatency(url, rtt, oneWayLatency);
            };
            this._user.bind("latency_test", this._latencyHandler);
          },
          _unbindLatencyListener() {
            if (this._user && this._latencyHandler) {
              this._user.unbind("latency_test", this._latencyHandler);
              this._latencyHandler = null;
            }
          },
          _startLatencyMonitor() {
            if (!this._user) return;
            try {
              this._user.server.startLatencyMonitor(3000);
            } catch (err) {
              console.warn("[server-state] 启动延迟监测失败：", err);
            }
          },
          _stopLatencyMonitor() {
            if (!this._user) return;
            try {
              this._user.server.stopLatencyMonitor();
            } catch (err) {
              console.warn("[server-state] 停止延迟监测失败：", err);
            }
          },
          _updateServerLatency(url, rtt, oneWayLatency) {
            const target = this.serverList.find((s) => s.url === url);
            if (!target) return;
            target.rtt = typeof rtt === "number" ? Math.round(rtt) : null;
            target.oneWayLatency =
              typeof oneWayLatency === "number" ? Math.round(oneWayLatency) : null;
            target.latencyLevel = getLatencyLevel(target.rtt);
          },
          async refreshServers() {
            if (!this._userReady) {
              this.loading = false;
              return;
            }

            this.loading = true;
            this.error = "";

            try {
              const urls = await this._user.server.getServers();
              const connectedUrls = new Set(
                Array.isArray(this._user.server.connectedUrls)
                  ? this._user.server.connectedUrls
                  : [],
              );

              const list = urls.map((url) => ({
                url,
                connected: connectedUrls.has(url),
                version: "",
                rtt: null,
                oneWayLatency: null,
                latencyLevel: null,
                testing: false,
              }));

              this.serverList.length = 0;
              list.forEach((item) => this.serverList.push(item));

              // 对每个已连接的服务器补全版本和延迟
              await Promise.all(
                this.serverList.map((server) =>
                  server.connected ? this._probeServer(server) : Promise.resolve(),
                ),
              );
            } catch (err) {
              this.error = "获取服务器列表失败：" + (err.message || String(err));
              console.error("[server-state] 获取服务器列表失败：", err);
            } finally {
              this.loading = false;
            }
          },
          async _probeServer(server) {
            server.testing = true;
            try {
              const result = await this._user.server.testLatency(server.url);
              server.rtt =
                typeof result.rtt === "number" ? Math.round(result.rtt) : null;
              server.oneWayLatency =
                typeof result.oneWayLatency === "number"
                  ? Math.round(result.oneWayLatency)
                  : null;
              server.latencyLevel = getLatencyLevel(server.rtt);
            } catch (err) {
              console.warn(
                `[server-state] 测试 ${server.url} 延迟失败：`,
                err,
              );
              server.rtt = null;
              server.oneWayLatency = null;
              server.latencyLevel = null;
            } finally {
              server.testing = false;
            }
          },
          async connectServer(event, url) {
            if (event) {
              event.stopPropagation();
            }
            const server = this.serverList.find((s) => s.url === url);
            if (!server || !this._user) return;

            server.testing = true;
            try {
              const result = await this._user.server.connect(url);
              server.connected = !!result.success;
              server.version = result.version || "";
              if (result.success) {
                await this._probeServer(server);
              }
            } catch (err) {
              server.connected = false;
              this.error = `连接 ${url} 失败：` + (err.message || String(err));
              console.error("[server-state] 连接服务器失败：", err);
            } finally {
              server.testing = false;
            }
          },
        },
      };
    };
  </script>
</template>
