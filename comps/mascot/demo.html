<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazmot Mascot Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #fff;
        gap: 40px;
        padding: 40px;
      }

      h1 {
        font-size: 2.5rem;
        background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }

      .demo-container {
        display: flex;
        flex-wrap: wrap;
        gap: 60px;
        justify-content: center;
        align-items: flex-end;
      }

      .mascot-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .mascot-label {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }

      .click-info {
        font-size: 0.9rem;
        color: #667eea;
        min-height: 24px;
      }

      .section {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
      }

      .section h2 {
        font-size: 1.2rem;
        margin-bottom: 15px;
        color: #667eea;
      }
    </style>
    <script
      src="https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs#debug"
      type="module"
    ></script>
  </head>
  <body>
    <h1>Mazmot Mascot 组件演示</h1>

    <l-m src="./mascot.html"></l-m>

    <div class="demo-container">
      <div class="mascot-wrapper">
        <m-mascot></m-mascot>
        <span class="mascot-label">默认状态</span>
      </div>

      <div class="mascot-wrapper">
        <m-mascot style="--mascot-eye-color: #fb4747"></m-mascot>
        <span class="mascot-label">红色眼睛</span>
      </div>

      <div class="mascot-wrapper">
        <m-mascot state="soulless"></m-mascot>
        <span class="mascot-label">无灵魂</span>
      </div>

      <div class="mascot-wrapper">
        <m-mascot state="angry"></m-mascot>
        <span class="mascot-label">愤怒状态</span>
      </div>

      <div class="mascot-wrapper">
        <m-mascot state="happy"></m-mascot>
        <span class="mascot-label">高兴状态</span>
      </div>

      <div class="mascot-wrapper">
        <m-mascot style="--mascot-size: 60px"></m-mascot>
        <span class="mascot-label">修改尺寸</span>
      </div>
    </div>
  </body>
</html>
