<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazmot Mascot Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #fff;
        gap: 40px;
        padding: 40px;
      }

      h1 {
        font-size: 2.5rem;
        background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }

      .demo-container {
        display: flex;
        flex-wrap: wrap;
        gap: 60px;
        justify-content: center;
        align-items: flex-end;
      }

      .mascot-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .mascot-label {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }

      .click-info {
        font-size: 0.9rem;
        color: #667eea;
        min-height: 24px;
      }

      .section {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
      }

      .section h2 {
        font-size: 1.2rem;
        margin-bottom: 15px;
        color: #667eea;
      }
    </style>
    <script
      src="https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs#debug"
      type="module"
    ></script>
  </head>
  <body>
    <h1>Mazmot Mascot 组件演示</h1>

    <l-m src="./mascot.html"></l-m>

    <div class="demo-container">
      <div class="mascot-wrapper">
        <m-mascot id="mascot1"></m-mascot>
        <span class="mascot-label">默认状态</span>
      </div>

      <div class="mascot-wrapper">
        <m-mascot id="mascot2"></m-mascot>
        <span class="mascot-label">点击查看效果</span>
        <span class="click-info" id="clickInfo">点击次数: 0</span>
      </div>
    </div>

    <div class="section">
      <h2>组件特性</h2>
      <p>• 悬浮动画 - 整体上下浮动</p>
      <p>• 眨眼动画 - 眼睛周期性眨眼</p>
      <p>• 嘴巴动画 - 嘴巴一张一合</p>
      <p>• 挥手动画 - 双手交替摇摆</p>
      <p>• 弹跳动画 - 双脚轻微弹跳</p>
      <p>• 脉冲动画 - 天线球闪烁</p>
      <p>• 悬停效果 - 悬停时动画加速</p>
      <p>• 点击事件 - 支持点击交互</p>
    </div>

    <script type="module">
      const mascot2 = $("#mascot2");
      const clickInfo = $("#clickInfo");

      mascot2.on("mascot-click", (event) => {
        clickInfo.text = `点击次数: ${event.data.count}`;
      });
    </script>
  </body>
</html>
