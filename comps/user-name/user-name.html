<template component>
  <style>
    :host {
      display: inline;
    }
  </style>
  <span>{{displayName}}</span>
  <script>
    import { getUser } from "/nos/user/main.js";

    const NAMESPACE = "default";

    export default async () => {
      return {
        tag: "user-name",
        attrs: {
          userId: "",
        },
        data: {
          displayName: "",
        },
        watch: {
          userId(val) {
            this.displayName = val || "";
            if (val) this._loadUserName();
          },
        },
        proto: {
          async _loadUserName() {
            const uid = this.userId;
            if (!uid) return;

            try {
              const user = await getUser(NAMESPACE);
              if (user.userId === uid) {
                const info = await user.getInfo();
                this.displayName = info.username;
                return;
              }
              const card = await user.card.get(uid);
              if (card && card.username) {
                this.displayName = card.username;
              }
            } catch {
              // 获取名片失败，保持显示 userId
            }
          },
        },
        async attached() {
          if (!this.displayName && this.userId) {
            this.displayName = this.userId;
            this._loadUserName();
          }
        },
      };
    };
  </script>
</template>
