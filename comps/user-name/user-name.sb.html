<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>user-name 组件测试</title>
    <script
      src="/gh/ofajs/ofa.js@latest/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/ofajs/sibyl-test/components/sb-test.mjs"
    ></script>
  </head>
  <body>
    <h1>user-name 组件测试</h1>

    <l-m src="./user-name.html"></l-m>

    <!-- 各测试用例使用的静态元素 -->
    <user-name user-id="test-user-001" id="name1"></user-name>
    <user-name user-id="first-id" id="name2"></user-name>
    <user-name id="name3"></user-name>
    <div id="query-target"></div>
    <user-name user-id="nonexistent-user-999999999" id="name4"></user-name>

    <!-- ============ 初始显示 ============ -->
    <sb-test name="设置 userId 后立即显示该值">
      <template>
        <script type="module">
          {
            await new Promise((r) => setTimeout(r, 200));
            const text = $("#name1").shadow.$("span").text;
            return {
              assert: text === "test-user-001",
              content: { text, expected: "test-user-001" },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ============ 动态修改 userId ============ -->
    <sb-test name="动态修改 userId 后显示新值">
      <template>
        <script type="module">
          {
            const el = $("#name2");
            el.attr("user-id", "second-id");
            await new Promise((r) => setTimeout(r, 50));
            const text = el.shadow.$("span").text;
            return {
              assert: text === "second-id",
              content: { text, expected: "second-id" },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ============ 空 userId ============ -->
    <sb-test name="未设置 userId 时显示空内容">
      <template>
        <script type="module">
          {
            await new Promise((r) => setTimeout(r, 50));
            const text = $("#name3").shadow.$("span").text;
            return {
              assert: text === "",
              content: { text, expected: "" },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ============ 查询用户后显示对应用户 ID ============ -->
    <sb-test name="查询用户后显示对应用户 ID">
      <template>
        <script type="module">
          {
            const { getUser } = await import("/nos/user/main.js");
            const user = await getUser("mazmot");
            const targetUserId = user.userId;

            const container = $("#query-target");
            container.html =
              `<user-name user-id="${targetUserId}"></user-name>`;
            await new Promise((r) => setTimeout(r, 50));
            const el = container.$("user-name");
            const beforeQuery = el.shadow.$("span").text;
            await new Promise((r) => setTimeout(r, 200));
            const afterQuery = el.shadow.$("span").text;

            return {
              assert:
                beforeQuery === targetUserId && afterQuery === targetUserId,
              content: { targetUserId, beforeQuery, afterQuery },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ============ 查询不存在的用户 ============ -->
    <sb-test name="查询不存在的用户时保持显示 userId">
      <template>
        <script type="module">
          {
            const el = $("#name4");
            await new Promise((r) => setTimeout(r, 50));
            const before = el.shadow.$("span").text;
            await new Promise((r) => setTimeout(r, 200));
            const after = el.shadow.$("span").text;
            return {
              assert:
                before === "nonexistent-user-999999999" &&
                after === "nonexistent-user-999999999",
              content: {
                fakeId: "nonexistent-user-999999999",
                before,
                after,
              },
            };
          }
        </script>
      </template>
    </sb-test>
  </body>
</html>
