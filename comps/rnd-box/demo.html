<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rnd Box Demo</title>
    <script
      src="/gh/ofajs/ofa.js@latest/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      .rnd-area {
        position: relative;
        width: 80%;
        height: 80%;
        background-color: rgba(21, 155, 50, 0.1);
      }
    </style>
  </head>

  <body>
    <l-m src="./rnd-box.html"></l-m>
    <div class="rnd-area" style="margin: 50px">
      <m-rnd-box
        style="border: red solid 1px"
        x="100"
        y="100"
        width="200"
        height="200"
        movable
        auto-save-id="box-1"
      >
        box 1
      </m-rnd-box>
      <m-rnd-box
        style="border: blue solid 1px"
        x="300"
        y="300"
        width="200"
        height="200"
        resizable
        movable
        auto-save-id="box-2"
      >
        box 2
      </m-rnd-box>
    </div>
  </body>
</html>
