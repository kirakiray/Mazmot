<template component>
  <style>

      display: block;
    }

      border-radius: 14px;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);

      box-shadow:
        0 6px 18px rgb(from var(--md-sys-color-on-surface) r g b / 0.12),
        0 2px 6px rgb(from var(--md-sys-color-on-surface) r g b / 0.08);
      transition:
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        border-radius 0.2s ease;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    .network-window[rnd-focus] {
      border-color: var(--md-sys-color-primary);
      box-shadow:
        0 12px 32px rgb(from var(--md-sys-color-on-surface) r g b / 0.18),
        0 4px 10px rgb(from var(--md-sys-color-primary) r g b / 0.2);
    }

    /* 折叠成圆圈状态 */
    .network-window.collapsed {
      border-radius: 50%;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-color: rgb(from var(--md-sys-color-primary) r g b / 0.3);
      cursor: pointer;
      overflow: hidden;
    }

    .network-window.collapsed[rnd-focus] {
      border-color: var(--md-sys-color-primary);
    }

    .window-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background-color: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface-variant);
      border-bottom: 1px solid
        rgb(from var(--md-sys-color-on-surface) r g b / 0.1);

      flex-shrink: 0;
    }

    .window-header .title {
      flex: 1;

    .window-header n-icon {

    }

    /* 圆圈内容 */
    .bubble {
      width: 100%;

    .bubble n-icon {

      color: var(--md-sys-color-on-primary-container);
    }
  </style>
  <l-m src="../rnd-box/rnd-box.html"></l-m>

  <o-if :value="!collapsed">
    <m-rnd-box
      class="network-window"
      x="100"
      y="100"
      width="360"
      height="520"
      movable
      resizable
      auto-save-id="rdn-network-expanded"
    >
      <div class="window-header">
        <n-icon icon="mdi:lan"></n-icon>
        <span class="title">Network</span>
        <button
          class="header-btn"
          on:click="collapse"
          title="收起为圆圈"
        >
          <n-icon icon="mdi:circle-outline"></n-icon>
        </button>
      </div>
      <div class="window-body">
        <o-app src="../../apps/network/app-config.js"></o-app>
      </div>
    </m-rnd-box>
  </o-if>

  <o-if :value="collapsed">
    <m-rnd-box
      class="network-window collapsed"
      x="40"
      y="40"
      width="40"
      height="40"
      movable
      auto-save-id="rdn-network-collapsed"
    >
      <div
        class="bubble"
        on:mousedown="onBubbleDown"
        on:mouseup="onBubbleUp"
      >
        <n-icon icon="mdi:lan"></n-icon>
      </div>
    </m-rnd-box>
  </o-if>
  <script>
    export default async ({ load }) => {
      const { EverCache } = await load(
        "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js",
      );
      const stateCache = new EverCache("mazmot-rdn-network");
      const STATE_KEY = "collapsed";

      return {
        tag: "rdn-network",
        data: {
          collapsed: true,
        },
        proto: {
          async collapse() {
            this.collapsed = true;
            try {
              await stateCache.setItem(STATE_KEY, true);
            } catch (err) {
              console.warn("[rdn-network] 保存状态失败：", err);
            }
          },
          async expand() {
            this.collapsed = false;
            try {
              await stateCache.setItem(STATE_KEY, false);
            } catch (err) {
              console.warn("[rdn-network] 保存状态失败：", err);
            }
          },
          onBubbleDown(e) {
            this._downX = e.clientX;
            this._downY = e.clientY;
            this._downTime = Date.now();
          },
          onBubbleUp(e) {
            const dx = Math.abs(e.clientX - (this._downX || 0));
            const dy = Math.abs(e.clientY - (this._downY || 0));
            const dt = Date.now() - (this._downTime || 0);
            // 位移小于 5px 且时长小于 400ms 视为点击
            if (dx < 5 && dy < 5 && dt < 400) {
              this.expand();
            }
          },
        },
        async ready() {
          try {
            const saved = await stateCache.getItem(STATE_KEY);
            if (typeof saved === "boolean") {
              this.collapsed = saved;
            }
          } catch (err) {
            console.warn("[rdn-network] 读取状态失败：", err);
          }
        },
      };
    };
  </script>
</template>
