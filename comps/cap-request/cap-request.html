<template component>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/group.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <style>
    :host {
      position: relative;
      display: block;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--md-sys-color-neutral);
      border-radius: 12px;
      padding: 4px 16px;
      margin-bottom: 12px;
      background-color: var(--md-sys-color-surface);
      transition: all 0.2s ease;
      box-shadow: 0 0 0 1px var(--md-sys-color-neutral-container);
    }
    .cap-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .cap-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .cap-name {
      font-size: 12px;
      font-weight: 400;
      color: var(--md-sys-color-on-surface-variant);
    }
    .cap-description {
      font-size: 14px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
    }
    .cap-action {
      display: flex;
      align-items: center;
    }
    .debug-info {
      margin-top: 12px;
      padding: 12px;
      background-color: var(--md-sys-color-neutral-container);
      border-radius: 8px;
      font-size: 12px;
      color: var(--md-sys-color-on-neutral-container);
      font-family: "SF Mono", Monaco, Consolas, monospace;
      overflow-x: auto;
    }

    .tool-btns {
      position: absolute;
      right: -24px;
      top: -24px;
      opacity: 0;
      transition: all 0.2s ease;
    }

    :host(:hover) .tool-btns {
      opacity: 1;
    }
  </style>

  <p-button-group class="tool-btns">
    <p-button
      size="small"
      icon
      attr:color="allCompleted ? 'success' : 'primary'"
      attr:disabled="isRunningAll"
      on:click="runAll()"
    >
      <o-if :value="isRunningAll">
        <n-icon icon="line-md:loading-twotone-loop"></n-icon>
      </o-if>
      <o-if :value="!isRunningAll && allCompleted">
        <n-icon icon="material-symbols:done-rounded"></n-icon>
      </o-if>
      <o-if :value="!isRunningAll && !allCompleted">
        <n-icon icon="line-md:play"></n-icon>
      </o-if>
    </p-button>
    <p-button
      size="small"
      icon
      on:click="debugMode = !debugMode"
      variant="outlined"
    >
      <n-icon icon="carbon:debug"></n-icon>
    </p-button>
  </p-button-group>
  <o-if :value="parseError">
    <div
      style="
        padding: 12px 16px;
        margin-bottom: 12px;
        background-color: var(--md-sys-color-error-container);
        border-radius: 12px;
        border: 1px solid var(--md-sys-color-error);
      "
    >
      <div
        style="
          display: flex;
          align-items: center;
          gap: 8px;
          color: var(--md-sys-color-on-error-container);
        "
      >
        <n-icon
          icon="material-symbols:error-rounded"
          style="font-size: 20px"
        ></n-icon>
        <div>
          <div style="font-weight: 600; font-size: 14px">JSON 解析错误</div>
          <div style="font-size: 12px; margin-top: 4px">{{parseError}}</div>
        </div>
      </div>
    </div>
  </o-if>
  <o-fill :value="capRequests">
    <div>
      <div class="item">
        <div class="cap-icon">⚡</div>
        <div class="cap-content">
          <div class="cap-description">{{$data.description}}</div>
          <div class="cap-name">{{$data.capability || $data.name}}</div>
        </div>
        <div class="cap-action">
          <o-if :value="$data.error">
            <n-icon
              icon="material-symbols:error-rounded"
              style="color: var(--md-sys-color-error)"
            ></n-icon>
          </o-if>
          <o-else-if :value="$data.running">
            <n-icon
              icon="line-md:loading-twotone-loop"
              style="color: var(--md-sys-color-primary)"
            ></n-icon>
          </o-else-if>
          <o-else-if :value="!$data.running && $data.done">
            <n-icon
              icon="material-symbols:done-rounded"
              style="color: var(--md-sys-color-success)"
            ></n-icon>
          </o-else-if>
          <o-else-if :value="!$data.running && !$data.done && !$data.error">
            <span
              style="
                font-size: 12px;
                color: var(--md-sys-color-on-surface-variant);
              "
              >等待运行</span
            >
          </o-else-if>
        </div>
      </div>
      <o-if :value="$host.debugMode">
        <div class="debug-info">
          <div style="margin-bottom: 8px">
            <strong>输入信息:</strong>
            <div style="margin-top: 4px">{{$host.getInputJSON($data)}}</div>
          </div>
          <o-if :value="$data.done">
            <div style="margin-bottom: 8px">
              <strong>输出信息:</strong>
              <div style="margin-top: 4px">{{$host.getOutputData($data)}}</div>
            </div>
          </o-if>
          <o-if :value="$data.error">
            <div>
              <strong style="color: var(--md-sys-color-error)"
                >错误信息:</strong
              >
              <div style="margin-top: 4px; color: var(--md-sys-color-error)">
                {{$data.error}}
              </div>
            </div>
          </o-if>
        </div>
      </o-if>
    </div>
  </o-fill>
  <script>
    export default async function ({ load }) {
      return {
        tag: "cap-request",
        data: {
          capRequests: [
            {
              name: "",
              description: "",
              running: false,
              done: false,
            },
          ],
          debugMode: false,
          isRunningAll: false,
          allCompleted: false,
          parseError: null,
        },
        proto: {
          getOutputData(data) {
            if (data.result === null || data.result === undefined) {
              return "null";
            }
            return JSON.stringify(data.result);
          },
          getInputJSON(data) {
            return JSON.stringify({
              capability: data.capability || data.name,
              opts: data.opts,
            });
          },
          async _executeCapability(item) {
            const capabilityName = item.capability || item.name;
            const url = `/caps/${capabilityName}/main.js`;
            const module = await load(url);
            const capabilityRunner = module.default;
            return await capabilityRunner(item.opts);
          },
          async runAll() {
            if (this.isRunningAll) return;
            this.isRunningAll = true;

            const items = this.capRequests.filter(
              (item) => !item.done && !item.running,
            );
            if (items.length === 0) {
              this.isRunningAll = false;
              return;
            }

            items.forEach((item) => {
              item.error = null;
              item.running = true;
              item.done = false;
            });

            try {
              const results = await Promise.all(
                items.map(async (item) => {
                  let result = null;
                  try {
                    result = await this._executeCapability(item);
                    item.result = result;
                  } catch (e) {
                    item.error = e.message;
                  }

                  item.running = false;
                  item.done = true;

                  return result;
                }),
              );

              const paths = this.composedPath();
              let dialogHost = paths.find(
                (ele) =>
                  ele.getAttribute &&
                  ele.getAttribute("dialogue-host") !== null,
              );

              if (!dialogHost) {
                throw new Error("No dialogue host found");
              }

              dialogHost = $(dialogHost);

              const capabilityResults = items.map((item, i) => ({
                capability: item.capability || item.name,
                id: item.id,
                result: results[i],
                error: item.error,
              }));

              await dialogHost.handleCapabilityResults(capabilityResults);

              this.allCompleted = this.capRequests.every((r) => r.done);
            } catch (e) {
              items.forEach((item) => {
                item.running = false;
              });
              throw e;
            } finally {
              this.isRunningAll = false;
            }
          },
          async loadData() {
            try {
              this.parseError = null;
              const data = JSON.parse(this.text);
              this.capRequests = data.map((item) => ({
                ...item,
                running: false,
                done: false,
              }));
            } catch (e) {
              console.error("Failed to load requests:", e);
              this.parseError = e.message;
            } finally {
              this.allCompleted = false;
            }
          },
        },
        async attached() {
          await this.loadData();

          this.runAll();
        },
      };
    }
  </script>
</template>
