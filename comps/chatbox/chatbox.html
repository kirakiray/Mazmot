<template component>
  <l-m src="./chat-item.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .chatbox-container {
      background-color: var(--md-sys-color-surface);
      border-radius: 16px;
      padding: 16px 0;
      max-width: 800px;
      margin: 0 auto;
    }

    .chatbox-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    ::slotted(m-chat-item) {
      display: block;
    }
  </style>

  <div class="chatbox-container">
    <div class="chatbox-content">
      <slot></slot>
    </div>
  </div>

  <script>
    export default async () => {
      return {
        tag: "m-chatbox",
        attrs: {},
        data: {},
        proto: {
          getChatJson() {
            const chatData = [];
            for (let i = 0; i < this.length; i++) {
              const item = this[i];
              chatData.push({
                role: item.role || "user",
                content: item.text.trim(),
              });
            }
            return chatData;
          },
        },
        ready() {},
      };
    };
  </script>
</template>
