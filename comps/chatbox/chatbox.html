<template component>
  <style>
    :host {
      display: block;
    }

    .chatbox-container {
      background-color: var(--md-sys-color-surface);
      border-radius: 16px;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .chatbox-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    ::slotted(m-chat-item) {
      display: block;
    }
  </style>

  <div class="chatbox-container">
    <div class="chatbox-content">
      <slot></slot>
    </div>
  </div>

  <script>
    export default {
      tag: "m-chatbox",
      attrs: {},
      data: {},
      proto: {
        getChatJson() {
          const slot = this.shadowRoot.querySelector('slot');
          const items = slot.assignedElements();
          const chatData = items.map(item => {
            return {
              role: item.role || 'user',
              content: item.textContent.trim()
            };
          });
          return JSON.stringify(chatData, null, 2);
        }
      },
      ready() {}
    };
  </script>
</template>
