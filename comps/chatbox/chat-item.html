<template component>
  <style>
    :host {
      display: block;
      margin-bottom: 16px;
    }

    .chat-item {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      position: relative;
    }

    .chat-item.system {
      background-color: var(--md-sys-color-surface-container);
      border-left: 4px solid var(--md-sys-color-primary);
    }

    .chat-item.user {
      background-color: var(--md-sys-color-primary-container);
      margin-left: 48px;
      flex-direction: row-reverse;
    }

    .chat-item.assistant {
      background-color: var(--md-sys-color-neutral-container);
      margin-right: 48px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .system .avatar {
      display: none;
    }

    .user .avatar {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .assistant .avatar {
      background-color: var(--md-sys-color-neutral);
      color: var(--md-sys-color-on-neutral);
    }

    .content {
      flex: 1;
      color: var(--md-sys-color-on-surface);
      line-height: 1.6;
      word-wrap: break-word;
    }

    .system .content {
      color: var(--md-sys-color-on-surface-variant);
      font-style: italic;
    }
  </style>

  <div class="chat-item" class:system="role === 'system'" class:user="role === 'user'" class:assistant="role === 'assistant'">
    <div class="avatar">{{avatarText}}</div>
    <div class="content">
      <slot></slot>
    </div>
  </div>

  <script>
    export default {
      tag: "m-chat-item",
      attrs: {
        role: "user"
      },
      data: {
        avatarText: "U"
      },
      watch: {
        role(val) {
          const avatarMap = {
            system: "S",
            user: "U",
            assistant: "A"
          };
          this.avatarText = avatarMap[val] || val.charAt(0).toUpperCase();
        }
      },
      proto: {},
      ready() {
        const avatarMap = {
          system: "S",
          user: "U",
          assistant: "A"
        };
        this.avatarText = avatarMap[this.role] || this.role.charAt(0).toUpperCase();
      }
    };
  </script>
</template>
