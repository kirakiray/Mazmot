<template component>
  <style>
    :host {
      display: block;
      margin-bottom: 16px;
    }

    .chat-item {
      display: flex;
      gap: 12px;
      position: relative;
    }

    .chat-item.user {
      margin-left: 48px;
      flex-direction: row-reverse;
    }

    .chat-item.assistant {
      margin-right: 48px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .system .avatar {
      display: none;
    }

    .user .avatar {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .assistant .avatar {
      background-color: var(--md-sys-color-neutral);
      color: var(--md-sys-color-on-neutral);
    }

    .content {
      flex: 1;
      color: var(--md-sys-color-on-surface);
      line-height: 1.6;
      word-wrap: break-word;
      padding: 12px 16px 0;
      border-radius: 12px;
    }

    .system .content {
      background-color: var(--md-sys-color-surface-container);
      border-left: 4px solid var(--md-sys-color-primary);
      color: var(--md-sys-color-on-surface-variant);
      font-style: italic;
    }

    .system .content.collapsed {
      padding: 8px 16px;
      cursor: pointer;
    }

    .system-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-style: normal;
      font-weight: 600;
      font-size: 14px;
    }

    .system-header-text {
      color: var(--md-sys-color-primary);
    }

    .collapse-icon {
      font-size: 12px;
      transition: transform 0.2s ease;
      color: var(--md-sys-color-primary);
    }

    .collapsed .collapse-icon {
      transform: rotate(90deg);
    }

    .system-content {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--md-sys-color-outline-variant);
    }

    .collapsed .system-content {
      display: none;
    }

    .user .content {
      background-color: var(--md-sys-color-primary-container);
    }

    .assistant .content {
      background-color: transparent;
      flex: 1;
      padding-left: 0;
    }

    .chat-item.assistant {
      margin-right: 0;
    }
  </style>

  <div
    class="chat-item"
    class:system="role === 'system'"
    class:user="role === 'user'"
    class:assistant="role === 'assistant'"
  >
    <div class="avatar">{{avatarText}}</div>
    <div
      class="content"
      class:collapsed="role === 'system' && collapsed"
      on:click="role === 'system' && toggleCollapse()"
    >
      <o-if :value="role === 'system'">
        <div class="system-header">
          <span class="system-header-text">系统提示</span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="system-content">
          <slot></slot>
        </div>
      </o-if>
      <o-if :value="role !== 'system'">
        <slot></slot>
      </o-if>
    </div>
  </div>

  <script>
    export default {
      tag: "m-chat-item",
      attrs: {
        role: "user",
      },
      data: {
        avatarText: "U",
        collapsed: true,
      },
      watch: {
        role(val) {
          const avatarMap = {
            system: "S",
            user: "U",
            assistant: "A",
          };
          this.avatarText = avatarMap[val] || val.charAt(0).toUpperCase();
        },
      },
      proto: {
        toggleCollapse() {
          this.collapsed = !this.collapsed;
        },
      },
      ready() {
        const avatarMap = {
          system: "S",
          user: "U",
          assistant: "A",
        };
        this.avatarText =
          avatarMap[this.role] || this.role.charAt(0).toUpperCase();
      },
    };
  </script>
</template>
