<template page>
  <style>
    :host {
      display: block;
      height: 100%;
    }
    .mascot-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding-top: 15vh;
    }
  </style>
  <div class="mascot-container">
    <l-m src="../comps/mascot/mascot.html"></l-m>
    <m-mascot style="--mascot-size: 100px" sync:state="mascotState"></m-mascot>
    <o-if :value="!showMain">
      <o-page
        src="./start/start.html"
        class="page"
        style="width: 100%; margin-top: 16px"
        sync:mascot-state="mascotState"
        on:completed="handleCompleted"
      ></o-page>
    </o-if>
    <o-if :value="showMain">
      <div style="width: 100%">
        <o-page src="./suggestion.html" style="margin: 16px 0"></o-page>
        <o-page src="./main.html" class="page" style="width: 100%"></o-page>
      </div>
    </o-if>
  </div>
  <script>
    export default async ({ load }) => {
      const { apiKeys } = await load("../ai/main.js");

      return {
        data: {
          mascotState: "soulless",
          showMain: false,
        },
        ready() {
          // 检查本地是否有可用的 API key
          if (apiKeys.length > 0) {
            // 有 API key，直接显示主界面
            this.showMain = true;
            this.mascotState = "";
          }
        },
        proto: {
          handleCompleted() {
            this.showMain = true;
            this.mascotState = "";
          },
        },
      };
    };
  </script>
</template>
