<template page>
  <style>
    :host {
      display: block;
      height: 100%;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding: 20px;
      padding-top: 15vh;
      background-color: var(--md-sys-color-surface);
    }
    .mascot-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .speech-text {
      font-size: 16px;
      color: var(--md-sys-color-on-surface);
      text-align: center;
      cursor: pointer;
      padding: 10px 20px;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 8px;
      max-width: 300px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgb(from var(--md-sys-color-on-surface) r g b / 0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .speech-text.exit {
      animation: slideDown 0.1s ease-in forwards;
    }
    .speech-text.enter {
      animation: slideUp 0.1s ease-out forwards;
    }
    @keyframes slideDown {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(20px);
        opacity: 0;
      }
    }
    @keyframes slideUp {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .speech-text:hover {
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgb(from var(--md-sys-color-primary) r g b / 0.2);
    }
    .speech-text.exit:hover,
    .speech-text.enter:hover {
      transform: none;
    }
    .click-hint {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 5px;
    }
  </style>
  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />
  <div class="container" on:click="nextSpeech">
    <l-m src="../comps/mascot/mascot.html"></l-m>
    <div class="mascot-wrapper">
      <m-mascot
        style="--mascot-size: 100px"
        sync:state="mascotState"
      ></m-mascot>
      <div class="speech-text" id="speechText">{{ currentSpeech }}</div>
      <div class="click-hint">点击鼠标继续对话</div>
    </div>
  </div>
  <script>
    export default async ({ load }) => {
      return {
        data: {
          speeches: [
            "你好，我是小墨，我是你的AI应用助手！",
            "你可以借助我用来创建或启动AI应用",
            "现在的我只是一个具空壳，需要你为我注入灵魂",
          ],
          currentIndex: 0,
          mascotState: "soulless",
          isAnimating: false,
        },
        proto: {
          get currentSpeech() {
            return this.speeches[this.currentIndex];
          },
          nextSpeech() {
            // 如果正在动画中或已经是最后一句，不响应点击
            if (this.isAnimating || this.currentIndex >= this.speeches.length - 1) {
              return;
            }

            const speechText = this.shadow.$("#speechText");
            if (speechText) {
              // 开始动画，设置状态
              this.isAnimating = true;

              // 第一步：当前对话框向下消失
              speechText.classList.add("exit");

              // 100ms后切换内容并从下方滑入
              setTimeout(() => {
                this.currentIndex = this.currentIndex + 1;

                // 移除 exit 类，添加 enter 类
                speechText.classList.remove("exit");
                speechText.classList.add("enter");

                // 动画结束后移除 enter 类并重置动画状态
                setTimeout(() => {
                  speechText.classList.remove("enter");
                  this.isAnimating = false;
                }, 100);
              }, 100);
            } else {
              // 如果找不到元素，直接切换
              this.currentIndex = this.currentIndex + 1;
            }
          },
        },
      };
    };
  </script>
</template>
