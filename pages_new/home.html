<template page>
  <style>
    :host {
      display: block;
      height: 100%;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding: 20px;
      padding-top: 15vh;
      background-color: var(--md-sys-color-surface);
    }
    .mascot-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .speech-text {
      font-size: 16px;
      color: var(--md-sys-color-on-surface);
      text-align: center;
      cursor: pointer;
      padding: 10px 20px;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 8px;
      max-width: 300px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgb(from var(--md-sys-color-on-surface) r g b / 0.1);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .speech-text.has-form {
      max-width: 450px;
      min-height: auto;
      padding: 0;
      cursor: default;
      background-color: transparent;
      box-shadow: none;
    }
    .speech-text.exit {
      animation: slideDown 0.1s ease-in forwards;
    }
    .speech-text.enter {
      animation: slideUp 0.1s ease-out forwards;
    }
    @keyframes slideDown {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(20px);
        opacity: 0;
      }
    }
    @keyframes slideUp {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .speech-text:hover {
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgb(from var(--md-sys-color-primary) r g b / 0.2);
    }
    .speech-text.has-form:hover {
      transform: none;
      background-color: transparent;
      color: var(--md-sys-color-on-surface);
    }
    .speech-text.exit:hover,
    .speech-text.enter:hover {
      transform: none;
    }
    .click-hint {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 5px;
    }
  </style>
  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />
  <div class="container" on:click="handleClick">
    <l-m src="../comps/mascot/mascot.html"></l-m>
    <div class="mascot-wrapper">
      <m-mascot
        style="--mascot-size: 100px"
        sync:state="mascotState"
      ></m-mascot>
      <div class="speech-text" id="speechText" sync:class="speechClass">
        <o-if :value="currentIndex < speeches.length - 1">
          {{ currentSpeech }}
        </o-if>
        <o-if :value="currentIndex === speeches.length - 1">
          <o-page src="./input-apikey.html" style="width: 100%; height: auto;"></o-page>
        </o-if>
      </div>
      <div class="click-hint">
        <o-if :value="currentIndex < speeches.length - 1">点击鼠标继续对话</o-if>
        <o-if :value="currentIndex === speeches.length - 1">请配置 API Key</o-if>
      </div>
    </div>
  </div>
  <script>
    export default async ({ load }) => {
      return {
        data: {
          speeches: [
            "你好，我是小墨，我是你的AI应用助手！",
            "你可以借助我用来创建或启动AI应用",
            "现在的我只是一个具空壳，需要你为我注入灵魂，才能正常工作",
            "准备好了吗？让我们一起开始注入灵魂之旅！",
          ],
          currentIndex: 0,
          mascotState: "soulless",
          isAnimating: false,
        },
        proto: {
          get currentSpeech() {
            return this.speeches[this.currentIndex];
          },
          get speechClass() {
            return this.currentIndex === this.speeches.length - 1
              ? "speech-text has-form"
              : "speech-text";
          },
          handleClick() {
            // 只在前面的步骤时响应点击
            if (this.currentIndex < this.speeches.length - 1) {
              this.nextSpeech();
            }
          },
          navigateToInputPage() {
            // 跳转到 API Key 输入页面
            // TODO: 根据实际的路由配置调整跳转方式
            console.log("跳转到输入页面");
            // 示例：使用 ofa.js 的路由方式
            // this.nav.to("/pages_new/input-apikey.html");
          },
          nextSpeech() {
            // 如果正在动画中或已经是最后一句，不响应点击
            if (
              this.isAnimating ||
              this.currentIndex >= this.speeches.length - 1
            ) {
              return;
            }

            const speechText = this.shadow.$("#speechText");
            if (speechText) {
              // 开始动画，设置状态
              this.isAnimating = true;

              // 第一步：当前对话框向下消失
              speechText.classList.add("exit");

              // 100ms后切换内容并从下方滑入
              setTimeout(() => {
                this.currentIndex = this.currentIndex + 1;

                // 移除 exit 类，添加 enter 类
                speechText.classList.remove("exit");
                speechText.classList.add("enter");

                // 动画结束后移除 enter 类并重置动画状态
                setTimeout(() => {
                  speechText.classList.remove("enter");
                  this.isAnimating = false;
                }, 100);
              }, 100);
            } else {
              // 如果找不到元素，直接切换
              this.currentIndex = this.currentIndex + 1;
            }
          },
        },
      };
    };
  </script>
</template>
