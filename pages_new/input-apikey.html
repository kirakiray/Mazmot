<template page>
  <style>
    :host {
      display: block;
      width: 100%;
    }
    .api-form {
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 8px;
      padding: 20px;
    }
    .api-form h2 {
      color: var(--md-sys-color-on-surface);
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .hint-text {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      text-align: center;
      margin-top: 10px;
    }
  </style>
  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />
  <l-m src="https://punch-ui-v2.pages.dev/packages/select/select.html"></l-m>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/textarea/textarea.html"
  ></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>

  <div class="api-form">
    <h2>为小墨注入灵魂</h2>

    <div class="form-group">
      <label>选择 AI 提供商</label>
      <p-select
        id="providerSelect"
        placeholder="请选择提供商"
        sync:value="selectedProvider"
      >
        <p-option value="deepseek">DeepSeek</p-option>
        <p-option value="gemini">Google Gemini</p-option>
      </p-select>
    </div>

    <div class="form-group">
      <p-textarea
        id="apiKeyInput"
        placeholder="请输入 API Key"
        style="width: 100%"
        rows="3"
      >
        <span slot="label">
          <o-if :value="selectedProvider === 'deepseek'">DeepSeek API Key</o-if>
          <o-if :value="selectedProvider === 'gemini'"
            >Google Gemini API Key</o-if
          >
        </span>
      </p-textarea>
    </div>

    <div class="button-group">
      <p-button color="primary" on:click="saveApiKey"> 保存并启动 </p-button>
    </div>

    <div class="hint-text">API Key 将安全存储在本地，仅用于与 AI 服务通信</div>
  </div>
  <script>
    export default async ({ load, url }) => {
      return {
        data: {
          selectedProvider: "deepseek",
        },
        proto: {
          saveApiKey() {
            const apiKeyInput = this.shadow.$("#apiKeyInput");
            const providerSelect = this.shadow.$("#providerSelect");

            if (apiKeyInput && providerSelect) {
              const apiKey = apiKeyInput.value;
              const provider = providerSelect.value;

              if (apiKey && provider) {
                // 保存 API key 和提供商到 localStorage
                localStorage.setItem("ai_provider", provider);
                localStorage.setItem(`${provider}_api_key`, apiKey);

                console.log("API Key 已保存:", provider, apiKey);

                // TODO: 跳转到主应用页面或显示成功提示
                // 这里可以添加成功提示或跳转逻辑
              } else {
                alert("请选择提供商并输入 API Key");
              }
            }
          },
        },
      };
    };
  </script>
</template>
