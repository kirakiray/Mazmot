<template page>
  <style>
    :host {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--md-sys-color-on-surface-variant);
    }

    .empty-state n-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .app-item {
      background: var(--md-sys-color-on-neutral);
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .app-item:hover {
      background: var(--md-sys-color-on-primary);
    }

    .app-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 500;
    }

    .bottom-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px;
    }

    .description {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      text-align: center;
      padding: 0 16px 16px;
      line-height: 1.6;
    }

    .description p {
      margin: 4px 0;
    }
  </style>
  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/list/list.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>

  <div class="content">
    <o-if :value="apps.length === 0">
      <div class="empty-state">
        <n-icon icon="material-symbols-light:box-outline-rounded"></n-icon>
        <div>暂无应用</div>
      </div>
    </o-if>
    <o-if :value="apps.length > 0">
      <div class="app-list">
        <p-list>
          <o-fill :value="apps">
            <p-list-item
              class="app-item"
              on:click="$host.openApp($data)"
              button
            >
              <div slot="prefix" class="app-icon">
                {{ $data.name.charAt(0).toUpperCase() }}
              </div>
              <div>{{ $data.name }}</div>
              <div secondary>
                {{ $data.path }} · {{ $host.formatDate($data.createdAt) }} · {{ $host.getSourceLabel($data.source) }}
              </div>
            </p-list-item>
          </o-fill>
        </p-list>
      </div>
    </o-if>
  </div>

  <div class="bottom-actions">
    <p-button color="primary" variant="outlined" on:click="openCreateDialog">
      <n-icon icon="mingcute:ai-fill" slot="prefix"></n-icon>
      创建应用
    </p-button>
    <p-button color="primary" disabled>
      <n-icon icon="f7:plus-app" slot="prefix"></n-icon>
      安装应用
    </p-button>
  </div>

  <div class="description">
    <p>• 创建应用：用AI能力制作你想要的应用</p>
    <p>• 安装应用：安装官方已开发好的AI程序，直接下载到本地使用</p>
  </div>

  <script>
    import { storage } from "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js";

    export default async ({ load }) => {
      // 从 ever-cache 加载应用列表
      const apps = (await storage.apps) || [];

      return {
        data: {
          apps: apps,
        },
        proto: {
          openCreateDialog() {
            this.emit("open-create-dialog");
          },
          openApp(app) {
            // 跳转到应用编辑页面
            this.goto(`../create-app/create.html?projectPath=${encodeURIComponent(app.path)}`);
          },
          formatDate(dateStr) {
            if (!dateStr) return "";
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) {
              const hours = Math.floor(diff / (1000 * 60 * 60));
              if (hours === 0) {
                const minutes = Math.floor(diff / (1000 * 60));
                if (minutes < 1) return "刚刚";
                return `${minutes}分钟前`;
              }
              return `${hours}小时前`;
            } else if (days === 1) {
              return "昨天";
            } else if (days < 7) {
              return `${days}天前`;
            } else {
              return date.toLocaleDateString("zh-CN");
            }
          },
          getSourceLabel(source) {
            if (source === "self-created") return "自建应用";
            if (source === "installed") return "已安装";
            return "未知来源";
          },
        },
      };
    };
  </script>
</template>
