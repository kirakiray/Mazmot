<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs"
      type="module"
    ></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <div class="container" style="max-width: 800px; margin: 20px auto; padding: 20px;">
      <h1>模型管理演示</h1>
      
      <section style="margin-bottom: 30px;">
        <h2>添加新模型</h2>
        <form id="add-model-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
          <select id="provider-select" style="padding: 8px; min-width: 150px;">
            <option value="deepseek">Deepseek</option>
            <option value="kimi">Kimi</option>
          </select>
          <input 
            type="text" 
            id="api-key-input" 
            placeholder="请输入 API Key" 
            style="padding: 8px; flex: 1; min-width: 200px;"
          />
          <button type="submit" style="padding: 8px 20px;">添加</button>
        </form>
      </section>

      <section>
        <h2>已有模型列表</h2>
        <div id="model-list" style="display: flex; flex-direction: column; gap: 10px;">
          <p style="color: var(--md-sys-color-on-surface); opacity: 0.6;">暂无模型</p>
        </div>
      </section>
    </div>

    <script type="module">
      const { getAssistant, models, saveKey } = await import("./main.js");

      const form = document.getElementById("add-model-form");
      const providerSelect = document.getElementById("provider-select");
      const apiKeyInput = document.getElementById("api-key-input");
      const modelList = document.getElementById("model-list");

      function renderModelList() {
        if (models.length === 0) {
          modelList.innerHTML = '<p style="color: var(--md-sys-color-on-surface); opacity: 0.6;">暂无模型</p>';
          return;
        }

        modelList.innerHTML = models
          .map(
            (item) => `
          <div style="border: 1px solid var(--md-sys-color-neutral-container); padding: 15px; border-radius: 8px; background: var(--md-sys-color-surface);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>供应商:</strong> ${item.provider}<br/>
                <strong>API Key:</strong> ${item.maskedKey}<br/>
                <strong>并发数:</strong> ${item.concurrent}<br/>
                <strong>创建时间:</strong> ${item.formattedDate}
              </div>
              <button 
                onclick="window.deleteModel('${item.id}')" 
                style="padding: 5px 15px; background: var(--md-sys-color-error); color: var(--md-sys-color-on-error); border: none; border-radius: 4px; cursor: pointer;"
              >
                删除
              </button>
            </div>
          </div>
        `
          )
          .join("");
      }

      window.deleteModel = (id) => {
        const index = models.findIndex((item) => item.id === id);
        if (index > -1) {
          models.splice(index, 1);
          renderModelList();
        }
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const provider = providerSelect.value;
        const apiKey = apiKeyInput.value.trim();

        if (!apiKey) {
          alert("请输入 API Key");
          return;
        }

        try {
          await saveKey(apiKey, provider);
          apiKeyInput.value = "";
          renderModelList();
          alert("添加成功！");
        } catch (error) {
          alert("添加失败：" + error.message);
        }
      });

      models.watchTick(() => {
        renderModelList();
      });

      renderModelList();
    </script>
  </body>
</html>
