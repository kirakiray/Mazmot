<template page>
  <style>
    :host {
      display: block;
      width: 100%;
    }
    .api-form {
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 8px;
      padding: 20px;
    }
    .api-form h2 {
      color: var(--md-sys-color-on-surface);
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .hint-text {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      text-align: center;
      margin-top: 10px;
    }
  </style>
  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />
  <l-m src="https://punch-ui-v2.pages.dev/packages/select/select.html"></l-m>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/textarea/textarea.html"
  ></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>

  <div class="api-form">
    <h2>为小墨注入灵魂</h2>

    <div class="form-group">
      <label>选择 AI 提供商</label>
      <p-select placeholder="请选择提供商" sync:value="selectedProvider">
        <p-option value="deepseek">DeepSeek</p-option>
        <p-option value="kimi">Kimi</p-option>
      </p-select>
    </div>

    <div class="form-group">
      <p-textarea
        sync:value="apiKey"
        placeholder="请输入 API Key"
        style="width: 100%"
        attr:disabled="testing"
        rows="3"
      >
        <span slot="label">
          <o-if :value="selectedProvider === 'deepseek'">DeepSeek API Key</o-if>
          <o-if :value="selectedProvider === 'kimi'">Kimi API Key</o-if>
        </span>
      </p-textarea>
    </div>

    <div class="button-group">
      <p-button
        color="primary"
        on:click="saveApiKey"
        attr:disabled="!apiKey.trim() || testing"
        size="s"
      >
        <o-if :value="testing">验证中...</o-if>
        <o-if :value="!testing">保存并启动</o-if>
      </p-button>
    </div>

    <div class="hint-text">API Key 将安全存储在本地，仅用于与 AI 服务通信</div>
  </div>
  <script>
    export default async ({ load, url }) => {
      const { saveKey, testApiKey } = await load("../../ai/main.js");
      const { toast } = await load(
        "https://punch-ui-v2.pages.dev/packages/util/toast.js",
      );

      return {
        data: {
          selectedProvider: "deepseek",
          apiKey: "",
          testing: false,
        },
        proto: {
          async saveApiKey() {
            const apiKey = this.apiKey.trim();
            if (!apiKey) {
              toast({ message: "请输入 API Key", color: "error" });
              return;
            }

            // 设置测试状态
            this.testing = true;

            try {
              // 先测试 API Key 是否有效
              const testResult = await testApiKey(
                apiKey,
                this.selectedProvider,
              );

              if (!testResult.valid) {
                toast({
                  message: "API Key 验证失败：" + testResult.message,
                  color: "error",
                });
                this.testing = false;
                return;
              }

              // 验证成功，保存 API Key
              await saveKey(apiKey, this.selectedProvider);
              this.apiKey = "";

              // 触发事件通知父页面
              this.emit("success", {
                provider: this.selectedProvider,
              });
            } catch (error) {
              toast({ message: "操作失败：" + error.message, color: "error" });
            } finally {
              this.testing = false;
            }
          },
        },
      };
    };
  </script>
</template>
