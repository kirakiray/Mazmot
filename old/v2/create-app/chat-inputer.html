<template page>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/textarea/textarea.html"
  ></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>

  <style>
    :host {
      display: block;
      width: 600px;
      max-width: 90vw;
    }

    .chat-inputer {
      background: var(--md-sys-color-surface-variant);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 4px 10px
        rgb(from var(--md-sys-color-on-surface) r g b / 0.1);
      opacity: 0.3;
      transition: opacity 0.3s ease;
    }

    .chat-inputer:hover,
    .chat-inputer:focus-within {
      opacity: 0.9;
    }

    .input-area {
      margin-bottom: 12px;
    }

    .input-area p-textarea {
      width: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toolbar-left {
      display: flex;
      gap: 4px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .char-count {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .char-count.warning {
      color: var(--md-sys-color-error);
    }
  </style>

  <div class="chat-inputer">
    <div class="input-area">
      <p-textarea
        placeholder="输入消息..."
        sync:value="messageText"
        attr:maxlength="maxLength"
        size="s"
        on:keydown="handleKeyDown"
        on:mousedown="$event.stopPropagation()"
      >
      </p-textarea>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <p-button size="s" variant="outlined" icon on:click="handleVoice">
          <n-icon icon="material-symbols:mic"></n-icon>
        </p-button>
      </div>

      <div class="toolbar-right">
        <span
          class="char-count"
          class:warning="messageText.length > maxLength * 0.8"
        >
          {{messageText.length}}/{{maxLength}}
        </span>

        <p-button
          size="s"
          color="primary"
          on:click="handleSend"
          attr:disabled="!messageText.trim()"
        >
          <n-icon slot="prefix" icon="ri:chat-ai-line"></n-icon>
          发送
        </p-button>
      </div>
    </div>
  </div>
  </div>

  <o-consumer name="app-builder"></o-consumer>

  <script>
    export default async () => {
      return {
        data: {
          messageText: "",
          maxLength: 500,
        },
        proto: {
          handleKeyDown(e) {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
              e.preventDefault();
              this.handleSend();
            }
          },
          handleSend() {
            console.log("handleSend called, messageText:", this.messageText);
            if (this.messageText.trim()) {
              const provider = this.getProvider("app-builder");
              console.log("Provider found:", provider);
              if (provider) {
                console.log("Dispatching send-message event");
                provider.dispatch("send-message", {
                  data: { message: this.messageText },
                });
              }
              this.messageText = "";
            }
          },
          handleVoice() {
            console.log("语音输入");
          },
        },
      };
    };
  </script>
</template>
