<template page>
  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/textarea/textarea.html"
  ></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/select/select.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/switch/switch.html"></l-m>

  <style>
    :host {
      display: block;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--md-sys-color-neutral-container);
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chat-header p-select {
      min-width: 180px;
    }

    .chat-options {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
    }

    .thinking-section {
      margin-bottom: 8px;
    }

    .thinking-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.7;
      user-select: none;
    }

    .thinking-header:hover {
      opacity: 1;
    }

    .thinking-icon {
      display: inline-block;
      transition: transform 0.2s;
    }

    .thinking-icon.expanded {
      transform: rotate(90deg);
    }

    .thinking-content {
      margin-top: 8px;
      padding: 10px;
      background: var(--md-sys-color-surface-container-highest);
      border-radius: 8px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 3px solid var(--md-sys-color-primary);
    }

    .empty-state {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.6;
    }

    .chat-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--md-sys-color-neutral-container);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .chat-footer p-textarea {
      flex: 1;
    }

    .loading-dots {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--md-sys-color-on-surface-variant);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {
      0%,
      80%,
      100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }
  </style>

  <div class="chat-header">
    <p-select :value="selectedModel" on:change="handleModelChange($event)">
      <span slot="label">模型</span>
      <o-fill :value="apiKeys">
        <p-option attr:value="$data.id"
          >{{$data.provider}} - {{$data.maskedKey}}</p-option
        >
      </o-fill>
    </p-select>
    <div class="chat-options">
      <div class="option-item">
        <p-switch
          :checked="streamEnabled"
          on:change="streamEnabled = $event.target.checked"
        ></p-switch>
        <span>流式输出</span>
      </div>
      <div class="option-item">
        <p-switch
          :checked="thinkingEnabled"
          on:change="thinkingEnabled = $event.target.checked"
        ></p-switch>
        <span>思考模式</span>
      </div>
    </div>
  </div>

  <div class="chat-body">
    <o-if :value="messages.length === 0">
      <div class="empty-state">
        <p>开始和 AI 对话吧！</p>
      </div>
    </o-if>
    <o-fill :value="messages">
      <div class="message {{$data.role}}">
        <o-if :value="$data.reasoningContent">
          <div class="thinking-section">
            <div
              class="thinking-header"
              on:click="$data.thinkingExpanded = !$data.thinkingExpanded"
            >
              <span
                class="thinking-icon {{$data.thinkingExpanded ? 'expanded' : ''}}"
                >▶</span
              >
              <span>思考过程</span>
            </div>
            <o-if :value="$data.thinkingExpanded">
              <div class="thinking-content">{{$data.reasoningContent}}</div>
            </o-if>
          </div>
        </o-if>
        <div>{{$data.content}}</div>
      </div>
    </o-fill>
    <o-if :value="isLoading">
      <div class="message assistant">
        <div class="loading-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </o-if>
  </div>

  <div class="chat-footer">
    <p-textarea
      :value="inputMessage"
      on:input="inputMessage = $event.target.value"
      placeholder="输入消息..."
      rows="2"
    >
    </p-textarea>
    <p-button
      color="primary"
      on:click="sendMessage"
      :disabled="isLoading || !inputMessage.trim()"
    >
      发送
    </p-button>
  </div>

  <script>
    export const parent = "./layout.html";

    export default async ({ load }) => {
      const { getAssistant, apiKeys } = await load("../ai/main.js");
      const { storage } = await load("/gh/kirakiray/ever-cache/src/main.js");

      return {
        data: {
          selectedModel: "",
          inputMessage: "",
          messages: [],
          isLoading: false,
          apiKeys: [],
          streamEnabled: true,
          thinkingEnabled: false,
        },

        proto: {
          handleModelChange(e) {
            this.selectedModel = e.target.value;
            this.saveSelectedModel();
          },

          async sendMessage() {
            const message = this.inputMessage.trim();
            if (!message || this.isLoading) return;

            if (!this.selectedModel && this.apiKeys.length > 0) {
              this.selectedModel = this.apiKeys[0].id;
            }

            if (!this.selectedModel) {
              alert("请先在设置中添加 API Key");
              return;
            }

            this.messages.push({
              role: "user",
              content: message,
            });

            this.inputMessage = "";
            this.isLoading = true;
            this.saveMessages();

            const assistantMessageIndex = this.messages.length;
            this.messages.push({
              role: "assistant",
              content: "",
              reasoningContent: "",
              thinkingExpanded: false,
            });

            try {
              const assistant = await getAssistant(this.selectedModel);

              if (this.streamEnabled) {
                await assistant.chat({
                  message,
                  thinking: this.thinkingEnabled,
                  stream: true,
                  onStream: (data) => {
                    this.messages[assistantMessageIndex].content = data.content;
                    if (data.reasoningContent) {
                      this.messages[assistantMessageIndex].reasoningContent =
                        data.reasoningContent;
                    }
                  },
                });
              } else {
                const response = await assistant.chat({
                  message,
                  thinking: this.thinkingEnabled,
                  stream: false,
                });
                this.messages[assistantMessageIndex].content = response.content;
                if (response.reasoningContent) {
                  this.messages[assistantMessageIndex].reasoningContent =
                    response.reasoningContent;
                }
              }
            } catch (error) {
              this.messages[assistantMessageIndex].content =
                `错误: ${error.message}`;
              this.messages[assistantMessageIndex].reasoningContent = "";
            } finally {
              this.isLoading = false;
              this.saveMessages();
            }
          },

          async saveMessages() {
            storage.chatMessages = this.messages.toJSON();
          },

          async loadMessages() {
            const saved = await storage.chatMessages;
            if (saved && Array.isArray(saved)) {
              this.messages = saved;
            }
          },

          async saveSelectedModel() {
            storage.selectedModel = this.selectedModel;
          },

          async loadSelectedModel() {
            const saved = await storage.selectedModel;
            if (saved) {
              this.selectedModel = saved;
            }
          },
        },

        async attached() {
          this.apiKeys = apiKeys;
          await this.loadSelectedModel();
          if (!this.selectedModel && apiKeys.length > 0) {
            this.selectedModel = apiKeys[0].id;
          }
          await this.loadMessages();
          this.emit("page-active", {
            data: "start",
            bubbles: true,
            composed: true,
          });
        },

        detached() {
          this.apiKeys = [];
        },
      };
    };
  </script>
</template>
