<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试 get-capability 能力</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <l-m
      src="/capabilities/capability-diagnosis/src/capability-diagnosis.html"
    ></l-m>

    <capability-diagnosis label="测试获取所有能力列表">
      <cap-request>
        <template
          name="get-capability"
          cid="get-cap-01"
          desc="获取所有能力列表"
          data-all="true"
        >
        </template>
      </cap-request>
      <template result cid="get-cap-01">
        <script type="module">
          export default async function (result) {
            return {
              assert: Array.isArray(result) && result.length > 0,
              content: `获取到 ${result.length} 个能力`,
            };
          }
        </script>
      </template>
    </capability-diagnosis>

    <capability-diagnosis label="测试获取指定能力详情">
      <cap-request>
        <template
          name="get-capability"
          cid="get-cap-02"
          desc="获取 run-js 能力详情"
          data-name="run-js"
        >
        </template>
      </cap-request>
      <template result cid="get-cap-02">
        <script type="module">
          export default async function (result) {
            const hasContent = result.name === "run-js" && result.content;
            return {
              assert: hasContent,
              content: hasContent ? "成功获取能力详情" : "获取失败",
            };
          }
        </script>
      </template>
    </capability-diagnosis>

    <capability-diagnosis label="测试获取能力目录下的特定文件">
      <cap-request>
        <template
          name="get-capability"
          cid="get-cap-03"
          desc="获取 fs 能力的 main.js 文件"
          data-name="fs"
          data-file="main.js"
        >
        </template>
      </cap-request>
      <template result cid="get-cap-03">
        <script type="module">
          export default async function (result) {
            const hasContent =
              result.name === "fs" &&
              result.file === "main.js" &&
              result.content;

            return {
              assert: hasContent,
              content: hasContent ? "成功获取能力文件内容" : "获取失败",
            };
          }
        </script>
      </template>
    </capability-diagnosis>
  </body>
</html>
