    <capability-diagnosis label="测试点击按钮">
      <iframe src="./test-page.html" frameborder="0" slot="emulator"></iframe>
      <cap-request>
        <template
          name="emulator-interact"
          cid="click-01"
          data-xpath="/html/body/div/div[1]/button[@id='btn-click']"
          data-action="click"
          desc="点击主按钮"
        >
        </template>
      </cap-request>
      <template result cid="click-01">
        <script type="module">
          export default async function (result) {
            console.log(result);

            // 验证返回结果包含必要字段
            const hasRequiredFields =
              result.success &&
              result.action === "click" &&
              result.message &&
              result.position;

            // 验证点击位置有效
            const hasValidPosition =
              typeof result.position.x === "number" &&
              typeof result.position.y === "number";

            return {
              assert: hasRequiredFields && hasValidPosition,
              content: result,
            };
          }
        </script>
      </template>
    </capability-diagnosis>
