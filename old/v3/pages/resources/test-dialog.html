<template component>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/dialog/dialog.html"></l-m>
  <style>
    :host {
      display: contents;
    }
    .test-dialog-iframe {
      width: 100%;
      height: 60vh;
      border: none;
    }
    #testDialog iframe {
      min-width: 80vw;
    }
    .test-report {
      margin-bottom: 16px;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 8px;
      overflow: hidden;
    }
    .test-report-header {
      padding: 12px 16px;
      background: var(--md-sys-color-surface-container-high);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .test-report-summary {
      padding: 8px 16px;
      background: var(--md-sys-color-surface-container);
      font-size: 13px;
      display: flex;
      gap: 16px;
    }
    .test-report-summary span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pass-count {
      color: var(--md-sys-color-success);
    }
    .fail-count {
      color: var(--md-sys-color-error);
    }
    .iframe-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--md-sys-color-on-surface-variant);
    }
    .iframe-loading-icon {
      font-size: 48px;
      animation: spin 1s linear infinite;
    }
    .iframe-loading-text {
      margin-top: 16px;
      font-size: 14px;
    }
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <p-dialog
    id="testDialog"
    title="测试能力"
    :open="open"
    on:click-mask="emit('click-mask')"
  >
    <div
      style="cursor: pointer; position: absolute; top: 24px; right: 24px"
      on:click="open = false; emit('close')"
    >
      <n-icon icon="mdi:close" style="font-size: 20px"></n-icon>
    </div>
    <o-if :value="testResults.length > 0">
      <div class="test-report">
        <div class="test-report-header">
          <n-icon icon="fluent-mdl2:test-case"></n-icon>
          测试报告
        </div>
        <div class="test-report-summary">
          <span class="pass-count">✓ 通过: {{ passCount }}</span>
          <span class="fail-count">✗ 失败: {{ failCount }}</span>
        </div>
      </div>
    </o-if>
    <o-if :value="iframeLoading">
      <div class="iframe-loading">
        <n-icon class="iframe-loading-icon" icon="eos-icons:loading"></n-icon>
        <p class="iframe-loading-text">加载中...</p>
      </div>
    </o-if>
    <iframe
      class="test-dialog-iframe"
      attr:src="iframeSrc"
      on:load="iframeLoading = false"
      :style.display="iframeLoading ? 'none' : ''"
    ></iframe>
  </p-dialog>
  <script>
    export default {
      tag: "test-dialog",
      attrs: {
        iframeSrc: "",
      },
      data: {
        open: null,
        testResults: [],
        iframeLoading: true,
      },
      watch: {
        open(newVal) {
          if (newVal) {
            this.testResults = [];
            this.iframeLoading = true;
          }
        },
        testResults(newVal) {
          if (newVal.length > 0) {
            const allPass = newVal.every((r) => r.assert);
            this.emit("test-complete", { data: { allPass, results: newVal } });
          }
        },
      },
      proto: {
        get passCount() {
          return this.testResults.filter((r) => r.assert).length;
        },
        get failCount() {
          return this.testResults.filter((r) => !r.assert).length;
        },
        handleTestResults(event) {
          if (
            event.data &&
            event.data.type === "test-cap-results" &&
            event.data.source === "test-cap"
          ) {
            this.testResults = event.data.payload || [];
          }
        },
        resetResults() {
          this.testResults = [];
        },
      },
      attached() {
        this._handleTestResults = this.handleTestResults.bind(this);
        window.addEventListener("message", this._handleTestResults);
      },
      detached() {
        if (this._handleTestResults) {
          window.removeEventListener("message", this._handleTestResults);
        }
      },
    };
  </script>
</template>
