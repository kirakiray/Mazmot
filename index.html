<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazmot</title>
    <script type="module">
      // 根路径只做一件事：把用户送去主应用 apps/main/。
      // 若 NoneOS Core 未安装，先去引导页，安装完自动重定向回 apps/main/。
      fetch("/__config")
        .then((e) => e.json())
        .then(() => {
          location.replace("/apps/main/");
        })
        .catch(() => {
          location.replace("/_bootstrap.html?redirect=/apps/main/");
        });
    </script>
  </head>
  <body></body>
</html>
