<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>share-mgr 单元测试</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/ofajs/sibyl-test/components/sb-test.mjs"
    ></script>
  </head>
  <body>
    <h1>share-mgr 单元测试</h1>

    <!-- ================= buildRunUrl / parseShareUrl ================= -->
    <sb-test name="buildRunUrl 生成的短链接只带 u/h 两个参数">
      <template>
        <script type="module">
          import { buildRunUrl } from "../share-mgr.js";
          {
            const userId = "abc123";
            const payloadHash = "deadbeef";
            const url = buildRunUrl(
              "http://localhost:30031",
              userId,
              payloadHash,
            );
            const parsed = new URL(url);
            return {
              assert:
                parsed.pathname === "/apps/run-app/" &&
                parsed.searchParams.get("u") === userId &&
                parsed.searchParams.get("h") === payloadHash &&
                Array.from(parsed.searchParams.keys()).length === 2,
              content: { url },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="buildRunUrl/parseShareUrl 往返保留 userId/payloadHash">
      <template>
        <script type="module">
          import { buildRunUrl, parseShareUrl } from "../share-mgr.js";
          {
            const userId = "user-abc";
            const payloadHash = "hash-xyz";
            const url = buildRunUrl(
              "http://localhost:30031",
              userId,
              payloadHash,
            );
            const parsed = parseShareUrl(new URL(url).search);
            return {
              assert:
                parsed &&
                parsed.userId === userId &&
                parsed.payloadHash === payloadHash,
              content: { url, parsed },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="parseShareUrl 对空/缺参数返回 null">
      <template>
        <script type="module">
          import { parseShareUrl } from "../share-mgr.js";
          {
            const r1 = parseShareUrl("");
            const r2 = parseShareUrl("?x=1");
            const r3 = parseShareUrl("?u=abc"); // 缺 h
            const r4 = parseShareUrl("?h=abc"); // 缺 u
            return {
              assert:
                r1 === null && r2 === null && r3 === null && r4 === null,
              content: { r1, r2, r3, r4 },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="buildRunUrl 对特殊字符做 URL 编码">
      <template>
        <script type="module">
          import { buildRunUrl, parseShareUrl } from "../share-mgr.js";
          {
            const userId = "abc+def=";
            const payloadHash = "h/ash";
            const url = buildRunUrl(
              "http://localhost:30031",
              userId,
              payloadHash,
            );
            const parsed = parseShareUrl(new URL(url).search);
            return {
              assert:
                !url.includes("+def=") &&
                !url.includes("h/ash") &&
                parsed.userId === userId &&
                parsed.payloadHash === payloadHash,
              content: { url, parsed },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= buildRunUrl + appParams ================= -->
    <sb-test name="buildRunUrl 带应用业务参数时追加到 URL">
      <template>
        <script type="module">
          import { buildRunUrl } from "../share-mgr.js";
          {
            const url = buildRunUrl(
              "http://localhost:30031",
              "userA",
              "hashA",
              { role: "guest", host: "userB" },
            );
            const parsed = new URL(url);
            return {
              assert:
                parsed.searchParams.get("u") === "userA" &&
                parsed.searchParams.get("h") === "hashA" &&
                parsed.searchParams.get("role") === "guest" &&
                parsed.searchParams.get("host") === "userB" &&
                Array.from(parsed.searchParams.keys()).length === 4,
              content: { url },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="buildRunUrl appParams 缺省时不影响旧链接（向后兼容）">
      <template>
        <script type="module">
          import { buildRunUrl } from "../share-mgr.js";
          {
            const url = buildRunUrl(
              "http://localhost:30031",
              "userA",
              "hashA",
            );
            const keys = Array.from(new URL(url).searchParams.keys());
            return {
              assert:
                keys.length === 2 &&
                keys.includes("u") &&
                keys.includes("h"),
              content: { url, keys },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="buildRunUrl 过滤 appParams 中的 undefined / null">
      <template>
        <script type="module">
          import { buildRunUrl } from "../share-mgr.js";
          {
            const url = buildRunUrl(
              "http://localhost:30031",
              "userA",
              "hashA",
              { keep: "yes", drop1: undefined, drop2: null },
            );
            const sp = new URL(url).searchParams;
            return {
              assert:
                sp.get("keep") === "yes" &&
                !sp.has("drop1") &&
                !sp.has("drop2"),
              content: { url },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="buildRunUrl appParams 支持数字值与特殊字符编码">
      <template>
        <script type="module">
          import { buildRunUrl } from "../share-mgr.js";
          {
            const url = buildRunUrl(
              "http://localhost:30031",
              "userA",
              "hashA",
              { page: 3, q: "a b&c" },
            );
            const sp = new URL(url).searchParams;
            return {
              assert:
                sp.get("page") === "3" &&
                sp.get("q") === "a b&c" &&
                !url.includes("a b&c"),
              content: { url },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= splitShareQuery ================= -->
    <sb-test name="splitShareQuery 把 u/h 与业务参数分离">
      <template>
        <script type="module">
          import { splitShareQuery } from "../share-mgr.js";
          {
            const r = splitShareQuery(
              "?u=hostUser&h=hash123&role=guest&host=hostUser",
            );
            return {
              assert:
                r.userId === "hostUser" &&
                r.payloadHash === "hash123" &&
                r.appParams.role === "guest" &&
                r.appParams.host === "hostUser" &&
                Object.keys(r.appParams).length === 2,
              content: { r },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="splitShareQuery 无业务参数时 appParams 为空对象">
      <template>
        <script type="module">
          import { splitShareQuery } from "../share-mgr.js";
          {
            const r = splitShareQuery("?u=a&h=b");
            return {
              assert:
                r.userId === "a" &&
                r.payloadHash === "b" &&
                Object.keys(r.appParams).length === 0,
              content: { r },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="splitShareQuery 空/缺 u/h 时也返回完整结构（不返回 null）">
      <template>
        <script type="module">
          import { splitShareQuery } from "../share-mgr.js";
          {
            const r1 = splitShareQuery("");
            const r2 = splitShareQuery("?role=guest");
            const r3 = splitShareQuery("?u=a&role=x");
            return {
              assert:
                r1.userId === "" &&
                r1.payloadHash === "" &&
                Object.keys(r1.appParams).length === 0 &&
                r2.appParams.role === "guest" &&
                r3.userId === "a" &&
                r3.payloadHash === "" &&
                r3.appParams.role === "x",
              content: { r1, r2, r3 },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="splitShareQuery 与 buildRunUrl 往返一致（端到端）">
      <template>
        <script type="module">
          import { buildRunUrl, splitShareQuery } from "../share-mgr.js";
          {
            const appParams = { role: "guest", host: "userHost", token: "a&b=c" };
            const url = buildRunUrl(
              "http://localhost:30031",
              "publisher",
              "payloadHash",
              appParams,
            );
            const split = splitShareQuery(new URL(url).search);
            return {
              assert:
                split.userId === "publisher" &&
                split.payloadHash === "payloadHash" &&
                split.appParams.role === "guest" &&
                split.appParams.host === "userHost" &&
                split.appParams.token === "a&b=c",
              content: { url, split },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= buildPackageFile ================= -->
    <sb-test name="buildPackageFile 结构正确且文件名使用 recordName">
      <template>
        <script type="module">
          import { buildPackageFile, PACKAGE_VERSION } from "../share-mgr.js";
          {
            const files = [{ path: "index.html", content: "<h1>hi</h1>" }];
            const meta = { recordName: "test-app", appId: "abc123" };
            const file = buildPackageFile(files, meta);
            const text = await file.text();
            const pkg = JSON.parse(text);
            return {
              assert:
                file.name === "test-app.mazmot.json" &&
                pkg.mazmotPackage === PACKAGE_VERSION &&
                pkg.meta.recordName === "test-app" &&
                pkg.files.length === 1 &&
                pkg.files[0].path === "index.html",
              content: { fileName: file.name, pkg },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= buildSharePayloadFile ================= -->
    <sb-test name="buildSharePayloadFile 使用 appId 作为文件名并序列化 payload">
      <template>
        <script type="module">
          import { buildSharePayloadFile } from "../share-mgr.js";
          {
            const payload = {
              appId: "demo",
              displayName: "Demo",
              publisherUserId: "u1",
              fileHash: "h1",
            };
            const file = buildSharePayloadFile(payload);
            const parsed = JSON.parse(await file.text());
            return {
              assert:
                file.name === "demo.share.json" &&
                file.type === "application/json" &&
                parsed.appId === "demo" &&
                parsed.fileHash === "h1",
              content: { fileName: file.name, parsed },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="buildSharePayloadFile 无 appId 时回退到 mazmot 名">
      <template>
        <script type="module">
          import { buildSharePayloadFile } from "../share-mgr.js";
          {
            const file = buildSharePayloadFile({});
            return {
              assert: file.name === "mazmot.share.json",
              content: { fileName: file.name },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= isPublicKeyOfUser ================= -->
    <sb-test name="isPublicKeyOfUser 输入为空时返回 false">
      <template>
        <script type="module">
          import { isPublicKeyOfUser } from "../share-mgr.js";
          {
            const r1 = await isPublicKeyOfUser("", "user1");
            const r2 = await isPublicKeyOfUser("pk", "");
            const r3 = await isPublicKeyOfUser(null, null);
            return {
              assert: r1 === false && r2 === false && r3 === false,
              content: { r1, r2, r3 },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="isPublicKeyOfUser 匹配/不匹配都能正确判定">
      <template>
        <script type="module">
          import { isPublicKeyOfUser } from "../share-mgr.js";
          import { getHash } from "/nos/util/hash/main.js";
          {
            const pk = "some-public-key-string";
            const uid = await getHash(pk);
            const ok = await isPublicKeyOfUser(pk, uid);
            const bad = await isPublicKeyOfUser(pk, "not-the-right-uid");
            return {
              assert: ok === true && bad === false,
              content: { pk, uid, ok, bad },
            };
          }
        </script>
      </template>
    </sb-test>
  </body>
</html>
