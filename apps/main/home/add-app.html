<template page>
  <style>
    :host {
      display: block;
    }
    .section {
      margin-bottom: 24px;
      padding: 0 16px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 4px;
    }
    .section-desc {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.7;
      margin-top: 12px;
      line-height: 1.5;
    }
    .section-header {
      padding-bottom: 4px;
      border-bottom: 1px solid var(--md-sys-color-surface-variant);
      margin-bottom: 12px;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* 步骤导航条 */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 16px 12px;
      margin-bottom: 4px;
    }
    .step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .step[active],
    .step[done] {
      color: var(--md-sys-color-primary);
      opacity: 1;
    }
    .step-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 600;
      font-size: 11px;
      line-height: 1;
      transition: all 0.2s;
    }
    .step-circle iconify-icon {
      font-size: 12px;
    }
    .step[active] .step-circle,
    .step[done] .step-circle {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }
    .step-label {
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }
    .step-line {
      width: 32px;
      height: 2px;
      border-radius: 1px;
      background-color: var(--md-sys-color-surface-variant);
      transition: background-color 0.2s;
    }
    .step-line[done] {
      background-color: var(--md-sys-color-primary);
    }

    /* 表单 */
    .form-field {
      margin-bottom: 16px;
    }
    .form-field p-input,
    .form-field p-textarea {
      width: 100%;
    }
    .field-error {
      color: var(--md-sys-color-error);
      font-size: 12px;
      margin-top: 6px;
      min-height: 16px;
    }
    .selected-info {
      padding: 12px 16px;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 8px;
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 16px;
      word-break: break-all;
    }

    /* 模板选择 */
    .template-label {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 6px;
    }
    .template-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .template-card {
      flex: 1 1 160px;
      min-width: 160px;
      padding: 10px 12px;
      border: 1px solid var(--md-sys-color-surface-variant);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      background-color: var(--md-sys-color-surface);
    }
    .template-card:hover {
      border-color: var(--md-sys-color-primary);
    }
    .template-card[active] {
      border-color: var(--md-sys-color-primary);
      background-color: var(--md-sys-color-primary-container);
    }
    .template-card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      margin-bottom: 2px;
    }
    .template-card[active] .template-card-name {
      color: var(--md-sys-color-on-primary-container);
    }
    .template-card-desc {
      font-size: 11px;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.4;
    }
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--md-sys-color-surface-variant);
      margin-top: 12px;
    }

    /* 写入进度条 */
    .progress-wrap {
      padding: 8px 0 16px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background-color: var(--md-sys-color-primary);
      transition: width 0.2s;
    }
    .progress-text {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }
    .file-list {
      margin-top: 16px;
      max-height: 200px;
      overflow-y: auto;
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .file-item {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: monospace;
    }
    .file-item[status="done"] {
      color: var(--md-sys-color-primary);
    }
    .success-block {
      text-align: center;
      padding: 16px;
      color: var(--md-sys-color-primary);
    }
    .success-block iconify-icon {
      font-size: 48px;
    }
  </style>

  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/textarea/textarea.html"
  ></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>

  <!-- 步骤导航条 -->
  <div class="steps">
    <div class="step" attr:active="step === 1" attr:done="step > 1">
      <div class="step-circle">
        <x-if :value="step > 1">
          <n-icon icon="mdi:check"></n-icon>
        </x-if>
        <x-if :value="step <= 1">1</x-if>
      </div>
      <div class="step-label">选择应用来源</div>
    </div>
    <div class="step-line" attr:done="step > 1"></div>
    <div class="step" attr:active="step === 2" attr:done="step > 2">
      <div class="step-circle">
        <x-if :value="step > 2">
          <n-icon icon="mdi:check"></n-icon>
        </x-if>
        <x-if :value="step <= 2">2</x-if>
      </div>
      <div class="step-label">应用信息</div>
    </div>
    <div class="step-line" attr:done="step > 2"></div>
    <div class="step" attr:active="step === 3">
      <div class="step-circle">3</div>
      <div class="step-label">初始化文件</div>
    </div>
  </div>

  <!-- Step 1: 选择应用来源 -->
  <o-if :value="step === 1">
    <!-- 开发应用 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">创建或导入应用</div>
      </div>
      <div class="btn-group">
        <p-button color="primary" variant="outlined" on:click="chooseVirtual">
          虚拟目录
        </p-button>
        <p-button
          color="primary"
          variant="outlined"
          on:click="chooseLocal"
          attr:disabled="!supportLocalDir"
        >
          本地目录
        </p-button>
      </div>
      <div class="section-desc">
        虚拟目录基于 NoneOS
        虚拟文件系统，数据存储在浏览器内；本地目录则挂载你电脑上的真实文件夹。
      </div>
      <o-if :value="!supportLocalDir">
        <div
          class="section-desc"
          style="color: var(--md-sys-color-error); opacity: 1"
        >
          当前浏览器不支持 showDirectoryPicker API，无法选择本地目录，建议使用
          Chrome 或基于 Chromium 的浏览器。
        </div>
      </o-if>
    </div>

    <!-- 应用市场 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">应用市场</div>
      </div>
      <p-button color="primary" variant="outlined" disabled>浏览市场</p-button>
      <div class="section-desc">浏览官方收录的应用，一键安装。</div>
    </div>

    <!-- 外源下载 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">外源下载</div>
      </div>
      <div
        style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap"
      >
        <p-input
          placeholder="https://example.com/app.zip"
          disabled
          style="flex: 1 0 320px"
        >
          <span slot="label">应用包地址</span>
        </p-input>
        <p-button color="primary" variant="outlined" disabled> 安装 </p-button>
      </div>
      <div style="margin-top: 12px">
        <p-button color="primary" variant="outlined" disabled>
          选择安装包
        </p-button>
      </div>
      <div class="section-desc">
        通过外部 URL 自动下载安装，或选择本地开发的 ZIP 安装包。
      </div>
    </div>
  </o-if>

  <!-- Step 2: 应用名称与描述 -->
  <o-if :value="step === 2">
    <div class="section">
      <div class="selected-info">
        <o-if :value="source === 'local'">
          <div>已选择本地目录：<strong>{{selectedDirName}}</strong></div>
        </o-if>
        <o-if :value="source === 'virtual'">
          <div>已选择：<strong>虚拟目录</strong>（数据将保存在浏览器内）</div>
        </o-if>
      </div>

      <div class="form-field">
        <p-input
          sync:value="appName"
          placeholder="例如：my-app"
          hang-label
          on:input="onNameInput"
        >
          <span slot="label">应用名称 *</span>
        </p-input>
        <div class="field-error">{{nameError}}</div>
      </div>

      <div class="form-field">
        <p-textarea
          sync:value="appDesc"
          placeholder="简单描述你的应用（可选）"
          hang-label
          rows="3"
        >
          <span slot="label">应用描述</span>
        </p-textarea>
      </div>

      <div class="form-field">
        <div class="template-label">选择模板 *</div>
        <div class="template-list">
          <o-fill :value="templates">
            <div
              class="template-card"
              attr:active="$data.id === $host.templateId"
              on:click="$host.selectTemplate($data.id)"
            >
              <div class="template-card-name">{{$data.name}}</div>
              <o-if :value="$data.desc">
                <div class="template-card-desc">{{$data.desc}}</div>
              </o-if>
            </div>
          </o-fill>
        </div>
      </div>

      <div class="section-desc">
        应用名称只能包含字母、数字、下划线（_）和连字符（-），不能包含空格或特殊字符，且不能与已有的应用重复。
      </div>
    </div>

    <div class="footer">
      <p-button variant="text" on:click="backToStep1">上一步</p-button>
      <p-button
        color="primary"
        on:click="confirmAppInfo"
        attr:loading="submitting"
        attr:disabled="submitting"
      >
        确认
      </p-button>
    </div>
  </o-if>

  <!-- Step 3: 写入文件 -->
  <o-if :value="step === 3">
    <div class="section">
      <div class="selected-info">
        <div>应用名称：<strong>{{appName}}</strong></div>
        <o-if :value="appDesc">
          <div style="margin-top: 4px">描述：{{appDesc}}</div>
        </o-if>
        <o-if :value="source === 'local'">
          <div style="margin-top: 4px">目标目录：{{selectedDirName}}</div>
        </o-if>
        <o-if :value="source === 'virtual'">
          <div style="margin-top: 4px">目标：虚拟目录（浏览器内存储）</div>
        </o-if>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" :style.width="progress + '%'"></div>
        </div>
        <div class="progress-text">
          <span>{{progressText}}</span>
          <span>{{progress}}%</span>
        </div>

        <div class="file-list">
          <o-fill :value="fileLogs">
            <div class="file-item" attr:status="$data.status">
              <n-icon
                icon="mdi:check-circle"
                x-if="$data.status === 'done'"
              ></n-icon>
              <n-icon
                icon="mdi:progress-clock"
                x-if="$data.status === 'writing'"
              ></n-icon>
              <span>{{$data.path}}</span>
            </div>
          </o-fill>
        </div>
      </div>

      <o-if :value="finished">
        <div class="success-block">
          <n-icon icon="mdi:check-circle"></n-icon>
          <div style="margin-top: 8px; font-size: 14px">应用创建完成！</div>
        </div>
      </o-if>
    </div>

    <div class="footer">
      <p-button
        color="primary"
        on:click="closeDialog"
        attr:disabled="!finished"
      >
        完成
      </p-button>
    </div>
  </o-if>

  <script>
    import { open, get, init } from "/nos/fs/main.js";
    import { storage } from "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js";
    import {
      toast,
      alert,
      confirm,
    } from "https://punch-ui-v2.pages.dev/packages/util.js";
    import { writeTemplateFiles, loadTemplates } from "./template-writer.js";
    import { generateAppId } from "../lib/share-mgr.js";

    export default async () => {
      let templates = [];
      try {
        templates = await loadTemplates();
      } catch (err) {
        console.warn("加载模板列表失败：", err);
      }
      const defaultTemplateId = templates.length > 0 ? templates[0].id : "base";

      return {
        data: {
          step: 1,
          source: "", // "local" | "virtual"
          supportLocalDir:
            typeof window !== "undefined" &&
            typeof window.showDirectoryPicker === "function",
          _selectedHandle: null, // 用户选择的目录句柄（本地或虚拟，_ 前缀避免响应式代理复杂对象）
          _virtualNamespace: "", // 虚拟目录使用的命名空间
          selectedDirName: "",
          appName: "",
          appDesc: "",
          nameError: "",
          templates,
          templateId: defaultTemplateId,
          submitting: false,
          progress: 0,
          progressText: "准备中...",
          fileLogs: [],
          finished: false,
        },
        proto: {
          // Step 1: 选择本地目录
          async chooseLocal() {
            try {
              const handle = await open();
              if (!handle) return;

              // 尝试探测目录是否已经是 Mazmot 应用（存在 client/app.json 或根 app.json）
              const existingManifest = await this.probeExistingApp(handle);

              if (existingManifest) {
                // 已经是项目：询问用户「直接导入」还是「作为模板信息填充」
                const wantImport = await confirm({
                  title: "检测到已有应用",
                  message: `所选目录已经包含 Mazmot 应用配置（${
                    existingManifest.displayName ||
                    existingManifest.name ||
                    handle.name
                  }${
                    existingManifest.version
                      ? " v" + existingManifest.version
                      : ""
                  }）。是否直接导入到应用列表？\n\n选择「取消」将用已有配置填充表单，让你继续新建流程。`,
                  yes: "直接导入",
                  cancel: "取消",
                });

                if (wantImport) {
                  // 直接导入：走完记录写入，跳过 step2/step3 的模板初始化
                  await this.importExistingLocalApp(handle, existingManifest);
                  return;
                }

                // 用户选择「取消」→ 用已有配置预填 step2 表单
                this._selectedHandle = handle;
                this.selectedDirName = handle.name || "已选择的目录";
                this.source = "local";
                this.appName = existingManifest.name || handle.name || "";
                this.appDesc = existingManifest.description || "";
                this.step = 2;
                return;
              }

              // 常规空/非应用目录：进入 step2 让用户填名称
              this._selectedHandle = handle;
              this.selectedDirName = handle.name || "已选择的目录";
              this.source = "local";
              this.step = 2;
            } catch (err) {
              console.error(err);
              if (err && err.name !== "AbortError") {
                toast({
                  content: "选择目录失败：" + (err.message || err),
                  type: "error",
                });
              }
            }
          },

          // 探测本地目录是否已经是 Mazmot 应用（读取 app.json）。
          // 优先 client/app.json，回退根目录 app.json。找不到或解析失败 → null。
          async probeExistingApp(handle) {
            if (!handle) return null;
            const tryReadJson = async (dirHandle, fileName) => {
              try {
                const fh = await dirHandle.get(fileName);
                if (!fh || fh.kind !== "file") return null;
                return await fh.json();
              } catch (e) {
                return null;
              }
            };
            try {
              let clientDir = null;
              try {
                clientDir = await handle.get("client");
                if (clientDir && clientDir.kind !== "dir") clientDir = null;
              } catch (e) {
                clientDir = null;
              }
              if (clientDir) {
                const manifest = await tryReadJson(clientDir, "app.json");
                if (manifest) return manifest;
              }
              // 兼容老结构：根目录直接放 app.json
              const rootManifest = await tryReadJson(handle, "app.json");
              return rootManifest || null;
            } catch (err) {
              console.warn("探测本地应用配置失败：", err);
              return null;
            }
          },

          // 「直接导入」：把已有本地应用目录登记到 storage.apps 并关闭弹窗
          async importExistingLocalApp(handle, manifest) {
            const rawName = (manifest && manifest.name) || handle.name || "";
            const cleanName = (rawName || "").trim().replace(/\s+/g, "-");
            if (!cleanName || !/^[A-Za-z0-9_-]+$/.test(cleanName)) {
              alert({
                content:
                  "应用配置中的名称不符合规则（只能包含字母、数字、下划线、连字符）：" +
                  rawName,
              });
              return;
            }
            const apps = (await storage.apps) || [];
            if (apps.some((a) => a.name === cleanName)) {
              alert({
                content: `已存在同名应用「${cleanName}」，无法重复导入。`,
              });
              return;
            }
            try {
              const appId = await generateAppId(cleanName);
              const handleForStorage = handle._handle || handle;
              apps.push({
                name: cleanName,
                desc: (manifest && manifest.description) || "",
                handle: handleForStorage,
                dirName: handle.name || cleanName,
                source: "local",
                namespace: "",
                appId,
                createdAt: Date.now(),
              });
              await storage.setItem("apps", apps);
              toast({ content: "已导入应用", type: "success" });
              // 通知外层 home.html 关闭弹窗并刷新列表
              this.emit("close-dialog", { bubbles: true, composed: true });
              this.resetState();
            } catch (err) {
              console.error(err);
              alert({
                content: "导入失败：" + (err.message || err),
              });
            }
          },

          // Step 1: 选择虚拟目录（NoneOS 虚拟文件系统）
          async chooseVirtual() {
            // 虚拟目录不需要用户选择物理路径，直接进入下一步；
            // 命名空间/handle 在确认应用名称后再创建（避免中途放弃留下空目录）
            this._selectedHandle = null;
            this._virtualNamespace = "";
            this.selectedDirName = "";
            this.source = "virtual";
            this.step = 2;
          },

          // Step 2: 校验输入
          onNameInput() {
            this.appName = (this.appName || "").replace(/\s/g, "");
            if (this.nameError) {
              this.nameError = "";
            }
          },

          async validateName() {
            const name = (this.appName || "").trim();
            if (!name) {
              this.nameError = "应用名称不能为空";
              return false;
            }
            if (/\s/.test(name)) {
              this.nameError = "应用名称不能包含空格";
              return false;
            }
            if (!/^[A-Za-z0-9_-]+$/.test(name)) {
              this.nameError = "应用名称只能包含字母、数字、下划线和连字符";
              return false;
            }
            // 检查重复
            const apps = (await storage.apps) || [];
            if (apps.some((app) => app.name === name)) {
              this.nameError = "该应用名称已存在";
              return false;
            }
            return true;
          },

          backToStep1() {
            this.step = 1;
            this.nameError = "";
          },

          selectTemplate(id) {
            if (!id) return;
            this.templateId = id;
          },

          async confirmAppInfo() {
            if (this.submitting) return;

            const ok = await this.validateName();
            if (!ok) return;

            this.submitting = true;
            try {
              const appName = this.appName.trim();

              // 若为虚拟目录，在共享命名空间 mazmot-apps 下建立应用子目录
              let handleForStorage;
              if (this.source === "virtual") {
                const namespace = "mazmot-apps";
                const rootDir = await init(namespace);
                const vHandle = await rootDir.get(appName, { create: "dir" });
                this._selectedHandle = vHandle;
                this._virtualNamespace = namespace;
                this.selectedDirName = `${namespace}/${appName}`;
                // 虚拟目录无原生 FileSystemHandle，靠 namespace + appName 重建
                handleForStorage = null;
              } else {
                // 本地目录：保存原生句柄以支持序列化存储
                handleForStorage =
                  this._selectedHandle._handle || this._selectedHandle;
              }

              // 保存到 ever-cache
              const apps = (await storage.apps) || [];
              const appId = await generateAppId(appName);
              apps.push({
                name: appName,
                desc: (this.appDesc || "").trim(),
                handle: handleForStorage,
                dirName: this.selectedDirName,
                source: this.source || "local",
                namespace: this._virtualNamespace || "",
                appId,
                createdAt: Date.now(),
              });
              await storage.setItem("apps", apps);

              this.step = 3;
              // 进入 step3 后立即开始写文件
              this.startWriteFiles();
            } catch (err) {
              console.error(err);
              alert({
                content: "准备应用失败：" + (err.message || err),
              });
            } finally {
              this.submitting = false;
            }
          },

          // Step 3: 写入文件
          async startWriteFiles() {
            this.progress = 0;
            this.progressText = "准备写入...";
            this.fileLogs.length = 0;
            this.finished = false;

            const name = this.appName.trim();
            const desc = (this.appDesc || "").trim();

            try {
              const files = await writeTemplateFiles({
                dirHandle: this._selectedHandle,
                name,
                desc,
                templateId: this.templateId,
                onProgress: ({ index, total, path, status, progress }) => {
                  // 首次遇到该文件时初始化日志
                  if (!this.fileLogs[index]) {
                    this.fileLogs.push({ path, status });
                  } else {
                    this.fileLogs[index].status = status;
                  }
                  this.progress = progress;
                  this.progressText =
                    status === "writing"
                      ? `正在写入 ${path} ...`
                      : `已写入 ${path}`;
                },
              });

              this.progressText = "全部文件写入完成";
              this.finished = true;
              toast({ content: "应用创建成功", type: "success" });
            } catch (err) {
              console.error(err);
              this.progressText = "写入失败：" + (err.message || err);
              alert({
                content: "写入文件失败：" + (err.message || err),
              });
            }
          },

          closeDialog() {
            // 触发自定义事件，由外层页面 (home.html) 关闭弹窗并刷新列表
            this.emit("close-dialog", { bubbles: true, composed: true });
            this.resetState();
          },

          resetState() {
            this.step = 1;
            this.source = "";
            this._selectedHandle = null;
            this._virtualNamespace = "";
            this.selectedDirName = "";
            this.appName = "";
            this.appDesc = "";
            this.nameError = "";
            this.templateId =
              this.templates.length > 0 ? this.templates[0].id : "base";
            this.submitting = false;
            this.progress = 0;
            this.progressText = "准备中...";
            this.fileLogs.length = 0;
            this.finished = false;
          },
        },
      };
    };
  </script>
</template>
