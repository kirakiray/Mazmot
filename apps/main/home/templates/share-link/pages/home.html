  <div class="welcome">
    <div class="app-icon">🔗</div>
    <h1>Mazmot Share Link Demo</h1>
    <p class="subtitle">
      这是一个演示「带参数分享链接」的示例应用。在下方输入参数并生成链接，
      别人打开链接后会自动安装此应用，并收到你输入的参数。
    </p>

    <!-- 展示从链接收到的参数 -->
    <div class="card">
      <div class="section-title">从链接收到的参数</div>
      <o-if :value="receivedList.length > 0">
        <div>
          <o-fill :value="receivedList">
            <div class="param-row">
              <span class="param-key">{{$data.key}}</span>
              <span class="param-val">{{$data.value}}</span>
            </div>
          </o-fill>
        </div>
      </o-if>
      <o-if :value="receivedList.length === 0">
        <div class="empty">（当前 URL 没有携带业务参数）</div>
      </o-if>
    </div>

    <!-- 输入参数并生成分享链接 -->
    <div class="card">
      <div class="section-title">生成带参数的分享链接</div>
      <div class="params-list">
        <o-fill :value="paramList">
          <div class="input-row">
            <input
              type="text"
              sync:value="$data.key"
              placeholder="参数名（如 mood）"
            />
            <span class="eq">=</span>
            <input
              type="text"
              sync:value="$data.value"
              placeholder="参数值（如 happy）"
            />
            <o-if :value="paramList.length > 1">
              <button
                class="del-btn"
                on:click="$host.removeParam($event, $data)"
                title="删除此参数"
              >
                ×
              </button>
            </o-if>
          </div>
        </o-fill>
      </div>
      <button class="add-btn" on:click="addParam">+ 添加参数</button>
      <button class="btn" on:click="generateLink" attr:disabled="generating">
        {{generating ? '正在生成...' : '生成分享链接'}}
      </button>
      <div class="tip">
        提示：请先在应用列表中为此应用打开「自动分享」，否则他人打开链接时会因为本机未发布而分享失败。
      </div>
      <div class="status">{{genStatus}}</div>
      <o-if :value="shareUrl">
        <div class="link-box">
          <input type="text" :value="shareUrl" readonly />
          <button class="copy-btn" on:click="copyLink">{{copyText}}</button>
        </div>
      </o-if>
      <o-if :value="genError">
        <div class="error">{{genError}}</div>
      </o-if>
    </div>
  </div>

  <script>
    export default async ({ load }) => {
      // 解析当前 URL 上的业务参数（u/h 已被 run-app 剥离，这里只剩应用参数）
      const sp = new URLSearchParams(location.search);
      const received = {};
      for (const [k, v] of sp.entries()) {
        received[k] = v;
      }
      const receivedList = Object.entries(received).map(([key, value]) => ({
        key,
        value,
      }));

      return {
        data: {
          paramList: [{ key: "mood", value: "" }],
          shareUrl: "",
          generating: false,
          genStatus: "",
          genError: "",
          copyText: "复制",
          receivedList,
        },
        proto: {
          // 从 location.pathname 解析自己的虚拟目录身份
          // 格式：/$mazmot-apps/{dirName}/client/index.html
          parseSelfIdentity() {
            const m = location.pathname.match(
              /^\/\$(.+?)\/(.+?)\/client\/index\.html$/,
            );
            if (!m) return null;
            return { namespace: m[1], dirName: m[2] };
          },

          addParam() {
            this.paramList.push({ key: "", value: "" });
          },

          removeParam(event, item) {
            if (event && event.stopPropagation) event.stopPropagation();
            const idx = this.paramList.indexOf(item);
            if (idx !== -1) this.paramList.splice(idx, 1);
            // 至少保留一行，避免列表清空后无法输入
            if (this.paramList.length === 0) {
              this.paramList.push({ key: "", value: "" });
            }
          },

          // 收集 paramList 里所有 key/value 都非空的项为对象
          collectParams() {
            const result = {};
            for (const p of this.paramList) {
              const k = (p.key || "").trim();
              const v = (p.value || "").trim();
              if (k && v) result[k] = v;
            }
            return result;
          },

          async generateLink() {
            const appParams = this.collectParams();
            const keys = Object.keys(appParams);
            if (keys.length === 0) {
              this.genError = "请至少填写一组完整的参数名和参数值";
              this.genStatus = "";
              return;
            }

            this.generating = true;
            this.genError = "";
            this.genStatus = "准备中...";
            this.shareUrl = "";

            try {
              const self = this.parseSelfIdentity();
              if (!self) {
                throw new Error("无法识别当前应用的目录路径");
              }

              this.genStatus = "加载依赖...";
              const [fsMod, cacheMod, shareMgr] = await Promise.all([
                load("/nos/fs/main.js"),
                load(
                  "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js",
                ),
                load("/apps/main/lib/share-mgr.js"),
              ]);
              const { init } = fsMod;
              const { storage } = cacheMod;
              const { publishApp, generateAppId } = shareMgr;

              // 从本地记录里找自己的应用信息（拿 appId / 元数据）
              const apps = (await storage.apps) || [];
              const { dirName } = self;
              const record =
                apps.find(
                  (a) =>
                    a.name === dirName || a.virtualDirName === dirName,
                ) ||
                apps.find((a) =>
                  a.dirName ? a.dirName.endsWith("/" + dirName) : false,
                ) ||
                null;

              // 获取自己所在目录的句柄
              this.genStatus = "获取应用目录...";
              const rootDir = await init(self.namespace);
              const handle = await rootDir.get(dirName);

              // 老数据补 appId；有则复用
              let appId = (record && record.appId) || "";
              if (!appId) {
                appId = await generateAppId(dirName);
                // 持久化 appId，避免下次重新生成
                if (record) {
                  record.appId = appId;
                  await storage.setItem("apps", apps);
                }
              }

              const app = {
                _handle: handle,
                _recordName: dirName,
                name: (record && record.name) || "Mazmot Share Link Demo",
                version: (record && record.version) || "0.1.0",
                desc: (record && record.desc) || "",
                icon: (record && record.icon) || "🔗",
                appId,
              };

              this.genStatus = "发布到分享网络...";
              const { shareUrl, payloadHash } = await publishApp(app, {
                appId,
                appParams,
                onProgress: ({ text }) => {
                  if (text) this.genStatus = text;
                },
              });

              // 持久化 payloadHash，便于 run-app 秒跳
              if (record && payloadHash) {
                record.payloadHash = payloadHash;
                await storage.setItem("apps", apps);
              }

              this.shareUrl = shareUrl;
              this.genStatus = "链接已生成，可复制分享给他人";
            } catch (err) {
              console.error("生成分享链接失败：", err);
              this.genError =
                (err && err.message) || String(err) || "生成失败";
              this.genStatus = "";
            } finally {
              this.generating = false;
            }
          },

          async copyLink() {
            if (!this.shareUrl) return;
            try {
              if (
                navigator.clipboard &&
                navigator.clipboard.writeText
              ) {
                await navigator.clipboard.writeText(this.shareUrl);
              } else {
                const ta = document.createElement("textarea");
                ta.value = this.shareUrl;
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
              }
              this.copyText = "已复制 ✓";
            } catch (_) {
              this.copyText = "复制失败";
            }
            clearTimeout(this._copyTimer);
            this._copyTimer = setTimeout(() => {
              this.copyText = "复制";
            }, 1800);
          },
        },
      };
    };
  </script>
