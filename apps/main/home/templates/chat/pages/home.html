      align-self: flex-end;

    .message:not([self]) {

    }
  </style>

  <div class="chat-app">
    <div class="header">
      <h1>{{appName}}</h1>
      <div class="user-id">
        My ID: <span>{{userId}}</span>
        <button class="copy-btn" on:click="copyUserId" attr:disabled="!userId">
          {{copyBtnText}}
        </button>
      </div>
    </div>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="title">Contacts</div>
          <button class="new-btn" on:click="toggleConnectForm">
            {{showConnectForm ? "Cancel" : "+ New"}}
          </button>
        </div>

        <o-if :value="showConnectForm">
          <div class="connect-card">
            <div class="input-row">
              <input
                type="text"
                sync:value="targetUserId"
                placeholder="Enter target user ID"
              />
              <button on:click="checkOnline" attr:disabled="!targetUserId">
                Connect
              </button>
            </div>
            <div class="status">{{statusText}}</div>
          </div>
        </o-if>

        <div class="contact-list">
          <o-if :value="!contacts.length">
            <div class="contact-empty">No contacts yet</div>
          </o-if>
          <o-fill :value="contacts">
            <div
              class="contact-item"
              attr:active="$data.userId === $host.activeUserId"
              on:click="$host.switchContact($data.userId)"
            >
              <div class="contact-name">{{$data.userId}}</div>
              <div class="contact-badge" attr:hidden="!$data.unread">
                {{$data.unread}}
              </div>
            </div>
          </o-fill>
        </div>
      </aside>

      <section class="chat-area">
        <o-if :value="!activeUserId">
          <div class="empty">Select or add a contact to start chatting</div>
        </o-if>

        <o-if :value="activeUserId">
          <div class="chat-panel">
            <div class="chat-header">Chatting with {{activeUserId}}</div>
            <div class="messages">
              <o-fill :value="messages">
                <div class="message" attr:self="$data.from === 'me'">
                  <div>{{$data.text}}</div>
                  <div class="message-time">
                    {{$host.formatTime($data.time)}}
                  </div>
                </div>
              </o-fill>
            </div>
            <div class="input-area">
              <input
                type="text"
                sync:value="inputText"
                placeholder="Type a message"
                on:keypress="handleKeyPress($event)"
              />
              <button on:click="sendMessage" attr:disabled="!inputText">
                Send
              </button>
            </div>
          </div>
        </o-if>
      </section>
    </div>
  </div>

  <script>
    import { getUser } from "/nos/user/main.js";

    export default async () => {
      return {
        data: {
          appName: "Mazmot Chat",
          userId: "",
          targetUserId: "",
          statusText: "",
          showConnectForm: true,
          contacts: [],
          activeUserId: "",
          inputText: "",
          messages: [],
          copyBtnText: "Copy",
        },
        proto: {
          async initUser() {
            this._remoteUsers = {};
            this._user = await getUser("mazmot-chat");
            await this._user.ready();
            this.userId = this._user.userId;

            this._chatService = this._user.registerService("mazmot-chat-v1", {
              onMessage: (data, ctx) => this.onServiceMessage(data, ctx),
            });

            this._user.bind("remote_user_connected", (e) =>
              this.onRemoteConnected(e),
            );
            this._user.bind("remote_user_disconnected", (e) =>
              this.onRemoteDisconnected(e),
            );
          },

          toggleConnectForm() {
            this.showConnectForm = !this.showConnectForm;
            if (!this.showConnectForm) {
              this.statusText = "";
            }
          },

          getContact(userId) {
            return this.contacts.find((c) => c.userId === userId);
          },

          async ensureContact(userId) {
            let contact = this.getContact(userId);
            if (!contact) {
              this.contacts.push({
                userId,
                messages: [],
                unread: 0,
              });
              contact = this.getContact(userId);
            }
            if (!this._remoteUsers[userId]) {
              this._remoteUsers[userId] = await this._user.connectUser(userId);
            }
            return contact;
          },

          switchContact(userId) {
            const contact = this.getContact(userId);
            if (!contact) return;
            this.activeUserId = userId;
            this.messages = contact.messages.slice();
            contact.unread = 0;
          },

          appendMessage(userId, msg) {
            const contact = this.getContact(userId);
            if (contact) {
              contact.messages.push(msg);
            }
            if (userId === this.activeUserId) {
              this.messages.push(msg);
            }
          },

          async checkOnline() {
            const target = this.targetUserId.trim();
            if (!target) {
              this.statusText = "Please enter a user ID.";
              return;
            }
            if (target === this.userId) {
              this.statusText = "Cannot connect to yourself.";
              return;
            }
            this.statusText = "Checking online status...";
            try {
              const online = await this._user.isRemoteUserOnline(target);
              if (!online) {
                this.statusText = "User is offline.";
                return;
              }
              this.statusText = "User is online. Connecting...";
              await this.ensureContact(target);
              this.switchContact(target);
              this.statusText = "Connected.";
              this.targetUserId = "";
              this.showConnectForm = false;
            } catch (err) {
              this.statusText = "Check failed: " + (err.message || err);
            }
          },

          async sendMessage() {
            const text = this.inputText.trim();
            if (!text || !this.activeUserId) return;

            const target = this.activeUserId;
            const remoteUser = this._remoteUsers[target];
            if (!remoteUser) {
              this.statusText = "No active connection.";
              return;
            }

            try {
              const msg = {
                type: "chat",
                text,
                time: Date.now(),
              };
              await remoteUser.sendToService("mazmot-chat-v1", msg);
              this.appendMessage(target, { ...msg, from: "me" });
              this.inputText = "";
            } catch (err) {
              this.statusText = "Send failed: " + (err.message || err);
            }
          },

          handleKeyPress(e) {
            if (e.key === "Enter") {
              this.sendMessage();
            }
          },

          async onServiceMessage(data, ctx) {
            const fromUserId = ctx && ctx.fromUserId;
            if (!fromUserId || fromUserId === this.userId) return;

            if (typeof data === "string") {
              try {
                data = JSON.parse(data);
              } catch {
                return;
              }
            }
            if (!data || data.type !== "chat" || !data.text) return;

            const contact = await this.ensureContact(fromUserId);
            this.appendMessage(fromUserId, {
              text: data.text,
              time: data.time || Date.now(),
              from: "other",
            });
            if (this.activeUserId !== fromUserId) {
              contact.unread = (contact.unread || 0) + 1;
            }
          },

          async onRemoteConnected(e) {
            const userId = e.detail.userId;
            if (!userId || userId === this.userId) return;
            await this.ensureContact(userId);
          },

          onRemoteDisconnected(e) {
            // Keep the contact in the list; just clear the status text if it
            // relates to the currently active user.
            if (e.detail.userId === this.activeUserId) {
              this.statusText = "Disconnected.";
            }
          },

          formatTime(ts) {
            return new Date(ts).toLocaleTimeString();
          },

          async copyUserId() {
            if (!this.userId) return;
            try {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(this.userId);
              } else {
                const input = document.createElement("textarea");
                input.value = this.userId;
                input.style.position = "fixed";
                input.style.opacity = "0";
                document.body.appendChild(input);
                input.select();
                document.execCommand("copy");
                document.body.removeChild(input);
              }
              this.copyBtnText = "Copied";
            } catch (err) {
              this.copyBtnText = "Failed";
            }
            clearTimeout(this._copyTimer);
            this._copyTimer = setTimeout(() => {
              this.copyBtnText = "Copy";
            }, 1500);
          },
        },

        ready() {
          this.initUser();
        },
      };
    };
  </script>
</template>
