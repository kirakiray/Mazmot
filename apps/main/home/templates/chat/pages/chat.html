<template page>
  <style>
    :host {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
      word-break: break-all;
    }
    .messages {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .message[self] {
      align-self: flex-end;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-bottom-right-radius: 4px;
    }
    .message:not([self]) {
      align-self: flex-start;
      background-color: var(--md-sys-color-surface-container-highest);
      color: var(--md-sys-color-on-surface);
      border-bottom-left-radius: 4px;
    }
    .message-time {
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.7;
      text-align: right;
    }
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--md-sys-color-outline-variant);
    }
    .input-area input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 8px;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-size: 14px;
    }
    .input-area button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      font-size: 14px;
      cursor: pointer;
    }
    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>

  <div class="chat-header">Chatting with {{userId}}</div>
  <div class="messages">
    <o-fill :value="messages">
      <div class="message" attr:self="$data.from === 'me'">
        <div>{{$data.text}}</div>
        <div class="message-time">{{$host.formatTimeSafe($data.time)}}</div>
      </div>
    </o-fill>
  </div>
  <div class="input-area">
    <input
      type="text"
      sync:value="inputText"
      placeholder="Type a message"
      on:keypress="handleKeyPress($event)"
    />
    <button on:click="send" attr:disabled="!inputText">Send</button>
  </div>

  <script>
    import {
      getContact,
      sendMessage,
      markRead,
      formatTime,
      initChat,
    } from "./chat-store.js";

    export const parent = "./layout.html";

    export default async ({ query }) => {
      return {
        data: {
          userId: (query && query.userId) || "",
          inputText: "",
          // 挂载到当前 contact 的消息数组，随 chatStore 响应式更新
          messages: [],
        },
        watch: {
          userId() {
            this.bindMessagesAsync();
          },
        },
        proto: {
          bindMessages() {
            const c = getContact(this.userId);
            this.messages = c ? c.messages : [];
            if (this.userId) markRead(this.userId);
          },

          // 刷新场景下 layout 的 initChat 可能还没完成，直接读 getContact
          // 会拿到 undefined，得到一个游离的空数组。这里等 initChat 完成后
          // 再挂接一次，确保历史消息能同步进来。
          async bindMessagesAsync() {
            try {
              await initChat();
            } catch {}
            this.bindMessages();
          },

          async send() {
            const text = this.inputText.trim();
            if (!text) return;
            const ok = await sendMessage(this.userId, text);
            if (ok) this.inputText = "";
          },

          handleKeyPress(e) {
            if (e.key === "Enter") this.send();
          },

          formatTimeSafe(ts) {
            return formatTime(ts);
          },
        },
        attached() {
          this.bindMessagesAsync();
        },
        detached() {
          this.messages = [];
        },
      };
    };
  </script>
</template>
