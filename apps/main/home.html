  <script>
    import { storage } from "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js";
    import { get, init } from "/nos/fs/main.js";
    import { DirHandle } from "/nos/fs/handle/dir.js";
    import {
      toast,
      confirm,
    } from "https://punch-ui-v2.pages.dev/packages/util.js";
    import {
      openedWindows,
      readOpenedFromLS,
      isWindowAlive,
      startAppStatusWatcher,
      markOpened,
      clearOpened,
      focusIfOpened,
    } from "./home/app-status.js";
    import { getRunUrl, readAppFiles } from "./lib/app-runner.js";
    import {
      ensurePublisher,
      ensureUser,
      generateAppId,
      buildPackageFile,
      buildSharePayloadFile,
      buildRunUrl,
      SHARE_PAYLOAD_VERSION,
    } from "./lib/share-mgr.js";

    async function loadApps() {
      const apps = (await storage.apps) || [];
      // 从 localStorage 恢复已打开路径快照
      const lsOpened = new Set(readOpenedFromLS());
      // 当前用户的 userId，用于判定「自己开发的应用」
      let currentUserId = "";
      try {
        const currentUser = await ensureUser();
        currentUserId = (currentUser && currentUser.userId) || "";
      } catch (err) {
        console.warn("获取当前用户失败：", err);
      }
      const results = await Promise.all(
        apps.map(async (app) => {
          let manifest = null;
          // 根据 source 类型构造 handle：
          // - virtual：通过 init(namespace) 重新拿到虚拟根目录
          // - local（或旧数据）：通过 new DirHandle 包裹原生句柄
          let handle = null;
          // 虚拟目录：目录名 = dirName 去掉 namespace 前缀；缺省时回退到 app.name
          const namespaceForApp = app.namespace || "mazmot-apps";
          const namespacePrefix = namespaceForApp + "/";
          let virtualDirName = "";
          if (app.source === "virtual") {
            if (app.dirName && app.dirName.startsWith(namespacePrefix)) {
              virtualDirName = app.dirName.slice(namespacePrefix.length);
            } else if (app.dirName) {
              virtualDirName = app.dirName;
            } else {
              virtualDirName = app.name;
            }
          }
          try {
            if (app.source === "virtual") {
              const rootDir = await init(namespaceForApp);
              handle = await rootDir.get(virtualDirName, { create: "dir" });
            } else if (app.handle) {
              handle = new DirHandle(app.handle);
            }
          } catch (err) {
            console.warn(`初始化 ${app.name} 的句柄失败：`, err);
          }

          try {
            // 优先尝试从 client/app.json 获取，如果不存在则尝试根目录（兼容旧应用）
            if (handle) {
              let jsonFile = null;
              try {
                const clientDir = await handle.get("client");
                jsonFile = await clientDir.get("app.json");
              } catch (e) {
                jsonFile = await handle.get("app.json");
              }

              if (jsonFile) {
                manifest = await jsonFile.json();
              }
            }
          } catch (err) {
            console.warn(`读取 ${app.name} 的配置失败：`, err);
          }

          return {
            icon: (manifest && manifest.icon) || "📦",
            name:
              (manifest && (manifest.displayName || manifest.name)) || app.name,
            desc: (manifest && manifest.description) || app.desc || "",
            dirName:
              app.dirName ||
              (app.source === "virtual"
                ? `${app.namespace || "mazmot-apps"}/${app.name}`
                : app.name) ||
              "",
            version: (manifest && manifest.version) || "0.1.0",
            _handle: handle,
            source: app.source || "local",
            namespace: app.namespace || "",
            virtualDirName,
            _recordName: app.name,
            appId: app.appId || "",
            // 自己开发的应用：appId 后缀为当前用户的 userId
            isMine:
              !!currentUserId &&
              !!app.appId &&
              app.appId.endsWith("-" + currentUserId),
            opened: isWindowAlive(app.name) || lsOpened.has(app.name),
          };
        }),
      );
      return results;
    }

    export default async () => {
      const initialApps = await loadApps();

      return {
        data: {
          dialogOpen: false,
          appList: initialApps,
          shareDialogOpen: false,
          shareStep: "publishing", // publishing | ready | error
          shareProgress: 0,
          shareProgressText: "",
          shareUrl: "",
          shareError: "",
        },
        attached() {
          // 启动广播监听 + 定时探测
          this._stopWatcher = startAppStatusWatcher({
            onAlive: (name) => {
              const target = this.appList.find((a) => a._recordName === name);
              if (target && !target.opened) target.opened = true;
            },
            onBye: (name) => {
              const target = this.appList.find((a) => a._recordName === name);
              if (target && target.opened) target.opened = false;
            },
            onTick: (aliveNames) => {
              this.appList.forEach((app) => {
                const alive = aliveNames.has(app._recordName);
                if (app.opened !== alive) app.opened = alive;
              });
            },
          });
        },
        detached() {
          if (this._stopWatcher) {
            this._stopWatcher();
            this._stopWatcher = null;
          }
        },
        proto: {
          handleAdd() {
            this.dialogOpen = true;
          },

          _markOpened(app, win) {
            markOpened(app._recordName, win);
            const target = this.appList.find(
              (a) => a._recordName === app._recordName,
            );
            if (target) target.opened = true;
          },

          // 新标签页打开（点击按钮版本，阻止冒泡）
          handleOpenTab(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            return this.handleOpen(app);
          },

          // 新标签页打开
          async handleOpen(app) {
            if (!app || !app._handle) {
              toast({ content: "无法打开：缺少应用句柄", color: "error" });
              return;
            }
            if (focusIfOpened(app._recordName)) return;

            let url;
            try {
              url = await getRunUrl(app);
            } catch (err) {
              toast({
                content: "无法生成运行地址：" + (err.message || err),
                color: "error",
              });
              return;
            }

            const win = window.open(url, `mazmot-app-${app._recordName}`);
            if (win) this._markOpened(app, win);
          },

          // 小窗口打开（尽量像原生应用）
          async handleOpenWindow(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            if (!app || !app._handle) {
              toast({ content: "无法打开：缺少应用句柄", color: "error" });
              return;
            }
            if (focusIfOpened(app._recordName)) return;

            let url;
            try {
              url = await getRunUrl(app);
            } catch (err) {
              toast({
                content: "无法生成运行地址：" + (err.message || err),
                color: "error",
              });
              return;
            }

            // 类原生应用窗口：无地址栏/工具栏/菜单栏；居中显示
            const width = 1024;
            const height = 720;
            const left = Math.max(
              0,
              Math.round((screen.availWidth - width) / 2),
            );
            const top = Math.max(
              0,
              Math.round((screen.availHeight - height) / 2),
            );
            const features = [
              `width=${width}`,
              `height=${height}`,
              `left=${left}`,
              `top=${top}`,
              "popup=yes",
              "resizable=yes",
              "scrollbars=yes",
              "toolbar=no",
              "menubar=no",
              "location=no",
              "status=no",
              "titlebar=no",
            ].join(",");

            const win = window.open(
              url,
              `mazmot-app-${app._recordName}`,
              features,
            );
            if (!win) {
              toast({
                content: "窗口被浏览器拦截，请允许弹出窗口",
                color: "error",
              });
              return;
            }
            this._markOpened(app, win);
          },

          async handleDialogClose() {
            this.dialogOpen = false;
            await this.refreshApps();
          },
          async refreshApps() {
            const apps = await loadApps();
            this.appList.length = 0;
            apps.forEach((app) => this.appList.push(app));
          },

          // 打开分享弹窗并开始发布应用到 P2P 网络
          async handleShare(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            if (!app || !app._handle) {
              toast({ content: "无法分享：缺少应用句柄", color: "error" });
              return;
            }

            // 初始化弹窗状态
            this.shareStep = "publishing";
            this.shareProgress = 5;
            this.shareProgressText = "正在准备分享...";
            this.shareUrl = "";
            this.shareError = "";
            this.shareDialogOpen = true;

            try {
              // 兼容老数据：补写 appId 并持久化（新格式：`${appName}-${userId}`）
              let appId = app.appId;
              if (!appId) {
                appId = await generateAppId(app._recordName);
                const stored = (await storage.apps) || [];
                const target = stored.find((a) => a.name === app._recordName);
                if (target) {
                  target.appId = appId;
                  await storage.setItem("apps", stored);
                }
                app.appId = appId;
              }

              this.shareProgress = 15;
              this.shareProgressText = "读取应用文件...";
              const files = await readAppFiles(app._handle);
              if (!files.length) {
                throw new Error("应用目录为空，无法分享");
              }

              this.shareProgress = 30;
              this.shareProgressText = "连接分享网络...";
              const { user, publisher } = await ensurePublisher();

              const meta = {
                appId,
                recordName: app._recordName,
                displayName: app.name,
                version: app.version || "0.1.0",
                description: app.desc || "",
                icon: app.icon || "📦",
              };

              this.shareProgress = 55;
              this.shareProgressText = "分块签名并发布到网络...";
              const packageFile = buildPackageFile(files, meta);
              const manifest = await publisher.publish(packageFile);

              this.shareProgress = 85;
              this.shareProgressText = "发布分享清单...";
              const payloadData = {
                v: SHARE_PAYLOAD_VERSION,
                appId,
                recordName: app._recordName,
                displayName: app.name,
                version: meta.version,
                description: meta.description,
                icon: meta.icon,
                publisherUserId: user.userId,
                fileHash: manifest.fileHash,
              };
              // 将分享清单也交给 DataPublisher 发布，
              // 得到的 payloadManifest.fileHash 就是短链接里的 h。
              const payloadFile = buildSharePayloadFile(payloadData);
              const payloadManifest = await publisher.publish(payloadFile);
              const shareUrl = buildRunUrl(
                window.location.origin,
                user.userId,
                payloadManifest.fileHash,
              );

              this.shareProgress = 100;
              this.shareUrl = shareUrl;
              this.shareStep = "ready";
              this.shareProgressText = "";
            } catch (err) {
              console.error("分享失败：", err);
              this.shareError = err.message || String(err);
              this.shareStep = "error";
            }
          },

          async copyAppId(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            if (!app || !app.appId) return;
            try {
              await navigator.clipboard.writeText(app.appId);
              toast({ content: "应用 ID 已复制", color: "success" });
            } catch (err) {
              toast({
                content: "复制失败，请手动复制",
                color: "error",
              });
            }
          },

          async copyShareLink() {
            if (!this.shareUrl) return;
            try {
              await navigator.clipboard.writeText(this.shareUrl);
              toast({ content: "链接已复制", color: "success" });
            } catch (err) {
              toast({
                content: "复制失败，请手动复制",
                color: "error",
              });
            }
          },

          closeShareDialog() {
            this.shareDialogOpen = false;
            // 保留 shareUrl，等再次打开会清空；仅重置错误状态
            if (this.shareStep === "error") {
              this.shareError = "";
            }
          },

          async handleDelete(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }

            const ok = await confirm({
              title: "删除应用",
              message: `确定要从列表中删除应用「${app.name}」吗？该操作会从列表中移除，不会删除本地目录中的文件。`,
              yes: "删除",
              cancel: "取消",
            });
            if (!ok) return;

            try {
              // 关闭对应打开的窗口 + 清理状态
              clearOpened(app._recordName);

              // 对于虚拟目录应用，从共享命名空间中移除该应用的子目录
              if (app.source === "virtual" && app._handle) {
                try {
                  await app._handle.remove();
                } catch (vErr) {
                  console.warn("清空虚拟目录失败（可忽略）：", vErr);
                }
              }

              const apps = (await storage.apps) || [];
              const next = apps.filter(
                (a) => !(a.name === (app._recordName || app.name)),
              );
              await storage.setItem("apps", next);

              await this.refreshApps();
              toast({ content: "已删除", color: "success" });
            } catch (err) {
              console.error(err);
              toast({
                content: "删除失败：" + (err.message || err),
                color: "error",
              });
            }
          },
        },
        watch: {
          async dialogOpen(val) {
            if (!val) {
              await this.refreshApps();
            }
          },
        },
      };
    };
  </script>
</template>
