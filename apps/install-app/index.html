<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazmot - 安装应用</title>
    <script type="module">
      // 加载应用前先校验 NoneOS Core 是否已就绪且包含分享所需的全部模块。
      // 旧版本 Core 缺少 /nos/publish/data-publisher.js 等模块时，先到根入口完成升级。
      const redirect = encodeURIComponent(
        window.location.pathname + window.location.search,
      );
      try {
        await Promise.all([
          import("/nos/fs/main.js"),
          import("/nos/user/main.js"),
          import("/nos/publish/data-publisher.js"),
          import("/nos/crypto/crypto-verify.js"),
        ]);
      } catch (e) {
        window.location.href = `/?redirect=${redirect}`;
      }
    </script>
    <script
      src="/gh/ofajs/ofa.js@latest/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <script
      src="/gh/ofajs/ofa.js/libs/router/dist/router.min.mjs"
      type="module"
    ></script>
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Microsoft Yahei,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>

  <body>
    <l-m src="../../comps/rdn-network/rdn-network.html"></l-m>
    <rdn-network></rdn-network>
    <o-router fix-body>
      <o-app src="./app-config.js"></o-app>
    </o-router>
  </body>
</html>
