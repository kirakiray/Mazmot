<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazmot - 正在打开应用...</title>
    <script
      src="https://cdn.jsdelivr.net/gh/ofajs/ofa.js@4.7.1/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Microsoft Yahei,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji;
        background: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
      }
      .wrap {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        max-width: 420px;
        padding: 28px 24px;
        border-radius: 16px;
        background: var(--md-sys-color-surface-container-low);
        text-align: center;
        box-sizing: border-box;
      }
      .icon {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 4px;
        word-break: break-word;
      }
      .subtitle {
        font-size: 13px;
        color: var(--md-sys-color-on-surface-variant);
        margin-bottom: 20px;
        word-break: break-word;
      }
      .bar {
        width: 100%;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        background: var(--md-sys-color-surface-variant);
      }
      .fill {
        height: 100%;
        width: 0%;
        background: var(--md-sys-color-primary);
        transition: width 0.2s;
      }
      .status {
        margin-top: 12px;
        font-size: 13px;
        min-height: 18px;
        color: var(--md-sys-color-on-surface-variant);
      }
      .error {
        color: var(--md-sys-color-error);
        font-size: 13px;
        word-break: break-word;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        justify-content: center;
        gap: 12px;
      }
      .btn {
        appearance: none;
        border: none;
        cursor: pointer;
        padding: 8px 18px;
        border-radius: 999px;
        font-size: 14px;
        background: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
      }
      .btn.secondary {
        background: transparent;
        color: var(--md-sys-color-primary);
      }
      .confirm-list {
        margin: 12px 0 4px;
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--md-sys-color-outline-variant);
        border-radius: 8px;
        text-align: left;
        background: var(--md-sys-color-surface);
      }
      .confirm-list-item {
        padding: 8px 12px;
        border-bottom: 1px solid var(--md-sys-color-outline-variant);
        font-size: 13px;
      }
      .confirm-list-item:last-child {
        border-bottom: none;
      }
      .confirm-list-item .cli-name {
        font-weight: 500;
        color: var(--md-sys-color-on-surface);
      }
      .confirm-list-item .cli-meta {
        font-size: 12px;
        color: var(--md-sys-color-on-surface-variant);
        margin-top: 2px;
        word-break: break-all;
      }
      .confirm-warn {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--md-sys-color-error-container);
        color: var(--md-sys-color-on-error-container);
        text-align: left;
        font-size: 13px;
        line-height: 1.5;
      }
      /* nos-version 只做逻辑驱动，不显示 UI（进度已由本页统一表现） */
      nos-version {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card" id="card">
        <div class="icon" id="app-icon">📦</div>
        <h1 class="title" id="app-title">正在打开应用...</h1>
        <div class="subtitle" id="app-subtitle">校验运行环境</div>
        <div class="bar"><div class="fill" id="bar-fill"></div></div>
        <div class="status" id="status">正在检测 NoneOS Core...</div>
        <div class="actions" id="actions" style="display: none"></div>
      </div>
    </div>

    <!-- 隐藏的 Core 版本管理组件：负责检测/自动安装 NoneOS Core -->
    <nos-version id="nv" auto-install></nos-version>

    <script type="module">
      const load = lm(import.meta);

      const $icon = document.getElementById("app-icon");
      const $title = document.getElementById("app-title");
      const $subtitle = document.getElementById("app-subtitle");
      const $status = document.getElementById("status");
      const $fill = document.getElementById("bar-fill");
      const $actions = document.getElementById("actions");

      // 进度分段：0-40% 给 Core 检测/安装，40-100% 给应用安装
      const CORE_END = 40;

      function setProgress(p, text) {
        $fill.style.width = Math.max(0, Math.min(100, p)) + "%";
        if (text != null) $status.textContent = text;
      }
      function setMeta(payload) {
        $icon.textContent = payload.icon || "📦";
        $title.textContent =
          payload.displayName || payload.recordName || "未命名应用";
        $subtitle.textContent = `v${payload.version || "0.1.0"}`;
      }
      function fail(title, detail) {
        $title.textContent = title;
        $subtitle.textContent = "";
        $status.className = "error";
        $status.textContent = detail || "";
        $fill.style.width = "0%";
        $actions.style.display = "flex";
        $actions.innerHTML = `<button class="btn secondary" id="btn-home">返回主页</button>`;
        document.getElementById("btn-home").onclick = () => {
          window.location.href = "/";
        };
      }
      function goApp(recordName) {
        const url = `/$mazmot-apps/${recordName}/client/index.html`;
        window.location.replace(url);
      }
      function escapeHtml(str) {
        return String(str == null ? "" : str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // 已存在其他应用时的安装确认
      function confirmInstall(payload, otherApps) {
        return new Promise((resolve) => {
          $title.textContent = "确认安装此应用？";
          $subtitle.textContent = `${payload.displayName || payload.recordName || ""} v${payload.version || "0.1.0"}`;
          $fill.style.width = "0%";
          $status.className = "";

          const listHtml = otherApps
            .map((a) => {
              const name = escapeHtml(a.name || "（未命名）");
              const appId = a.appId ? escapeHtml(a.appId) : "";
              const source =
                a.source === "virtual"
                  ? "虚拟目录"
                  : a.source === "local"
                    ? "本地目录"
                    : "";
              const metaParts = [];
              if (source) metaParts.push(source);
              if (appId) metaParts.push(appId);
              const meta = metaParts.join(" · ");
              return `
                <div class="confirm-list-item">
                  <div class="cli-name">${name}</div>
                  ${meta ? `<div class="cli-meta">${meta}</div>` : ""}
                </div>
              `;
            })
            .join("");

          $status.innerHTML = `
            <div style="text-align:left; font-size:13px; line-height:1.6;">
              当前系统已初始化，已存在 <b>${otherApps.length}</b> 个应用：
            </div>
            <div class="confirm-list">${listHtml}</div>
            <div class="confirm-warn">
              请确认是否安装该应用。应用间能够访问彼此的数据，请确认此虚拟系统内不存在敏感数据，或数据可对该应用开发者信任后再确认安装。
            </div>
          `;

          $actions.style.display = "flex";
          $actions.innerHTML = `
            <button class="btn secondary" id="btn-cancel">取消</button>
            <button class="btn" id="btn-agree">确认安装</button>
          `;
          const cleanup = (val) => {
            $actions.style.display = "none";
            $actions.innerHTML = "";
            $status.innerHTML = "";
            resolve(val);
          };
          document.getElementById("btn-agree").onclick = () => cleanup(true);
          document.getElementById("btn-cancel").onclick = () => cleanup(false);
        });
      }

      // ============ Core 阶段：先绑定 nos-version 事件，再加载组件定义 ============
      // 注意：必须在 load(nos-version) 之前绑定，否则组件 attached 时同步触发的
      // check-start / uninstalled / installed 会被遗漏。
      const nv = $("#nv");
      const coreReady = new Promise((resolve, reject) => {
        let resolved = false;

        nv.on("check-start", () => {
          setProgress(2, "正在检测 NoneOS Core...");
        });
        nv.on("uninstalled", () => {
          setProgress(5, "首次运行，正在安装 NoneOS Core...");
        });
        nv.on("upgradable", (e) => {
          const d = e.detail || {};
          setProgress(
            5,
            `NoneOS Core 升级中（${d.version || "?"} → ${d.lastVersion || "?"}）...`,
          );
        });
        nv.on("install-start", () => {
          setProgress(6, "NoneOS Core 安装准备中...");
        });
        nv.on("install-progress", (e) => {
          const d = e.detail || {};
          const step = Number(d.step) || 0;
          const total = Number(d.total) || 0;
          const ratio = total > 0 ? Math.min(1, step / total) : 0;
          // 6 → CORE_END 之间线性推进
          const p = 6 + Math.floor(ratio * (CORE_END - 6));
          setProgress(p, `NoneOS Core：${d.desc || "安装中"}`);
        });
        nv.on("installed", () => {
          if (resolved) return;
          resolved = true;
          setProgress(CORE_END, "NoneOS Core 就绪");
          resolve();
        });
        nv.on("error", (e) => {
          if (resolved) return;
          resolved = true;
          const d = e.detail || {};
          reject(
            new Error(
              `NoneOS Core ${d.phase || "初始化"}失败：${d.message || "未知错误"}`,
            ),
          );
        });
      });

      // 与根 index.html 保持一致的 nos-version 组件来源
      // await load("https://core.noneos.com/nos-tool/comps/nos-version.html");
      await load("http://localhost:3002/nos-tool/comps/nos-version.html");

      // ============ 等待 Core 就绪后再动态加载分享模块 ============
      let init, storage, shareMgr;
      try {
        await coreReady;
        // 使用动态 import：等 Core Service Worker 就绪后再拉这些依赖
        const fsMod = await import("/nos/fs/main.js");
        init = fsMod.init;
        const cacheMod = await import(
          "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js"
        );
        storage = cacheMod.storage;
        shareMgr = await import("../main/lib/share-mgr.js");
        // 触发 publisher 依赖的两个模块预加载，保证后续 ensurePublisher 时可用
        await Promise.all([
          import("/nos/user/main.js"),
          import("/nos/publish/data-publisher.js"),
          import("/nos/crypto/crypto-verify.js"),
        ]);
      } catch (err) {
        console.error(err);
        fail("运行环境初始化失败", err.message || String(err));
        throw err;
      }

      const {
        parseShareUrl,
        verifySharePayload,
        ensurePublisher,
        ensureUser,
        PACKAGE_VERSION,
      } = shareMgr;

      // ============ 应用阶段辅助函数 ============
      // 把 5-100 的旧刻度线性映射到 CORE_END-100 上，尽量少改动原有语义
      function appProgress(oldPct, text) {
        const clamped = Math.max(5, Math.min(100, oldPct));
        const mapped =
          CORE_END + ((clamped - 5) / 95) * (100 - CORE_END);
        setProgress(mapped, text);
      }

      // 查找已安装应用（按 appId 匹配，兼容按 name 匹配的老数据）；
      // 返回 { record, installedVersion } 或 null
      async function findInstalled(payload) {
        const apps = (await storage.apps) || [];
        const existing = apps.find(
          (a) =>
            (a.appId && a.appId === payload.appId) ||
            (a.name && a.name === payload.appId),
        );
        if (!existing) return null;
        let installedVersion = "";
        try {
          if (existing.source === "virtual") {
            const namespace = existing.namespace || "mazmot-apps";
            const rootDir = await init(namespace);
            const appDir = await rootDir.get(existing.name, { create: "dir" });
            let jsonFile = null;
            try {
              const clientDir = await appDir.get("client");
              jsonFile = await clientDir.get("app.json");
            } catch (e) {
              jsonFile = await appDir.get("app.json");
            }
            if (jsonFile) {
              const manifest = await jsonFile.json();
              installedVersion = (manifest && manifest.version) || "";
            }
          }
        } catch (err) {
          console.warn("读取已安装应用版本失败：", err);
        }
        return { record: existing, installedVersion };
      }

      // 执行 P2P 下载 + 组装 + 写入文件系统 + 更新 storage.apps
      // 返回最终 recordName
      async function installOrUpdate(payload, existingRecord) {
        appProgress(15, "连接分享网络...");
        const { user, publisher } = await ensurePublisher();

        appProgress(20, "连接发布者...");
        const remoteUser = await user.connectUser(payload.publisherUserId);

        appProgress(30, "拉取应用清单...");
        const manifest = await publisher.requestManifest(
          remoteUser,
          payload.fileHash,
        );
        if (!manifest || !Array.isArray(manifest.chunkHashes)) {
          throw new Error("无法获取应用清单");
        }

        const total = manifest.chunkHashes.length;
        for (let i = 0; i < total; i++) {
          appProgress(
            30 + Math.floor(((i + 1) / total) * 45),
            `下载文件块 ${i + 1} / ${total}...`,
          );
          await publisher.requestChunk(remoteUser, manifest.chunkHashes[i]);
        }

        appProgress(78, "组装应用包...");
        const result = await publisher.assembleFile(payload.fileHash);
        const pkg = JSON.parse(await result.blob.text());

        if (!pkg || pkg.mazmotPackage !== PACKAGE_VERSION) {
          throw new Error(
            `应用包格式不匹配（版本 ${pkg && pkg.mazmotPackage}）`,
          );
        }
        if (!pkg.meta || pkg.meta.appId !== payload.appId) {
          throw new Error("应用包内容与分享链接不一致");
        }
        if (!Array.isArray(pkg.files) || !pkg.files.length) {
          throw new Error("应用包为空");
        }

        const isUpdate = !!existingRecord;
        // 覆盖升级沿用旧目录名；新装用 appId 作为目录名（稳定唯一）
        const recordName = isUpdate ? existingRecord.name : payload.appId;

        appProgress(
          82,
          isUpdate ? "覆盖写入应用文件..." : "写入虚拟文件系统...",
        );
        const rootDir = await init("mazmot-apps");
        const targetDir = await rootDir.get(recordName, { create: "dir" });
        if (isUpdate) {
          try {
            const oldClient = await targetDir.get("client");
            if (oldClient) await oldClient.remove();
          } catch (e) {
            // 旧目录不存在时忽略
          }
        }
        const clientDir = await targetDir.get("client", { create: "dir" });
        for (const file of pkg.files) {
          const fh = await clientDir.get(file.path, { create: "file" });
          await fh.write(file.content);
        }

        appProgress(92, "记录应用信息...");
        const apps = (await storage.apps) || [];
        if (isUpdate) {
          const target = apps.find(
            (a) =>
              (a.appId && a.appId === payload.appId) ||
              (a.name && a.name === existingRecord.name),
          );
          if (target) {
            target.desc = pkg.meta.description || target.desc || "";
            if (!target.appId) target.appId = payload.appId;
            await storage.setItem("apps", apps);
          }
        } else {
          apps.push({
            name: recordName,
            desc: pkg.meta.description || "",
            handle: null,
            dirName: `mazmot-apps/${recordName}`,
            source: "virtual",
            namespace: "mazmot-apps",
            appId: pkg.meta.appId,
            createdAt: Date.now(),
          });
          await storage.setItem("apps", apps);
        }

        return recordName;
      }

      // ============ 主流程 ============
      async function main() {
        // 1. 解析 + 验签
        appProgress(5, "解析分享链接...");
        const payload = parseShareUrl(window.location.search);
        if (!payload) {
          fail("分享链接无效", "未在 URL 中检测到分享参数。");
          return;
        }
        setMeta(payload);

        appProgress(8, "验证签名...");
        const ok = await verifySharePayload(payload);
        if (!ok) {
          fail("分享链接签名无效", "该链接的签名无法通过验证，可能已被篡改。");
          return;
        }

        // 2. 检查已安装状态
        const installed = await findInstalled(payload);
        const newVersion = payload.version || "";

        // 自我分享 + 已安装 → 直接跳转
        let isSelfShare = false;
        try {
          const currentUser = await ensureUser();
          if (
            currentUser &&
            payload.publisherUserId &&
            currentUser.userId === payload.publisherUserId
          ) {
            isSelfShare = true;
          }
        } catch (err) {
          console.warn("获取当前用户失败：", err);
        }

        // 已安装且版本一致（或来自本人且已安装）→ 无需下载，直接跳转
        if (
          installed &&
          ((installed.installedVersion &&
            newVersion &&
            installed.installedVersion === newVersion) ||
            isSelfShare)
        ) {
          setProgress(100, "已是最新，正在跳转...");
          goApp(installed.record.name);
          return;
        }

        // 3. 未安装 or 有新版本 → 拉取并覆盖
        // 在开始下载前：若本地已有其他应用，暂停并请求用户确认
        try {
          const allApps = (await storage.apps) || [];
          const otherApps = allApps.filter(
            (a) =>
              !(
                (a.appId && a.appId === payload.appId) ||
                (a.name && a.name === payload.appId)
              ),
          );
          if (otherApps.length > 0) {
            setProgress(CORE_END, "等待用户确认安装...");
            const agreed = await confirmInstall(payload, otherApps);
            if (!agreed) {
              fail("已取消安装", "你取消了此次应用安装。");
              return;
            }
            // 恢复标题与副标题
            setMeta(payload);
            $status.className = "";
          }
        } catch (err) {
          console.warn("读取本地应用列表失败：", err);
        }

        try {
          const recordName = await installOrUpdate(
            payload,
            installed ? installed.record : null,
          );
          setProgress(100, "启动应用...");
          goApp(recordName);
        } catch (err) {
          console.error(err);
          fail("安装失败", err.message || String(err));
        }
      }

      main();
    </script>
  </body>
</html>
