<template page>
  <style>

  </style>

  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />

  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>

  <!--
    隐藏的 Core 版本管理组件：负责检测/自动安装 NoneOS Core。
    通过 on:xxx 声明式绑定所有事件；ofa.js 会在元素挂载时立刻装上监听器，
    因此即使组件定义稍后通过 load() 加载，浏览器升级元素时同步触发的
    check-start / uninstalled / installed 也能被稳定接收。
  -->
  <nos-version
    auto-install
    on:check-start="onCoreCheckStart"
    on:uninstalled="onCoreUninstalled"
    on:upgradable="onCoreUpgradable"
    on:install-start="onCoreInstallStart"
    on:install-progress="onCoreInstallProgress"
    on:installed="onCoreInstalled"
    on:error="onCoreError($event)"
  ></nos-version>

  <div class="wrap">
    <div class="card">
      <div class="icon">{{iconText}}</div>
      <h1 class="title">{{titleText}}</h1>
      <div class="subtitle">{{subtitleText}}</div>

      <!-- 进度条：确认/错误态之外都显示 -->
      <o-if :value="step !== 'confirm' && step !== 'error'">
        <div class="bar">
          <div class="fill" :style.width="progress + '%'"></div>
        </div>
        <div class="status">{{statusText}}</div>
        <o-if :value="handshakeUrl">
          <div
            class="handshake-status"
            class:connected="handshakeConnected"
          >
            <span class="handshake-dot"></span>
            <span class="handshake-url">{{handshakeUrl}}</span>
          </div>
        </o-if>
        <o-if :value="pathHint">
          <div class="path-hint">{{pathHint}}</div>
        </o-if>
        <o-if :value="history.length > 0">
          <details class="history">
            <summary>历史步骤（{{history.length}}）</summary>
            <ol class="history-list">
              <o-fill :value="history">
                <li>{{$data.text}}</li>
              </o-fill>
            </ol>
          </details>
        </o-if>
      </o-if>

      <!-- 确认安装（本地已有其它应用） -->
      <o-if :value="step === 'confirm'">
        <div class="intro">
          当前系统已初始化，已存在 <b>{{otherApps.length}}</b> 个应用：
        </div>
        <div class="confirm-list">
          <o-fill :value="otherApps">
            <div class="cli">
              <div class="cli-name">{{$data.name}}</div>
              <o-if :value="$data.meta">
                <div class="cli-meta">{{$data.meta}}</div>
              </o-if>
            </div>
          </o-fill>
        </div>
        <div class="confirm-warn">
          请确认是否安装该应用。应用间能够访问彼此的数据，请确认此虚拟系统内不存在敏感数据，或数据可对该应用开发者信任后再确认安装。
        </div>
        <div class="actions">
          <p-button variant="text" on:click="cancelInstall">取消</p-button>
          <p-button color="primary" on:click="agreeInstall">确认安装</p-button>
        </div>
      </o-if>

      <!-- 错误 -->
      <o-if :value="step === 'error'">
        <div class="error-text">{{errorText}}</div>
        <o-if :value="errorStep">
          <div class="error-step">出错步骤：{{errorStep}}</div>
        </o-if>
        <o-if :value="errorDetail">
          <div class="error-detail">{{errorDetail}}</div>
          <div class="error-detail-actions">
            <button class="copy-btn" on:click="copyErrorDetail">
              {{copyBtnText}}
            </button>
          </div>
        </o-if>
        <o-if :value="history.length > 0">
          <details class="history">
            <summary>历史步骤（{{history.length}}）</summary>
            <ol class="history-list">
              <o-fill :value="history">
                <li>{{$data.text}}</li>
              </o-fill>
            </ol>
          </details>
        </o-if>
        <div class="actions">
          <p-button variant="text" on:click="goHome">返回主页</p-button>
        </div>
      </o-if>
    </div>
  </div>

  <script>
    // 进度分段：0-40% 给 Core 检测/安装，40-100% 给应用安装
    const CORE_END = 40;

    // 用户能感知的步骤序列（用于「n/N · 描述」展示）；
    // 部分步骤（比如确认）会视场景跳过，不影响总数。
    const STEPS = [
      "检测 NoneOS Core",
      "加载依赖模块",
      "解析短链接",
      "连接发布者并获取分享清单",
      "检查本地已装应用",
      "确认安装",
      "拉取应用清单",
      "下载并写入应用文件",
      "启动应用",
    ];
    const TOTAL_STEPS = STEPS.length;

    export default async ({ load }) => {
      // 抽出的纯函数（便于单测），run-app.html 只做壳。
      const utils = await load("./lib/run-app-utils.js");
      const {
        formatStatus,
        buildErrorDetail,
        mapAppProgress,
        mapCoreInstallProgress,
        findAppRecord,
        filterOtherApps,
        formatOtherAppEntry,
        shouldSkipInstall,
        findByPayloadHash,
      } = utils;
      const diagMod = await load("./lib/diag.js");
      const {
        createDiag,
        pathInfoOf,
        collectSessionIds,
        collectConnectedUrls,
      } = diagMod;
      const connMod = await load("./lib/connection.js");
      const {
        waitForRtcReady,
        requestChunkWithRetry,
        formatPathHint,
        readHandshakeStatus,
        ensureServerConnected,
      } = connMod;
      const installFlow = await load("./lib/install-flow.js");
      const { fetchSharePayload, findInstalled, installAppPackage } =
        installFlow;
      const diag = createDiag();
      diag.mark("page module ready");

      // Core 就绪的 Promise 由 onCoreInstalled / onCoreError 兑现
      let coreResolve;
      let coreReject;
      const coreReady = new Promise((resolve, reject) => {
        coreResolve = resolve;
        coreReject = reject;
      });
      let coreDone = false;

      return {
        data: {
          step: "core", // core | verifying | confirm | installing | error
          iconText: "📦",
          titleText: "正在打开应用...",
          subtitleText: "校验运行环境",
          statusText: "1/" + TOTAL_STEPS + " · 正在检测 NoneOS Core...",
          progress: 0,
          errorText: "",
          errorStep: "",
          errorDetail: "",
          copyBtnText: "复制诊断信息",
          stepIndex: 1, // 当前进行到第几步（1-based）
          otherApps: [], // { name, meta }
          history: [], // [{ text }] 已经展示过的状态文案（用于折叠框回看）
          pathHint: "", // 当前到发布者的连接路径（RTC 直连 / 经某台服务器 + RTT）
          handshakeUrl: "", // 当前握手的信令服务器地址
          handshakeConnected: false, // 握手服务器是否已连接
          _payload: null,
          _installed: null, // { record, installedVersion } | null
          _confirmResolver: null,
          _modules: null, // { init, storage, shareMgr } after core ready
          _remoteUser: null, // 与发布者建立的 RemoteUser 会话
          _publisher: null, // DataPublisher 实例
          _userRef: null, // LocalUser（诊断用）
          _coreEventsBound: false,
        },
        attached() {
          this.startFlow();
        },
        proto: {
          // ============ 通用工具 ============
          // 设置当前正在进行的步骤（1-based），后续 setProgress 会自动带上「n/N · 描述」前缀
          enterStep(index) {
            this.stepIndex = index;
          },
          formatStatus(text) {
            return formatStatus(text, this.stepIndex, TOTAL_STEPS);
          },
          setProgress(p, text) {
            this.progress = Math.max(0, Math.min(100, p));
            if (text != null) {
              const next = this.formatStatus(text);
              // 把当前的状态文案归档到历史列表，供折叠框回看
              if (this.statusText && this.statusText !== next) {
                this.history.push({ text: this.statusText });
              }
              this.statusText = next;
            }
          },
          setMeta(payload) {
            this.iconText = payload.icon || "📦";
            this.titleText =
              payload.displayName || payload.recordName || "未命名应用";
            this.subtitleText = `v${payload.version || "0.1.0"}`;
          },
          // 生成错误的详细信息（含 message / stack / 关键上下文），方便开发者排查
          buildErrorDetail(err) {
            return buildErrorDetail(err);
          },
          fail(title, err) {
            const message =
              (err && err.message) ||
              (typeof err === "string" ? err : "") ||
              "";
            // 把出错前最后的状态文案也保留到历史里，方便回看
            if (this.statusText) {
              this.history.push({ text: this.statusText });
            }
            // 采集失败瞬间的连接快照
            try {
              diag.snapshot("pathOnFail", {
                path: pathInfoOf(this._remoteUser),
                connectedUrls: collectConnectedUrls(this._userRef),
              });
            } catch (_) {}
            // 异步补一次 sessionIds（不阻塞 UI）
            (async () => {
              if (!this._remoteUser) return;
              const ids = await collectSessionIds(this._remoteUser);
              if (diag._state.snapshots.pathOnFail) {
                diag._state.snapshots.pathOnFail.sessionIds = ids;
                // 重新拼一次 errorDetail，让 sessionIds 也显示出来
                this.errorDetail =
                  this.buildErrorDetail(err) +
                  "\n\n--- 诊断信息 ---\n" +
                  diag.format();
              }
            })();
            this.titleText = title;
            this.subtitleText = "";
            this.errorText = message;
            this.errorStep =
              this.stepIndex >= 1 && this.stepIndex <= TOTAL_STEPS
                ? `${this.stepIndex}/${TOTAL_STEPS} · ${STEPS[this.stepIndex - 1]}`
                : "";
            this.errorDetail = err
              ? this.buildErrorDetail(err) +
                "\n\n--- 诊断信息 ---\n" +
                diag.format()
              : "--- 诊断信息 ---\n" + diag.format();
            this.progress = 0;
            this.step = "error";
            // 同时打到控制台，便于结合 DevTools 查看
            console.error(`[run-app] ${title}`, err, diag.dump());
          },
          async copyErrorDetail() {
            const text =
              (this.errorText ? this.errorText + "\n\n" : "") +
              (this.errorStep ? "出错步骤：" + this.errorStep + "\n\n" : "") +
              (this.errorDetail || "");
            try {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(text);
              } else {
                // 兼容降级：临时 textarea + execCommand
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
              }
              this.copyBtnText = "已复制 ✓";
            } catch (_) {
              this.copyBtnText = "复制失败";
            }
            setTimeout(() => {
              this.copyBtnText = "复制诊断信息";
            }, 2000);
          },
          goApp(recordName) {
            const url = `/$mazmot-apps/${recordName}/client/index.html`;
            window.location.replace(url);
          },
          // 校验某条本地记录对应的应用目录是否仍然存在（避免记录残留但文件已被删）
          // init 可注入（前置秒跳时 this._modules 尚未就绪）
          async appDirExists(record, init) {
            const initFn = init || (this._modules && this._modules.init);
            if (!record || record.source !== "virtual" || !initFn) return false;
            try {
              const namespace = record.namespace || "mazmot-apps";
              const rootDir = await initFn(namespace);
              const appDir = await rootDir.get(record.name);
              if (!appDir) return false;
              const clientDir = await appDir.get("client");
              return !!clientDir;
            } catch (_) {
              return false;
            }
          },
          goHome() {
            window.location.href = "/";
          },
          // 把 5-100 的旧刻度线性映射到 CORE_END-100
          appProgress(oldPct, text) {
            this.setProgress(mapAppProgress(oldPct, CORE_END), text);
          },

          // ============ nos-version 事件处理（模板 on: 声明式绑定） ============
          onCoreCheckStart() {
            this.setProgress(2, "正在检测 NoneOS Core...");
          },
          onCoreUninstalled() {
            this.setProgress(5, "首次运行，正在安装 NoneOS Core...");
          },
          onCoreUpgradable(e) {
            const d = e.detail || {};
            this.setProgress(
              5,
              `NoneOS Core 升级中（${d.version || "?"} → ${d.lastVersion || "?"}）...`,
            );
          },
          onCoreInstallStart() {
            this.setProgress(6, "NoneOS Core 安装准备中...");
          },
          onCoreInstallProgress(e) {
            const d = e.detail || {};
            const p = mapCoreInstallProgress(d.step, d.total, CORE_END);
            this.setProgress(p, `NoneOS Core：${d.desc || "安装中"}`);
          },
          onCoreInstalled() {
            if (coreDone) return;
            coreDone = true;
            this.setProgress(CORE_END, "NoneOS Core 就绪");
            coreResolve();
          },
          onCoreError(event) {
            if (coreDone) return;
            coreDone = true;
            const d = (event && event.detail) || {};
            // nos-version 的 error detail 结构约定为 { message, phase }，
            // 但实测有时 message 为空（组件把真实报错吞了），导致只显示"未知错误"。
            // 这里尽量从 detail 里榨取更多线索，并把整个 detail 快照进诊断，
            // 便于排查 Core 检测/安装阶段到底为什么失败。
            const rawErr = d.error || d.err || d.cause;
            const detailMsg =
              d.message ||
              (rawErr && (rawErr.message || String(rawErr))) ||
              "";
            try {
              diag.snapshot("coreError", {
                phase: d.phase || "",
                message: d.message || "",
                keys: Object.keys(d),
                detail: d,
              });
            } catch (_) {}
            const err = new Error(
              `NoneOS Core ${d.phase || "初始化"}失败：${detailMsg || "未知错误（组件未提供错误详情，请展开诊断信息查看 coreError 快照）"}`,
            );
            // 保留原始报错对象，让 buildErrorDetail 能打印其 stack / cause
            if (rawErr) err.cause = rawErr;
            coreReject(err);
          },

          // ============ 主流程 ============
          // 前置秒跳：尽早判断本地是否已装过同一 payloadHash 的应用，命中即直接跳转。
          // 返回 true 表示已跳转，调用方应立即结束。
          async tryFastJump() {
            // 内联解析 URL，避免加载 share-mgr.js（其顶层 import /nos/*，会牵连 Core 依赖）
            const params = new URLSearchParams(window.location.search || "");
            const payloadHash = params.get("h");
            if (!payloadHash) return false;

            // 只加载 ever-cache（CDN 直连，不依赖 Core Service Worker）读本地应用列表
            const cacheMod = await load(
              "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js",
            );
            const storage = cacheMod.storage;
            const apps = (await storage.apps) || [];
            const hit = findByPayloadHash(apps, payloadHash);
            if (!hit) return false; // 未命中（含全新用户）→ 走正常流程

            // 命中后解析运行 URL（virtual 走固定路径校验目录；local/自有应用重建句柄 + mount）
            // 命中即老用户，Core SW 已就绪，加载 /nos/* 很快
            const url = await this.resolveRunUrl(hit);
            if (!url) return false; // 目录失效 / 无法解析 → 退回正常流程

            diag.mark("fastJump hit", { name: hit.name, source: hit.source });
            this.enterStep(TOTAL_STEPS);
            this.setProgress(100, "内容无变化，正在跳转...");
            window.location.replace(url);
            return true;
          },
          // 解析一条本地应用记录的运行 URL；无法解析（目录失效等）返回 ""。
          // - virtual：/$namespace/{dirName}/client/index.html（需校验目录仍在）
          // - local：重建 DirHandle → getRunUrl（mount client 子目录）
          async resolveRunUrl(record) {
            if (!record) return "";
            try {
              if (record.source === "virtual") {
                const fsMod = await load("/nos/fs/main.js");
                if (!(await this.appDirExists(record, fsMod.init))) return "";
                const ns = record.namespace || "mazmot-apps";
                const dirName = record.virtualDirName || record.name;
                return `/$${ns}/${dirName}/client/index.html`;
              }
              if (record.source === "local" && record.handle) {
                const [{ DirHandle }, runnerMod] = await Promise.all([
                  load("/nos/fs/handle/dir.js"),
                  load("../main/lib/app-runner.js"),
                ]);
                const runApp = {
                  ...record,
                  _handle: new DirHandle(record.handle),
                };
                return await runnerMod.getRunUrl(runApp);
              }
            } catch (err) {
              diag.logEvent("resolveRunUrl failed", {
                source: record.source,
                msg: String((err && err.message) || err),
              });
            }
            return "";
          },
          async startFlow() {
            diag.mark("startFlow");

            // 前置秒跳：对"已安装过该应用"的老用户，绕过 Core 版本检测（含网络请求，
            // 是主要延迟来源）直接跳转。只依赖 ever-cache（CDN 直连，不需要 Core SW），
            // 命中后才加载 /nos/fs 校验目录（此时必是老用户，SW 已就绪，很快）。
            // 任何异常都静默退回正常流程，绝不阻断。
            try {
              if (await this.tryFastJump()) return;
            } catch (err) {
              diag.logEvent("fastJump failed", {
                msg: String((err && err.message) || err),
              });
            }

            // 步骤 1：检测 / 安装 NoneOS Core
            this.enterStep(1);
            try {
              // 与根 index.html 保持一致的 nos-version 组件来源
              await load("https://core.noneos.com/nos-tool/comps/nos-version.html");
              // await load("http://localhost:3002/nos-tool/comps/nos-version.html");
              await coreReady;
              diag.mark("core ready");
            } catch (err) {
              this.fail("运行环境初始化失败", err);
              return;
            }

            // 步骤 2：加载依赖模块
            this.enterStep(2);
            this.setProgress(CORE_END + 2, "加载依赖模块...");
            try {
              await this.loadDeps();
              diag.mark("loadDeps done");
            } catch (err) {
              this.fail("依赖模块加载失败", err);
              return;
            }

            // 步骤 3+：验签 → 检查已装 → 必要时确认 → 下载 → 跳转
            await this.runInstall();
          },

          async loadDeps() {
            // 使用页面模块参数 load 加载依赖（ofa.js 官方推荐做法，
            // 与 <l-m> 一致，能加载 .js / .html 模块，并共享缓存）。
            const [fsMod, cacheMod, shareMgr] = await Promise.all([
              load("/nos/fs/main.js"),
              load(
                "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js",
              ),
              load("../main/lib/share-mgr.js"),
            ]);
            // 预加载 publisher 依赖，确保后续 ensurePublisher 时可用
            await Promise.all([
              load("/nos/user/main.js"),
              load("/nos/publish/data-publisher.js"),
              load("/nos/crypto/crypto-verify.js"),
            ]);
            this._modules = {
              init: fsMod.init,
              storage: cacheMod.storage,
              shareMgr,
            };
          },

          async runInstall() {
            const { storage, shareMgr } = this._modules;
            const {
              parseShareUrl,
              ensureUser,
              ensurePublisher,
              isPublicKeyOfUser,
            } = shareMgr;

            diag.mark("runInstall start");
            this.step = "verifying";

            // 步骤 3：解析短链接
            this.enterStep(3);
            this.appProgress(5, "解析短链接...");
            const parsed = parseShareUrl(window.location.search);
            if (!parsed) {
              this.fail(
                "分享链接无效",
                new Error("未在 URL 中检测到分享参数（?u=...&h=...）。"),
              );
              return;
            }
            const { userId: publisherUserId, payloadHash } = parsed;
            diag.mark("parsed shareUrl", {
              userIdHead: publisherUserId.slice(0, 8),
              payloadHashHead: payloadHash.slice(0, 8),
            });

            // 步骤 4：连接发布者 → 拉取分享清单 → 校验签发者
            this.enterStep(4);
            this.appProgress(8, "连接发布者...");
            let payload = null;
            let remoteUser = null;
            let publisher = null;
            try {
              const ctx = await ensurePublisher();
              publisher = ctx.publisher;
              this._userRef = ctx.user;
              this.bindCoreEvents(ctx.user);
              this.updateHandshakeStatus();
              diag.mark("ensurePublisher done");

              // 等待本地用户连上信令服务器后再 connectUser，
              // 否则 connectedUrls 为空会立刻抛 "not online on any connected server"。
              this.appProgress(8, "连接信令服务器...");
              const srv = await ensureServerConnected(ctx.user);
              this.updateHandshakeStatus();
              diag.mark("ensureServerConnected done", {
                connected: srv.connected,
                count: srv.urls.length,
                servers: srv.servers,
              });
              // 记录每台服务器的连接失败原因，便于排查"连不上服务器"的根因
              (srv.errors || []).forEach((e) => {
                diag.logEvent("server_connect_failed", {
                  url: e.url,
                  msg: e.msg,
                });
              });
              if (!srv.connected) {
                const reason = (srv.errors || [])
                  .map((e) => `${e.url}: ${e.msg}`)
                  .join("；");
                throw new Error(
                  "无法连接到任何信令服务器，请检查网络后重试。" +
                    (reason ? `（${reason}）` : ""),
                );
              }

              remoteUser = await ctx.user.connectUser(publisherUserId);
              this._remoteUser = remoteUser;
              diag.mark("connectUser done");

              // 探测一次连接路径，让历史里能看到走的是 RTC 直连还是哪台服务器
              try {
                await remoteUser.ping();
                diag.mark("ping done");
              } catch (e) {
                diag.mark("ping failed", {
                  msg: String((e && e.message) || e),
                });
              }
              // ping 后 getRTT 已有数据，刷新握手状态显示实际最快服务器
              this.updateHandshakeStatus();

              // 等待 RTC 直连就绪（最多 3s），避免关键请求撞上 relay → RTC 切换窗口期。
              // 如果 3s 内没升上来，就继续走 relay，不阻塞。
              this.appProgress(9, "等待建立直连通道...");
              const waited = await waitForRtcReady(remoteUser, 3000);
              diag.mark("waitForRtcReady done", waited);

              const rttInfo = remoteUser.getRTT && remoteUser.getRTT();
              diag.snapshot("pathOnConnect", pathInfoOf(remoteUser));
              // 初次连上时同步一次 pathHint（后续由 rtt_update 事件驱动更新）
              this.pathHint = formatPathHint(rttInfo);
              if (rttInfo) {
                if (rttInfo.via === "rtc") {
                  this.appProgress(10, "已连接发布者（RTC 直连）");
                } else if (rttInfo.via === "server") {
                  this.appProgress(10, "已连接发布者（经中继）");
                }
              }

              this.appProgress(14, "拉取分享清单...");
              diag.mark("payload requestManifest start");
              payload = await fetchSharePayload({
                publisher,
                remoteUser,
                payloadHash,
                publisherUserId,
                isPublicKeyOfUser,
                onEvent: (evt) => {
                  if (evt.type === "manifest") {
                    diag.mark("payload requestManifest done");
                    diag.snapshot("payloadManifest", {
                      chunks: evt.chunks,
                      fileSize: evt.fileSize,
                    });
                    this.appProgress(18, "下载分享清单内容...");
                  } else if (evt.type === "chunk-retry") {
                    diag.logEvent("chunk retry", {
                      label: evt.label,
                      attempt: evt.attempt,
                      msg: String((evt.err && evt.err.message) || evt.err),
                    });
                  }
                },
              });
              diag.mark("payload assembled");
            } catch (err) {
              if (err && err.code === "PAYLOAD_SIGNER_MISMATCH") {
                this.fail("签发者身份不匹配", err);
              } else {
                this.fail("获取分享清单失败", err);
              }
              return;
            }
            this._payload = payload;
            this._remoteUser = remoteUser;
            this._publisher = publisher;
            this.setMeta(payload);

            // 步骤 5：检查本地已装应用
            this.enterStep(5);
            this.appProgress(22, "检查本地已装应用...");
            let installed = null;
            try {
              installed = await findInstalled(payload, {
                storage,
                init: this._modules.init,
                findAppRecord,
              });
              diag.mark("findInstalled done", {
                found: !!installed,
                installedVersion:
                  (installed && installed.installedVersion) || "",
              });
            } catch (err) {
              this.fail("检查本地已装应用失败", err);
              return;
            }
            this._installed = installed;

            // 自我分享
            let isSelfShare = false;
            try {
              const currentUser = await ensureUser();
              if (
                currentUser &&
                payload.publisherUserId &&
                currentUser.userId === payload.publisherUserId
              ) {
                isSelfShare = true;
              }
            } catch (err) {
              console.warn("获取当前用户失败：", err);
            }

            // 已安装且版本一致 or 自我分享 → 直接跳转
            if (shouldSkipInstall(installed, payload, isSelfShare)) {
              this.enterStep(TOTAL_STEPS);
              this.setProgress(100, "已是最新，正在跳转...");
              this.goApp(installed.record.name);
              return;
            }

            // 步骤 6：若本地已有其它应用则等待用户确认
            try {
              const allApps = (await storage.apps) || [];
              const others = filterOtherApps(allApps, payload);
              if (others.length > 0) {
                this.enterStep(6);
                this.otherApps = others.map(formatOtherAppEntry);
                this.setProgress(CORE_END, "等待用户确认安装...");
                diag.mark("confirm shown");
                const agreed = await new Promise((resolve) => {
                  this._confirmResolver = resolve;
                  this.titleText = "确认安装此应用？";
                  this.subtitleText = `${payload.displayName || payload.recordName || ""} v${payload.version || "0.1.0"}`;
                  this.step = "confirm";
                });
                this._confirmResolver = null;
                diag.mark(agreed ? "confirm agreed" : "confirm canceled");
                if (!agreed) {
                  this.fail(
                    "已取消安装",
                    new Error("你取消了此次应用安装。"),
                  );
                  return;
                }
                this.setMeta(payload);
                this.step = "installing";
              }
            } catch (err) {
              console.warn("读取本地应用列表失败：", err);
            }

            // 步骤 7 / 8：拉取应用清单 → 下载并写入
            try {
              this.enterStep(7);
              this.appProgress(30, "拉取应用清单...");
              diag.mark("app requestManifest start", {
                pathNow: pathInfoOf(this._remoteUser),
              });
              const recordName = await installAppPackage({
                publisher: this._publisher,
                remoteUser: this._remoteUser,
                payload,
                payloadHash,
                existingRecord: installed ? installed.record : null,
                storage,
                init: this._modules.init,
                PACKAGE_VERSION: shareMgr.PACKAGE_VERSION,
                onEvent: (evt) => {
                  if (evt.type === "app-manifest") {
                    diag.mark("app requestManifest done");
                    diag.snapshot("appManifest", {
                      chunks: evt.chunks,
                      fileSize: evt.fileSize,
                    });
                  } else if (evt.type === "chunk-progress") {
                    this.appProgress(
                      30 + Math.floor((evt.index / evt.total) * 45),
                      `下载文件块 ${evt.index} / ${evt.total}...`,
                    );
                  } else if (evt.type === "chunk-retry") {
                    diag.logEvent("chunk retry", {
                      label: evt.label,
                      attempt: evt.attempt,
                      msg: String((evt.err && evt.err.message) || evt.err),
                    });
                  } else if (evt.type === "assemble") {
                    this.enterStep(8);
                    this.appProgress(78, "组装应用包...");
                  } else if (evt.type === "write") {
                    this.appProgress(
                      82,
                      evt.isUpdate
                        ? "覆盖写入应用文件..."
                        : "写入虚拟文件系统...",
                    );
                  } else if (evt.type === "record") {
                    this.appProgress(92, "记录应用信息...");
                  }
                },
              });
              // 步骤 9：启动应用
              this.enterStep(TOTAL_STEPS);
              this.setProgress(100, "启动应用...");
              this.goApp(recordName);
            } catch (err) {
              this.fail("安装失败", err);
            }
          },

          bindCoreEvents(user) {
            if (this._coreEventsBound || !user || !user.bind) return;
            this._coreEventsBound = true;
            try {
              user.bind("server_connected", (e) => {
                diag.logEvent("server_connected", e && e.detail);
                this.updateHandshakeStatus();
              });
              user.bind("server_disconnected", (e) => {
                diag.logEvent("server_disconnected", e && e.detail);
                this.updateHandshakeStatus();
              });
              user.bind("server_reconnecting", (e) =>
                diag.logEvent("server_reconnecting", e && e.detail),
              );
              user.bind("server_reconnect_exhausted", (e) =>
                diag.logEvent("server_reconnect_exhausted", e && e.detail),
              );
              user.bind("rtt_update", (e) => {
                const d = (e && e.detail) || {};
                // 只记 via + userId 前缀 + rtt，避免刷屏
                diag.logEvent("rtt_update", {
                  via: d.via,
                  rtt: typeof d.rtt === "number" ? Math.round(d.rtt) : d.rtt,
                  uid: d.userId ? String(d.userId).slice(0, 8) : "",
                });
                // 实时更新 pathHint（只关心当前发布者的路径）
                if (
                  this._remoteUser &&
                  d.userId &&
                  d.userId === this._remoteUser.userId
                ) {
                  this.pathHint = formatPathHint(
                    this._remoteUser.getRTT && this._remoteUser.getRTT(),
                  );
                }
              });
            } catch (err) {
              diag.logEvent("bindCoreEvents error", {
                msg: String((err && err.message) || err),
              });
            }
          },

          // 更新握手服务器状态：优先显示 getRTT 的实际最快路径，
          // 否则退回已连接的第一台服务器。
          async updateHandshakeStatus() {
            try {
              const { url, connected, rtt } = await readHandshakeStatus(
                this._userRef,
                this._remoteUser,
              );
              this.handshakeUrl =
                url && typeof rtt === "number"
                  ? `${url} · ${Math.round(rtt)}ms`
                  : url;
              this.handshakeConnected = connected;
            } catch (err) {
              diag.logEvent("updateHandshakeStatus error", {
                msg: String((err && err.message) || err),
              });
            }
          },

          agreeInstall() {
            if (this._confirmResolver) this._confirmResolver(true);
          },

          cancelInstall() {
            if (this._confirmResolver) this._confirmResolver(false);
          },
        },
      };
    };
  </script>
</template>
