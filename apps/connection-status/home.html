<template page>
  <style>
    :host {
      display: block;
      height: 100%;
      overflow: auto;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-header h2 {
      margin: 0;
      font-size: 18px;
      color: var(--md-sys-color-on-surface);
    }
    .section-header .count {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      background-color: var(--md-sys-color-surface-container-highest);
      padding: 2px 10px;
      border-radius: 999px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 12px;
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      color: inherit;
      text-decoration: none;
      transition:
        background-color ease 0.15s,
        transform ease 0.1s;
      position: relative;
    }
    .item:hover {
      background-color: var(--md-sys-color-surface-container-high);
    }
    .item:active {
      transform: scale(0.96);
    }
    .icon-wrap {
      position: relative;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }
    .icon-wrap n-icon {
      font-size: 32px;
      width: 32px;
      height: 32px;
    }
    .icon-wrap.user {
      background-color: var(--md-sys-color-tertiary-container);
      color: var(--md-sys-color-on-tertiary-container);
    }
    .status-dot {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--md-sys-color-outline);
      border: 2px solid var(--md-sys-color-surface);
    }
    .status-dot.connected {
      background-color: #22c55e;
    }
    .label {
      width: 100%;
      text-align: center;

      color: var(--md-sys-color-on-surface);
      word-break: break-all;
      display: -webkit-box;

      -webkit-box-orient: vertical;

    }
    .empty {
      padding: 24px 12px;

    }
    .error {
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 12px;
      background-color: var(--md-sys-color-error-container);
      color: var(--md-sys-color-on-error-container);
      font-size: 13px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>

  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>

  <div class="container">
    <o-if :value="error">
      <div class="error">{{error}}</div>
    </o-if>

    <!-- 服务器区块 -->
    <div class="section">
      <div class="section-header">
        <h2>服务器</h2>
        <div class="actions">
          <span class="count">{{serverList.length}}</span>
          <p-button
            variant="text"
            icon
            size="s"
            on:click="refreshAll"
            title="刷新"
          >
            <n-icon icon="mdi:refresh"></n-icon>
          </p-button>
        </div>
      </div>

      <o-if :value="serverList.length === 0">
        <div class="empty">暂无服务器</div>
      </o-if>

      <o-if :value="serverList.length > 0">
        <div class="grid">
          <o-fill :value="serverList">
            <a
              class="item"
              attr:href="$host.buildServerHref($data.url)"
              olink
              attr:title="$data.url"
            >
              <div class="icon-wrap">
                <n-icon icon="mdi:server-network"></n-icon>
                <span
                  class="status-dot"
                  class:connected="$data.connected"
                ></span>
              </div>
              <div class="label">{{$data.url}}</div>
            </a>
          </o-fill>
        </div>
      </o-if>
    </div>

    <!-- 用户区块 -->
    <div class="section">
      <div class="section-header">
        <h2>已连接用户</h2>
        <span class="count">{{userList.length}}</span>
      </div>

      <o-if :value="userList.length === 0">
        <div class="empty">暂无已连接的用户</div>
      </o-if>

      <o-if :value="userList.length > 0">
        <div class="grid">
          <o-fill :value="userList">
            <a
              class="item"
              attr:href="$host.buildUserHref($data.userId)"
              olink
              attr:title="$data.userId"
            >
              <div class="icon-wrap user">
                <n-icon icon="mdi:account-circle"></n-icon>
                <span
                  class="status-dot"
                  class:connected="$data.online"
                ></span>
              </div>
              <div class="label">{{$data.displayName}}</div>
            </a>
          </o-fill>
        </div>
      </o-if>
    </div>
  </div>

  <script>
    import { getUser } from "/nos/user/main.js";

    const NAMESPACE = "mazmot";

    function shortId(userId) {
      if (!userId) return "";
      return userId.length > 12 ? userId.slice(0, 8) + "…" : userId;
    }

    export default async () => {
      return {
        data: {
          error: "",
          serverList: [],
          userList: [],
        },
        async ready() {
          try {
            this._user = await getUser(NAMESPACE);
          } catch (err) {
            this.error = "初始化用户失败：" + (err.message || String(err));
            console.error("[connection-status] 初始化用户失败：", err);
            return;
          }
          this._bindEvents();
          await this.refreshAll();
        },
        detached() {
          this._unbindEvents();
        },
        proto: {
          _bindEvents() {
            if (!this._user) return;
            this._unbindHandlers = [
              this._user.bind("server_connected", () => this.refreshServers()),
              this._user.bind("server_disconnected", () =>
                this.refreshServers(),
              ),
              this._user.bind("remote_user_connected", () =>
                this.refreshUsers(),
              ),
              this._user.bind("remote_user_disconnected", () =>
                this.refreshUsers(),
              ),
            ];
          },
          _unbindEvents() {
            if (!this._unbindHandlers) return;
            this._unbindHandlers.forEach((off) => {
              try {
                off && off();
              } catch (e) {}
            });
            this._unbindHandlers = null;
          },
          async refreshAll() {
            await Promise.all([this.refreshServers(), this.refreshUsers()]);
          },
          async refreshServers() {
            if (!this._user) return;
            try {
              const urls = await this._user.server.getServers();
              const connected = new Set(
                Array.isArray(this._user.server.connectedUrls)
                  ? this._user.server.connectedUrls
                  : [],
              );
              const list = urls.map((url) => ({
                url,
                connected: connected.has(url),
              }));
              this.serverList.length = 0;
              list.forEach((item) => this.serverList.push(item));
            } catch (err) {
              console.error("[connection-status] 获取服务器失败：", err);
              this.error = "获取服务器列表失败：" + (err.message || err);
            }
          },
          async refreshUsers() {
            if (!this._user) return;
            try {
              const remotes = Array.isArray(this._user.remoteUsers)
                ? this._user.remoteUsers
                : [];
              const list = await Promise.all(
                remotes.map(async (ru) => {
                  let online = false;
                  try {
                    online = await this._user.isRemoteUserOnline(ru.userId);
                  } catch (e) {
                    online = false;
                  }
                  return {
                    userId: ru.userId,
                    displayName: shortId(ru.userId),
                    online,
                  };
                }),
              );
              this.userList.length = 0;
              list.forEach((item) => this.userList.push(item));
            } catch (err) {
              console.error("[connection-status] 获取用户失败：", err);
              this.error = "获取用户列表失败：" + (err.message || err);
            }
          },
          buildServerHref(url) {
            return `./server-detail.html?url=${encodeURIComponent(url)}`;
          },
          buildUserHref(userId) {
            return `./user-detail.html?userId=${encodeURIComponent(userId)}`;
          },
        },
      };
    };
  </script>
</template>
