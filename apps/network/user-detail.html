  <script>
    import { getUser } from "/nos/user/main.js";

    const NAMESPACE = "mazmot";

    function shortId(userId) {
      if (!userId) return "";
      return userId.length > 12 ? userId.slice(0, 8) + "…" : userId;
    }

    function formatBytes(bytes) {
      if (bytes === 0 || !bytes) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      const value = bytes / Math.pow(1024, i);
      return `${value.toFixed(i === 0 ? 0 : 2)} ${units[Math.min(i, units.length - 1)]}`;
    }

    export default async ({ query }) => {
      const userId = query.userId || "";
      return {
        data: {
          userId,
          displayName: shortId(userId),
          error: "",
          online: false,
          sessionIds: [],
          rtt: null,
          rttVia: "",
          busy: false,
          rtcSent: 0,
          rtcReceived: 0,
          rtcSentText: "0 B",
          rtcReceivedText: "0 B",
          sessionTraffic: [],
        },
        async ready() {
          if (!this.userId) {
            this.error = "缺少 userId 参数";
            return;
          }
          try {
            this._user = await getUser(NAMESPACE);
          } catch (err) {
            this.error = "初始化用户失败：" + (err.message || err);
            return;
          }
          this._locateRemote();
          this._bindEvents();
          await this.refreshSessions();
          await this.updateTraffic();
          this._intervalId = setInterval(() => this.tick(), 1000);
        },
        detached() {
          this._unbindEvents();
          if (this._intervalId) {
            clearInterval(this._intervalId);
            this._intervalId = null;
          }
        },
        proto: {
          _locateRemote() {
            const remotes = Array.isArray(this._user.remoteUsers)
              ? this._user.remoteUsers
              : [];
            this._remoteUser = remotes.find((r) => r.userId === this.userId) || null;
          },
          _bindEvents() {
            if (!this._user) return;
            const onDisconnected = (event) => {
              const detail = event.detail || {};
              if (detail.userId !== this.userId) return;
              this.online = false;
              this.sessionIds.length = 0;
              this._remoteUser = null;
            };
            const onConnected = (event) => {
              const detail = event.detail || {};
              if (detail.userId !== this.userId) return;
              this._locateRemote();
              this.refreshSessions();
            };
            const onRtt = (event) => {
              const detail = event.detail || {};
              if (detail.userId !== this.userId) return;
              if (typeof detail.rtt === "number") {
                this.rtt = Math.round(detail.rtt);
                this.rttVia = detail.via || "";
              }
            };
            this._unbindHandlers = [
              this._user.bind("remote_user_disconnected", onDisconnected),
              this._user.bind("remote_user_connected", onConnected),
              this._user.bind("rtt_update", onRtt),
            ];
          },
          _unbindEvents() {
            if (!this._unbindHandlers) return;
            this._unbindHandlers.forEach((off) => {
              try {
                off && off();
              } catch (e) {}
            });
            this._unbindHandlers = null;
          },
          async refreshSessions() {
            if (!this._user) return;
            this.busy = true;
            this.error = "";
            try {
              this.online = await this._user.isRemoteUserOnline(this.userId);
              this._locateRemote();
              let sessions = [];
              if (this._remoteUser) {
                try {
                  sessions = await this._remoteUser.getSessionIds();
                } catch (e) {
                  sessions = [];
                }
              }
              this.sessionIds.length = 0;
              (sessions || []).forEach((sid) => this.sessionIds.push(sid));

              // 更新缓存的 RTT
              if (this._remoteUser) {
                const best = this._remoteUser.getRTT();
                if (best && typeof best.rtt === "number") {
                  this.rtt = Math.round(best.rtt);
                  this.rttVia = best.via || "";
                }
              }
            } catch (err) {
              console.error("[user-detail] refreshSessions 失败：", err);
              this.error = "刷新会话失败：" + (err.message || err);
            } finally {
              this.busy = false;
            }
          },
          async pingUser() {
            if (!this._remoteUser || this.sessionIds.length === 0) return;
            this.busy = true;
            try {
              const sid = this.sessionIds[0];
              const rtt = await this._remoteUser.ping(sid);
              if (typeof rtt === "number") {
                this.rtt = Math.round(rtt);
                const info = this._remoteUser.getRTT(sid);
                this.rttVia = (info && info.via) || "";
              }
            } catch (err) {
              console.error("[user-detail] ping 失败：", err);
              this.error = "Ping 失败：" + (err.message || err);
            } finally {
              this.busy = false;
            }
          },
          async disconnect() {
            if (!this._user) return;
            this.busy = true;
            try {
              await this._user.disconnectUser(this.userId);
              this.online = false;
              this.sessionIds.length = 0;
              this._remoteUser = null;
            } catch (err) {
              console.error("[user-detail] disconnect 失败：", err);
              this.error = "断开失败：" + (err.message || err);
            } finally {
              this.busy = false;
            }
          },
          async tick() {
            await this.updateTraffic();
          },
          async updateTraffic() {
            if (!this._user || !this._user.traffic) return;
            try {
              const peerTotals = await this._user.traffic.getPeerTotals();
              const mine = peerTotals.find(
                (t) => t.peerUserId === this.userId,
              ) || { bytesOut: 0, bytesIn: 0 };
              this.rtcSent = mine.bytesOut || 0;
              this.rtcReceived = mine.bytesIn || 0;
              this.rtcSentText = formatBytes(this.rtcSent);
              this.rtcReceivedText = formatBytes(this.rtcReceived);
            } catch (err) {
              // ignore
            }

            try {
              const rows = await this._user.traffic.query({
                peerUserId: this.userId,
                limit: 20,
                order: "desc",
              });
              const list = (rows || []).map((row) => ({
                sid: row.sessionId || "-",
                sent: row.direction === "out" ? row.size : 0,
                received: row.direction === "in" ? row.size : 0,
                sentText:
                  row.direction === "out" ? formatBytes(row.size) : "-",
                receivedText:
                  row.direction === "in" ? formatBytes(row.size) : "-",
                via: row.via || "-",
                category: row.category || "-",
                timeText: new Date(row.ts).toLocaleTimeString(),
              }));
              this.sessionTraffic.length = 0;
              list.forEach((item) => this.sessionTraffic.push(item));
            } catch (err) {
              // ignore
            }
          },
          goBack() {
            this.back();
          },
        },
      };
    };
  </script>
