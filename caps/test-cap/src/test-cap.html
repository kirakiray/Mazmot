<template component>
  <style>
    :host {
      display: block;
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 1.1em;
      font-weight: bold;
    }

    .test-result {
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .test-result[status="pass"] {
      background: #d4edda;
      border-left: 4px solid #28a745;
    }

    .test-result[status="fail"] {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
    }

    .test-result[status="error"] {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
    }

    .test-result[status="pass"] .test-name {
      color: #155724;
    }

    .test-result[status="fail"] .test-name {
      color: #721c24;
    }

    .test-result[status="error"] .test-name {
      color: #856404;
    }

    .test-result[status="pass"] .status-icon {
      color: #28a745;
    }

    .test-result[status="fail"] .status-icon {
      color: #dc3545;
    }

    .test-result[status="error"] .status-icon {
      color: #ffc107;
    }

    .test-result[status="pass"] .message,
    .test-result[status="fail"] .message {
      color: #155724;
    }

    .test-result[status="error"] .message {
      color: #856404;
    }

    .test-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .status-icon {
      font-weight: bold;
      margin-right: 8px;
      font-size: 1.1em;
    }

    .message {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 3px;
      font-size: 0.9em;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
  <div>
    <h3>{{ label }}</h3>
    <o-fill :value="testResults">
      <div class="test-result" attr:status="$data.status">
        <div class="test-name">
          <span class="status-icon">{{ $data.icon }}</span>
          <span>{{ $data.cid }}</span>
        </div>
        <div class="message">{{ $data.message }}</div>
      </div>
    </o-fill>
  </div>
  <script>
    export default async ({ load }) => {
      const { createScriptWithSourceMap } = await load("./util.js");
      
      return {
        tag: "test-cap",
        attrs: {
          dialogueHost: 1,
          name: null,
          id: null,
        },
        data: {
          label: "测试能力",
          testResults: [],
        },
        proto: {
          async handleCapabilityResults(results) {
            this.testResults = [];

            for (let item of results) {
              const { cid } = item;

              const targetTemp = this.$(`template[result][cid=${cid}]`);

              const result = item.result;

              const scriptEle = targetTemp.$("script[type='module']");

              let sourceFile = "";

              if (this.host) {
                sourceFile = this.host.PATH;
              } else {
                sourceFile = location.origin + location.pathname;
              }
              const sourceContnt = await fetch(sourceFile).then((res) =>
                res.text(),
              );

              if (scriptEle) {
                const scriptText = scriptEle.text;

                const startIndex = sourceContnt.indexOf(
                  scriptEle.ele.outerHTML,
                );
                const prevContent = sourceContnt.slice(0, startIndex);
                const targetLine = prevContent.split("\n").length - 1;

                const url = createScriptWithSourceMap(scriptText, targetLine, sourceFile, sourceContnt);

                try {
                  const module = await import(url);
                  if (module.default) {
                    const testResult = await module.default(result);
                    console.log(`测试结果 [${cid}]:`, testResult);

                    if (testResult && testResult.assert) {
                      this.testResults.push({
                        cid,
                        status: "pass",
                        icon: "✓",
                        message: testResult.content || "测试通过",
                      });
                    } else {
                      this.testResults.push({
                        cid,
                        status: "fail",
                        icon: "✗",
                        message: testResult?.content || "断言失败",
                      });
                    }
                  }
                } catch (error) {
                  console.error(`运行测试脚本失败 [${cid}]:`, error);
                  this.testResults.push({
                    cid,
                    status: "error",
                    icon: "⚠",
                    message: `运行错误: ${error.message}`,
                  });
                }
              }
            }
            console.log(results);
          },
        },
      };
    };
  </script>
</template>
