<template component>
  <style>
    :host {
      display: block;
      padding: 16px;
      border: 1px solid var(--md-sys-color-surface-variant, #ddd);
      border-radius: 8px;
      margin: 8px 0;
      background-color: var(--md-sys-color-surface);
    }
    
    h3 {
      margin: 0 0 12px 0;
      color: var(--md-sys-color-on-surface);
    }
    
    .test-result {
      padding: 12px;
      margin: 8px 0;
      border-radius: var(--pui-default-rounded, 4px);
      background-color: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }
    
    .test-result[status="pass"] {
      background-color: var(--md-sys-color-success-container);
      color: var(--md-sys-color-on-success-container);
      border-left: 4px solid var(--md-sys-color-success);
    }
    
    .test-result[status="fail"] {
      background-color: var(--md-sys-color-error-container);
      color: var(--md-sys-color-on-error-container);
      border-left: 4px solid var(--md-sys-color-error);
    }
    
    .test-result[status="error"] {
      background-color: var(--md-sys-color-neutral-container);
      color: var(--md-sys-color-on-neutral-container);
      border-left: 4px solid var(--md-sys-color-neutral);
    }
    
    .status-icon {
      font-weight: bold;
      margin-right: 8px;
      font-size: 1.1em;
    }
    
    b {
      color: var(--md-sys-color-primary);
    }
  </style>
  <div>
    <h3>{{ label }}</h3>
    <o-fill :value="testResults">
      <div class="test-result" attr:status="$data.status">
        <span class="status-icon">{{ $data.icon }}</span>
        <b>{{ $data.cid }}</b>: {{ $data.message }}
      </div>
    </o-fill>
  </div>
  <script>
    export default async () => {
      return {
        tag: "test-cap",
        attrs: {
          dialogueHost: 1,
          name: null,
          id: null,
        },
        data: {
          label: "测试能力",
          testResults: [],
        },
        proto: {
          async handleCapabilityResults(results) {
            this.testResults = [];

            for (let item of results) {
              const { cid } = item;

              const targetTemp = this.$(`template[result][cid=${cid}]`);

              const result = item.result;

              const scriptEle = targetTemp.$("script[type='module']");
              if (scriptEle) {
                const scriptText = scriptEle.text;
                const blob = new Blob([scriptText], {
                  type: "application/javascript",
                });
                const url = URL.createObjectURL(blob);

                try {
                  const module = await import(url);
                  if (module.default) {
                    const testResult = await module.default(result);
                    console.log(`测试结果 [${cid}]:`, testResult);

                    if (testResult && testResult.assert) {
                      this.testResults.push({
                        cid,
                        status: "pass",
                        icon: "✓",
                        message: testResult.content || "测试通过",
                      });
                    } else {
                      this.testResults.push({
                        cid,
                        status: "fail",
                        icon: "✗",
                        message: testResult?.content || "断言失败",
                      });
                    }
                  }
                } catch (error) {
                  console.error(`运行测试脚本失败 [${cid}]:`, error);
                  this.testResults.push({
                    cid,
                    status: "error",
                    icon: "⚠",
                    message: `运行错误: ${error.message}`,
                  });
                } finally {
                  URL.revokeObjectURL(url);
                }
              }
            }
            console.log(results);
          },
        },
      };
    };
  </script>
</template>
