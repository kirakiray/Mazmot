<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自定义表单演示组件</title>
    <script src="/gh/ofajs/ofa.js/dist/ofa.mjs#debug" type="module"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
  </head>
  <body>
    <o-page src="../view/form.html"></o-page>
    <script type="module">
      await new Promise((resolve) => setTimeout(resolve, 300));

      const page = $("o-page");

      page.init([
        {
          type: "radio",
          name: "gender",
          desc: "请选择您的性别",
          required: true,
          options: [
            {
              label: "男",
              value: "male",
            },
            {
              label: "女",
              value: "female",
            },
          ],
        },
        {
          type: "text",
          name: "name",
          desc: "请输入您的姓名",
          required: true,
        },
      ]);
    </script>
  </body>
</html>
