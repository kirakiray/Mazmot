<template page>
  <l-m src="https://punch-ui-v2.pages.dev/packages/radio/group.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/radio/radio.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
      box-sizing: border-box;
      margin: 0 auto;
      padding: 16px;
    }
    .form-item {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface);
    }
    .required-mark {
      color: var(--md-sys-color-error);
      margin-left: 4px;
    }
    p-radio {
      margin-right: 16px;
    }
  </style>
  <h2>自定义表单</h2>
  <o-fill :value="formItems">
    <div class="form-item">
      <label class="form-label">
        {{ $data.desc }}<span class:required-mark="$data.required">*</span>
      </label>
      <o-if :value="$data.type === 'radio'">
        <p-radio-group sync:value="$data.value">
          <o-fill :value="$data.options">
            <p-radio attr:value="$data.value">{{ $data.label }}</p-radio>
          </o-fill>
        </p-radio-group>
      </o-if>
      <o-if :value="$data.type === 'text'">
        <p-input sync:value="$data.value" attr:placeholder="$data.placeholder">
          <o-if :value="$data.label" slot="label">
            <span>{{ $data.label }}</span>
          </o-if>
        </p-input>
      </o-if>
    </div>
  </o-fill>

  <div style="margin-top: 24px; display: flex; gap: 12px">
    <o-if :value="submitName">
      <p-button color="primary" size="s" type="submit"
        >{{ submitName }}</p-button
      >
    </o-if>
    <o-if :value="cancelName">
      <p-button size="s" type="button" color="error" variant="outlined">
        {{ cancelName }}
      </p-button>
    </o-if>
  </div>
  <script>
    export default () => {
      return {
        data: {
          formItems: [],
          submitName: "Submit",
          cancelName: "Cancel",
        },
        proto: {
          async init(arr) {
            const formItems = [];
            arr.forEach((item) => {
              if (item.type === "submit") {
                this.submitName = item.name || "Submit";
              } else if (item.type === "cancel") {
                this.cancelName = item.name || "Cancel";
              } else {
                formItems.push({
                  ...item,
                  value: item.defaultValue || "",
                });
              }
            });
            this.formItems = formItems;
          },
        },
      };
    };
  </script>
</template>
