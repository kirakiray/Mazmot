<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Container Info</title>
    <script src="https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.js"></script>
    <link
      rel="stylesheet"
      href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
    />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 24px 20px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .header n-icon {
        font-size: 32px;
        color: var(--md-sys-color-primary);
      }
      .header h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }
      .header .subtitle {
        color: var(--md-sys-color-on-surface-variant);
        font-size: 13px;
        margin-top: 2px;
      }
      .card {
        background-color: var(--md-sys-color-surface-container);
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 16px;
        border: 1px solid var(--md-sys-color-outline-variant);
      }
      .card-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--md-sys-color-on-surface-variant);
        letter-spacing: 0.4px;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .info-row {
        display: flex;
        align-items: flex-start;
        padding: 10px 0;
        gap: 16px;
        border-bottom: 1px solid var(--md-sys-color-outline-variant);
      }
      .info-row:last-child {
        border-bottom: none;
      }
      .info-label {
        min-width: 120px;
        color: var(--md-sys-color-on-surface-variant);
        font-size: 13px;
        flex-shrink: 0;
        padding-top: 4px;
      }
      .info-value {
        flex: 1;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 13px;
        word-break: break-all;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 24px;
      }
      .info-value.plain {
        font-family: inherit;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        background-color: var(--md-sys-color-primary-container);
        color: var(--md-sys-color-on-primary-container);
      }
      .badge.warn {
        background-color: var(--md-sys-color-error-container);
        color: var(--md-sys-color-on-error-container);
      }
      .copy-btn {
        --icon-color: var(--md-sys-color-on-surface-variant);
      }
      .loading,
      .error {
        text-align: center;
        padding: 40px 20px;
        color: var(--md-sys-color-on-surface-variant);
      }
      .error {
        color: var(--md-sys-color-error);
      }
      pre.pubkey {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 12px;
        line-height: 1.5;
        background-color: var(--md-sys-color-surface);
        padding: 12px;
        border-radius: 8px;
        max-height: 200px;
        overflow: auto;
        border: 1px solid var(--md-sys-color-outline-variant);
        width: 100%;
      }
    </style>

    <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
    <l-m src="/nos/n-icon/n-icon.html"></l-m>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <n-icon icon="mdi:account-circle"></n-icon>
        <div>
          <h1>容器用户信息</h1>
          <div class="subtitle" id="subtitle">
            当前 NoneOS Core 容器的 default 用户
          </div>
        </div>
      </div>

      <div id="content">
        <div class="loading">
          <n-icon icon="line-md:loading-twotone-loop"></n-icon>
          正在加载用户信息...
        </div>
      </div>
    </div>

    <script type="module">
      import { toast } from "https://punch-ui-v2.pages.dev/packages/util.js";

      const NAMESPACE = "default";

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          toast({ content: "已复制到剪贴板", color: "success" });
        } catch (err) {
          toast({
            content: "复制失败：" + (err.message || err),
            color: "error",
          });
        }
      }

      function formatTime(ts) {
        if (!ts) return "-";
        try {
          const d = new Date(ts);
          return d.toLocaleString();
        } catch (e) {
          return String(ts);
        }
      }

      function escapeHtml(s) {
        if (s === undefined || s === null) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderRow(label, valueHtml, options = {}) {
        return `
          <div class="info-row">
            <div class="info-label">${escapeHtml(label)}</div>
            <div class="info-value ${options.plain ? "plain" : ""}">
              ${valueHtml}
            </div>
          </div>
        `;
      }

      function renderCopyable(id, text, display) {
        const shown = display || text;
        return `
          <span data-copy-id="${id}" style="flex:1">${escapeHtml(shown)}</span>
          <p-button
            class="copy-btn"
            variant="text"
            icon
            size="xs"
            data-copy="${id}"
            title="复制"
          >
            <n-icon icon="mdi:content-copy"></n-icon>
          </p-button>
        `;
      }

      async function main() {
        const content = document.getElementById("content");
        const subtitle = document.getElementById("subtitle");

        try {
          const { storage } = await import(
            "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js"
          );
          const occupier = await storage.getItem("occupier");

          const { getUser } = await import("/nos/user/main.js");
          const user = await getUser(NAMESPACE);

          const userId = user.userId || "";
          const publicKey = user.publicKey || "";
          const namespace = user.namespace || NAMESPACE;

          // 获取签名信息
          let info = null;
          try {
            info = await user.getInfo();
          } catch (e) {
            console.warn("getInfo 失败：", e);
          }

          // 获取所有 session ids
          let sessionIds = [];
          try {
            sessionIds = await user.getSessionIds(50);
          } catch (e) {
            console.warn("getSessionIds 失败：", e);
          }

          // 验证签名
          let sigValid = null;
          if (info) {
            try {
              sigValid = await user.verify(info);
            } catch (e) {
              sigValid = false;
            }
          }

          subtitle.textContent = `命名空间：${namespace} · 容器地址：${location.origin}`;

          const copies = new Map();
          copies.set("uid", userId);
          copies.set("pk", publicKey);

          const infoFieldsHtml = info
            ? Object.entries(info)
                .filter(
                  ([k]) =>
                    !["signature", "signTime", "publicKey", "userId"].includes(
                      k,
                    ),
                )
                .map(([k, v]) =>
                  renderRow(
                    k,
                    `<span>${escapeHtml(
                      typeof v === "object" ? JSON.stringify(v) : v,
                    )}</span>`,
                    { plain: true },
                  ),
                )
                .join("")
            : "";

          content.innerHTML = `
            <div class="card">
              <div class="card-title">
                <n-icon icon="mdi:domain"></n-icon>
                容器占用信息
              </div>
              ${
                occupier
                  ? `
                ${renderRow("占用应用", `<span>${escapeHtml(occupier.name)}</span>`, { plain: true })}
                ${renderRow("父层来源", `<span>${escapeHtml(occupier.parentOrigin)}</span>`, { plain: true })}
                ${renderRow("占用时间", `<span>${escapeHtml(formatTime(occupier.time))}</span>`, { plain: true })}
              `
                  : renderRow("状态", `<span class="badge">闲置中</span>`, {
                      plain: true,
                    })
              }
            </div>

            <div class="card">
              <div class="card-title">
                <n-icon icon="mdi:card-account-details-outline"></n-icon>
                身份标识
              </div>
              ${renderRow("命名空间", `<span>${escapeHtml(namespace)}</span>`, { plain: true })}
              ${renderRow("User ID", renderCopyable("uid", userId))}
              ${renderRow(
                "公钥",
                `<pre class="pubkey">${escapeHtml(publicKey)}</pre>
                 <p-button
                   class="copy-btn"
                   variant="text"
                   icon
                   size="xs"
                   data-copy="pk"
                   title="复制公钥"
                 >
                   <n-icon icon="mdi:content-copy"></n-icon>
                 </p-button>`,
              )}
            </div>

            <div class="card">
              <div class="card-title">
                <n-icon icon="mdi:information-outline"></n-icon>
                个人资料
              </div>
              ${
                info
                  ? `
                ${renderRow("用户名", `<span>${escapeHtml(info.username || "-")}</span>`, { plain: true })}
                ${infoFieldsHtml}
                ${renderRow(
                  "签名时间",
                  `<span>${escapeHtml(formatTime(info.signTime))}</span>`,
                  { plain: true },
                )}
                ${renderRow(
                  "签名验证",
                  sigValid === true
                    ? `<span class="badge">
                         <n-icon icon="mdi:check-circle-outline"></n-icon>
                         &nbsp;有效
                       </span>`
                    : `<span class="badge warn">
                         <n-icon icon="mdi:alert-circle-outline"></n-icon>
                         &nbsp;无效或缺失
                       </span>`,
                  { plain: true },
                )}
              `
                  : renderRow(
                      "状态",
                      `<span class="badge warn">未生成个人资料</span>`,
                      { plain: true },
                    )
              }
            </div>

            <div class="card">
              <div class="card-title">
                <n-icon icon="mdi:tab-multiple"></n-icon>
                在线会话（Session）
              </div>
              ${
                sessionIds && sessionIds.length
                  ? sessionIds
                      .map((sid, i) =>
                        renderRow(
                          `Session ${i + 1}`,
                          `<span>${escapeHtml(sid)}</span>`,
                          { plain: false },
                        ),
                      )
                      .join("")
                  : renderRow(
                      "会话数量",
                      `<span>无同 namespace 的在线会话</span>`,
                      { plain: true },
                    )
              }
            </div>
          `;

          // 绑定复制按钮
          content.querySelectorAll("[data-copy]").forEach((btn) => {
            const key = btn.getAttribute("data-copy");
            btn.addEventListener("click", () => {
              copyText(copies.get(key) || "");
            });
          });
        } catch (err) {
          console.error(err);
          content.innerHTML = `<div class="error">
            <n-icon icon="mdi:alert-circle"></n-icon>
            加载失败：${escapeHtml(err.message || String(err))}
            <br /><br />
            请确认当前页面运行在已安装 NoneOS Core 的容器内。
          </div>`;
        }
      }

      main();
    </script>
  </body>
</html>
