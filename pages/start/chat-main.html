<template page>
  <l-m src="../../comps/chatbox/chatbox.html"></l-m>
  <l-m src="../../comps/o-md/o-md.html"></l-m>
  <l-m src="../../comps/cap-request/cap-request.html"></l-m>
  <l-m src="../../comps/mascot/mascot.html"></l-m>
  <l-m src="../../comps/usage-stats/usage-stats.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
      /* gap: 12px; */
    }
    m-chatbox {
      display: block;
    }
    m-chat-item[role="system"],
    m-chat-item[hidden],
    m-chat-item[is-response] {
      display: none;
    }
  </style>
  <div style="flex: 1; overflow: auto">
    <div style="height: 40px"></div>
    <m-chatbox>
      <o-fill :value="messages">
        <m-chat-item
          attr:role="$data.role"
          attr:is-response="$data.isResponse"
          attr:hidden="$data.hidden"
        >
          <o-if :value="$data.role === 'assistant'" slot="avatar">
            <m-mascot style="--mascot-size: 28px"></m-mascot>
          </o-if>
          <o-else slot="avatar"> U </o-else>
          <o-if :value="$data.role !== 'system' && !$data.isResponse">
            <o-md>{{$data.content}}</o-md>
          </o-if>

          <o-if :value="$data.usage">
            <m-usage-stats attr:model="$data.model" :usage="$data.usage"></m-usage-stats>
          </o-if>
        </m-chat-item>
      </o-fill>
      <o-if :value="isLoading">
        <m-chat-item role="assistant">AI 正在处理... </m-chat-item>
      </o-if>
      <o-if :value="!hasVisibleMessages && !isLoading">
        <div
          style="
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            color: var(--md-sys-color-normal);
          "
        >
          请输入消息
        </div>
      </o-if>
    </m-chatbox>
  </div>
  <div
    style="
      display: flex;
      align-items: flex-end;
      box-sizing: border-box;
      max-width: 800px;
      width: 100%;
      padding: 12px 12px 12px 0;
      gap: 12px;
      margin: 0 auto;
    "
  >
    <p-input
      sync:value="inputMessage"
      style="flex: 1"
      on:keydown="handleKeyDown"
    >
      <span slot="label">输入消息</span>
    </p-input>
    <p-button on:click="sendMessage" attr:disabled="isLoading">发送</p-button>
  </div>
  <o-consumer name="chat-data" watch:session-id="currentSessionId"></o-consumer>
  <script>
    export default async ({ load }) => {
      const { getAssistant } = await load("../../ai/main.js");
      const { getChatPrompt } = await load("./chat-prompt.js");
      const { saveHistory, loadHistory } = await load("../../util/history.js");

      return {
        data: {
          currentSessionId: null,
          messages: [],
          inputMessage: "",
          isLoading: false,
        },
        ready() {
          this.attr("dialogue-host", "");
        },
        watch: {
          async currentSessionId(newId) {
            if (!newId) return;

            const savedHistory = await loadHistory(newId);

            if (savedHistory && savedHistory.messages) {
              this.messages = savedHistory.messages;
            } else {
              const initMessages = await getChatPrompt();
              this.messages = initMessages;
            }

            window._msgs = this.messages;
          },
        },
        proto: {
          get hasVisibleMessages() {
            if (!this.messages) return false;
            return this.messages.some((m) => m.role !== "system" && !m.hidden);
          },
          async handleCapabilityResults(results) {
            const templates = results.map((r) => {
              if (r.error) {
                return `<template error name="${r.name}" cid="${r.cid}">${r.error}</template>`;
              }
              const resultStr =
                typeof r.result === "string"
                  ? r.result
                  : JSON.stringify(r.result);
              return `<template result name="${r.name}" cid="${r.cid}">${resultStr}</template>`;
            });

            this.messages.push({
              role: "user",
              content: `<cap-response>${templates.join("\n")}</cap-response>`,
              isResponse: true,
              responsesData: results,
            });

            await this.callAssistant();
          },
          handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              this.sendMessage();
            }
          },
          async callAssistant() {
            if (!this.messages.some((m) => m.role === "system")) return;

            this.isLoading = true;

            try {
              const assistant = await getAssistant();
              if (!assistant) {
                this.messages.push({
                  role: "assistant",
                  content: "请先在设置中配置 DeepSeek API Key",
                });
                return;
              }

              const chatMessages = this.messages.map((m) => ({
                role: m.role,
                content: m.content,
              }));

              const response = await assistant.chat({
                messages: chatMessages,
                model: "deepseek-v4-pro",
              });

              this.messages.push({
                role: "assistant",
                content: response.content,
                usage: response.usage,
                model: response.model,
              });

              await saveHistory(this.currentSessionId, this.messages);
              const provider = this.getProvider("chat-data");
              provider.dispatch("refresh-histories");
            } catch (e) {
              this.messages.push({
                role: "assistant",
                content: "请求失败：" + e.message,
              });
            } finally {
              this.isLoading = false;
            }
          },
          async sendMessage() {
            const message = this.inputMessage.trim();
            if (!message || this.isLoading) return;

            this.messages.push({ role: "user", content: message });
            this.inputMessage = "";

            await saveHistory(this.currentSessionId, this.messages);
            const provider = this.getProvider("chat-data");
            provider.dispatch("refresh-histories");

            await this.callAssistant();
          },
        },
      };
    };
  </script>
</template>
