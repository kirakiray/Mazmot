<template page>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/navigation/nav-bar.html"
  ></l-m>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/navigation/nav-layout.html"
  ></l-m>
  <style>
    :host {
      display: block;
      height: 100%;
    }
    .content-area {
      height: 100%;
      overflow: auto;
    }
  </style>
  <p-nav-layout>
    <div class="content-area">
      <slot></slot>
    </div>
    <p-nav-bar slot="nav">
      <p-nav-item
        attr:active="activeTab === 'start'"
        on:click="goto('./start.html')"
      >
        <iconify-icon slot="icon" icon="solar:chat-square-bold"></iconify-icon>
        <span>开始</span>
      </p-nav-item>
      <p-nav-item
        attr:active="activeTab === 'apps'"
        on:click="goto('./apps.html')"
      >
        <iconify-icon slot="icon" icon="solar:widget-bold"></iconify-icon>
        <span>应用</span>
      </p-nav-item>
      <p-nav-item
        attr:active="activeTab === 'config'"
        on:click="goto('./config.html')"
      >
        <iconify-icon slot="icon" icon="solar:settings-bold"></iconify-icon>
        <span>设置</span>
      </p-nav-item>
    </p-nav-bar>
  </p-nav-layout>
  <script>
    export default () => {
      return {
        data: {
          activeTab: "start",
        },
        routerChange() {
          this.refreshActive();
        },
        ready() {
          this.refreshActive();
        },
        proto: {
          refreshActive() {
            const { current } = this.app;
            const path = new URL(current.src).pathname;
            if (path.includes("start")) {
              this.activeTab = "start";
            } else if (path.includes("apps")) {
              this.activeTab = "apps";
            } else if (path.includes("config")) {
              this.activeTab = "config";
            }
          },
        },
      };
    };
  </script>
</template>
