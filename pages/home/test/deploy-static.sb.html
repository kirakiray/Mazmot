<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>container-mgr 静态部署集成测试</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/ofajs/sibyl-test/components/sb-test.mjs"
    ></script>
  </head>
  <body>
    <h1>静态 HTML 部署集成测试</h1>
    <p>
      通过 <code>pushFilesToContainer</code> 部署一个含 <code>index.html</code>
      的应用到容器端口 40031，然后以 <code>?mode=run</code>
      加载该容器，验证部署的 <code>index.html</code>
      被浏览器执行并通过 postMessage 回发 token。
    </p>

    <sb-test name="部署 index.html 后应能通过 run 模式打开并收到脚本回执">
      <template>
        <script type="module">
          import {
            CONTAINER_PORTS,
            getContainerUrl,
            getRunUrl,
            pushFilesToContainer,
            clearContainer,
          } from "../container-mgr.js";
          {
            const port = CONTAINER_PORTS[0];
            const containerUrl = getContainerUrl(port);
            const appName = "sibyl-deploy-test";
            // 每次运行生成唯一 token，避免消息串扰
            const token = "deploy-token-" + Math.random().toString(36).slice(2);

            // 待部署的 index.html：加载后向 window.parent 报告 token
            const indexHtml = `<!doctype html>
<html>
  <head><meta charset="UTF-8"><title>deploy-test</title></head>
  <body>
    <h1 id="hello">deploy ok</h1>
    <script>
      // 部署生效标志：主动向父层广播携带 token 的消息
      try {
        window.parent.postMessage(
          { type: "deploy-test-ready", token: ${JSON.stringify(token)} },
          "*"
        );
      } catch (e) {}
    <\/script>
  </body>
</html>`;

            // 1. 先清空容器，释放可能存在的旧占用者
            await clearContainer(port);

            // 2. 部署 index.html 到容器
            const installed = await pushFilesToContainer(
              port,
              [{ path: "index.html", content: indexHtml }],
              appName,
            );

            // 3. 打开 run 模式 iframe，等待 index.html 中的脚本回发 token
            const runUrl = getRunUrl(containerUrl);
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = runUrl;
            document.body.appendChild(iframe);

            const gotToken = await new Promise((resolve) => {
              let done = false;
              const timer = setTimeout(() => {
                if (done) return;
                done = true;
                window.removeEventListener("message", onMsg);
                resolve(null);
              }, 10000);

              function onMsg(event) {
                // 只接收来自目标容器的消息
                if (event.origin !== containerUrl) return;
                const data = event.data;
                if (!data || data.type !== "deploy-test-ready") return;
                if (done) return;
                done = true;
                clearTimeout(timer);
                window.removeEventListener("message", onMsg);
                resolve(data.token);
              }
              window.addEventListener("message", onMsg);
            });

            // 4. 清理：移除 iframe 并清空容器，方便下次测试
            if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
            await clearContainer(port);

            return {
              assert: installed === true && gotToken === token,
              content: {
                port,
                runUrl,
                installed,
                expectedToken: token,
                receivedToken: gotToken,
              },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="修改 index.html 后重新部署，run 模式应加载覆盖后的最新版本">
      <template>
        <script type="module">
          import {
            CONTAINER_PORTS,
            getContainerUrl,
            getRunUrl,
            pushFilesToContainer,
            clearContainer,
          } from "../container-mgr.js";
          {
            const port = CONTAINER_PORTS[0];
            const containerUrl = getContainerUrl(port);
            const appName = "sibyl-deploy-test-overwrite";

            // 构造带 version 标记的 index.html
            function makeIndex(version, token) {
              return `<!doctype html>
<html>
  <head><meta charset="UTF-8"><title>deploy-overwrite-v${version}</title></head>
  <body>
    <h1>deploy overwrite v${version}</h1>
    <script>
      try {
        window.parent.postMessage(
          {
            type: "deploy-overwrite-ready",
            version: ${JSON.stringify(String(version))},
            token: ${JSON.stringify(token)}
          },
          "*"
        );
      } catch (e) {}
    <\/script>
  </body>
</html>`;
            }

            // 打开 run 模式 iframe，等待携带 token 的回执
            function waitForReady(expectedToken, timeoutMs = 10000) {
              const runUrl = getRunUrl(containerUrl);
              const iframe = document.createElement("iframe");
              iframe.style.display = "none";
              iframe.src = runUrl;
              document.body.appendChild(iframe);

              const cleanup = () => {
                if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
              };

              return new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                  if (done) return;
                  done = true;
                  window.removeEventListener("message", onMsg);
                  cleanup();
                  resolve(null);
                }, timeoutMs);

                function onMsg(event) {
                  if (event.origin !== containerUrl) return;
                  const data = event.data;
                  if (!data || data.type !== "deploy-overwrite-ready") return;
                  // 只接受目标 token，防止旧 iframe 残留消息串扰
                  if (data.token !== expectedToken) return;
                  if (done) return;
                  done = true;
                  clearTimeout(timer);
                  window.removeEventListener("message", onMsg);
                  cleanup();
                  resolve(data);
                }
                window.addEventListener("message", onMsg);
              });
            }

            // 0. 先清空容器，避免旧占用者残留
            await clearContainer(port);

            // 1. 首次部署 v1
            const tokenV1 = "v1-" + Math.random().toString(36).slice(2);
            const installedV1 = await pushFilesToContainer(
              port,
              [{ path: "index.html", content: makeIndex("1", tokenV1) }],
              appName,
            );
            const firstResp = await waitForReady(tokenV1);

            // 2. 修改同名 index.html 并再次部署（覆盖 v1）
            const tokenV2 = "v2-" + Math.random().toString(36).slice(2);
            const installedV2 = await pushFilesToContainer(
              port,
              [{ path: "index.html", content: makeIndex("2", tokenV2) }],
              appName,
            );
            const secondResp = await waitForReady(tokenV2);

            // 3. 清理
            await clearContainer(port);

            const firstOk =
              installedV1 === true &&
              firstResp &&
              firstResp.version === "1" &&
              firstResp.token === tokenV1;
            const secondOk =
              installedV2 === true &&
              secondResp &&
              secondResp.version === "2" &&
              secondResp.token === tokenV2;

            return {
              assert: firstOk && secondOk,
              content: {
                port,
                installedV1,
                installedV2,
                firstResp,
                secondResp,
                expected: { tokenV1, tokenV2 },
              },
            };
          }
        </script>
      </template>
    </sb-test>
  </body>
</html>
