<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>container-mgr 单元测试</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/ofajs/sibyl-test/components/sb-test.mjs"
    ></script>
  </head>
  <body>
    <h1>container-mgr 单元测试</h1>

    <!-- ================= CONTAINER_URLS ================= -->
    <sb-test name="CONTAINER_URLS 应为固定的 5 个容器地址">
      <template>
        <script type="module">
          import { CONTAINER_URLS } from "../container-mgr.js";
          {
            const expected = [
              "http://localhost:40031",
              "http://localhost:40032",
              "http://localhost:40033",
              "http://localhost:40034",
              "http://localhost:40035",
            ];
            const isSame =
              Array.isArray(CONTAINER_URLS) &&
              CONTAINER_URLS.length === expected.length &&
              CONTAINER_URLS.every((u, i) => u === expected[i]);
            return {
              assert: isSame,
              content: { CONTAINER_URLS, expected },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="CONTAINER_URLS 中每个元素应为合法且唯一的 http URL">
      <template>
        <script type="module">
          import { CONTAINER_URLS } from "../container-mgr.js";
          {
            const unique = new Set(CONTAINER_URLS);
            const allValid = CONTAINER_URLS.every((u) => {
              try {
                const parsed = new URL(u);
                return (
                  parsed.protocol === "http:" &&
                  parsed.hostname === "localhost" &&
                  !!parsed.port
                );
              } catch (e) {
                return false;
              }
            });
            return {
              assert: unique.size === CONTAINER_URLS.length && allValid,
              content: { CONTAINER_URLS },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= getRunUrl ================= -->
    <sb-test name="getRunUrl 应在 containerUrl 后拼接 /_install.html?mode=run">
      <template>
        <script type="module">
          import { getRunUrl, CONTAINER_URLS } from "../container-mgr.js";
          {
            const runUrl = getRunUrl(CONTAINER_URLS[2]);
            return {
              assert:
                runUrl === "http://localhost:40033/_install.html?mode=run",
              content: { runUrl },
            };
          }
        </script>
      </template>
    </sb-test>

    <sb-test name="getRunUrl 对每个 CONTAINER_URLS 元素都应生成对应的 run URL">
      <template>
        <script type="module">
          import { getRunUrl, CONTAINER_URLS } from "../container-mgr.js";
          {
            const allMatch = CONTAINER_URLS.every(
              (u) => getRunUrl(u) === `${u}/_install.html?mode=run`,
            );
            return {
              assert: allMatch,
              content: {
                samples: CONTAINER_URLS.map((u) => ({
                  containerUrl: u,
                  runUrl: getRunUrl(u),
                })),
              },
            };
          }
        </script>
      </template>
    </sb-test>

    <!-- ================= findTrulyAvailableUrl ================= -->
    <sb-test name="findTrulyAvailableUrl 当所有容器都被本地占用时应返回 null">
      <template>
        <script type="module">
          import {
            findTrulyAvailableUrl,
            CONTAINER_URLS,
          } from "../container-mgr.js";
          {
            // 构造所有容器均已使用的 apps，函数应在读到 localUsedUrls 全占用时
            // 不发起任何物理探测，直接返回 null
            const apps = CONTAINER_URLS.map((u, i) => ({
              name: "app-" + i,
              containerUrl: u,
            }));
            const result = await findTrulyAvailableUrl(apps);
            return {
              assert: result === null,
              content: { result, apps },
            };
          }
        </script>
      </template>
    </sb-test>
  </body>
</html>
