<template page>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <l-m
    src="https://punch-ui-v2.pages.dev/packages/navigation/nav-bar.html"
  ></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }
    .resources-container {
      position: relative;
      flex: 1;
      overflow-y: auto;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
  <link rel="stylesheet" href="./resources/app-public.css" />
  <p-nav-bar style="--label-parallel: true; padding: 24px 12px">
    <p-nav-item
      attr:active="currentTab === 'resources'"
      on:click="goto('./resources/apps.html')"
    >
      <n-icon icon="duo-icons:app" slot="icon"></n-icon>
      <span>资源</span>
    </p-nav-item>
    <p-nav-item
      attr:active="currentTab === 'capabilities'"
      on:click="goto('./resources/capabilities.html')"
    >
      <n-icon icon="tabler:bulb" slot="icon"></n-icon>
      <span>能力</span>
    </p-nav-item>
    <p-nav-item
      attr:active="currentTab === 'skills'"
      on:click="goto('./resources/skills.html')"
    >
      <n-icon icon="tabler:book" slot="icon"></n-icon>
      <span>技能</span>
    </p-nav-item>
  </p-nav-bar>
  <div class="resources-container">
    <slot></slot>
  </div>
  <script>
    export const parent = "./layout.html";

    export default async () => {
      return {
        data: {
          currentTab: "resources",
        },
        routerChange() {
          this.refreshActive();
        },
        ready() {
          this.refreshActive();
        },
        proto: {
          refreshActive() {
            const { current } = this.app;
            const path = new URL(current.src).pathname;
            if (path.includes("apps")) {
              this.currentTab = "resources";
            } else if (path.includes("capabilities")) {
              this.currentTab = "capabilities";
            } else if (path.includes("skills")) {
              this.currentTab = "skills";
            }
          },
        },
      };
    };
  </script>
</template>
