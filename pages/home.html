<template page>
  <style>

  </style>

  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />

  <l-m src="https://punch-ui-v2.pages.dev/packages/list/list.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/dialog/dialog.html"></l-m>

  <p-dialog
    sync:open="dialogOpen"
    auto-close
    style="--dialog-max-width: 800px"
    on:close-dialog="handleDialogClose"
  >
    <span slot="title">添加应用</span>
    <o-page src="./main/add-app.html" style="width: 100%;"></o-page>
  </p-dialog>

  <div class="container">
    <div class="header">
      <h2>应用列表</h2>
      <p-button color="primary" on:click="handleAdd" size="s">
        <n-icon></n-icon>
        添加应用
      </p-button>
    </div>

    <div class="list-wrapper">
      <o-if :value="appList.length > 0">
        <p-list>
          <o-fill :value="appList">
            <p-list-item
              class="app-item"
              button
              on:click="$host.handleOpen($data)"
            >
              <span slot="prefix" style="font-size: 24px">{{$data.icon}}</span>
              {{$data.name}}
              <div secondary>{{$data.desc}}</div>

              <div slot="suffix" class="item-suffix">
                <span
                  class="source-badge"
                  attr:data-source="$data.source"
                  title="应用来源"
                >
                  <o-if :value="$data.source === 'local'">
                    <iconify-icon icon="mdi:folder-outline"></iconify-icon>
                    本地目录
                  </o-if>
                  <o-if :value="$data.source === 'virtual'">
                    <iconify-icon icon="mdi:database-outline"></iconify-icon>
                    虚拟目录
                  </o-if>
                </span>

                <o-if :value="$data.opened">
                  <span class="open-badge" title="点击可切换到已打开的窗口">
                    <iconify-icon icon="mdi:circle-medium"></iconify-icon>
                    已打开
                  </span>
                </o-if>

                <p-button
                  class="icon-btn window-btn"
                  variant="text"
                  color="primary"
                  icon
                  size="s"
                  on:click="$host.handleOpenWindow($event, $data)"
                  title="在小窗口中打开（类原生应用）"
                >
                  <iconify-icon
                    icon="mdi:open-in-new"
                    style="transform: rotate(0deg)"
                  ></iconify-icon>
                </p-button>

                <p-button
                  class="icon-btn delete-btn"
                  variant="text"
                  color="error"
                  icon
                  size="s"
                  on:click="$host.handleDelete($event, $data)"
                  title="删除应用"
                >
                  <iconify-icon icon="mdi:delete-outline"></iconify-icon>
                </p-button>
              </div>
            </p-list-item>
          </o-fill>
        </p-list>
      </o-if>
      <o-if :value="appList.length === 0">
        <div class="empty">
          还没有应用，点击右上角「添加应用」开始创建吧。
        </div>
      </o-if>
    </div>
  </div>

  <script>
    import { storage } from "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js";
    import { unmount, get } from "/nos/fs/main.js";
    import {
      toast,
      confirm,
    } from "https://punch-ui-v2.pages.dev/packages/util.js";

    // 记录当前页面打开的应用窗口引用：key = app.path
    const openedWindows = new Map();
    // 通过 BroadcastChannel 探测到的存活应用路径集合（可跨主页面刷新恢复状态）
    const openedNames = new Set();

    const BROADCAST_NAME = "mazmot-app-status";
    let broadcastChannel = null;
    function getBroadcast() {
      if (broadcastChannel) return broadcastChannel;
      try {
        broadcastChannel = new BroadcastChannel(BROADCAST_NAME);
      } catch (err) {
        console.warn("当前浏览器不支持 BroadcastChannel", err);
        broadcastChannel = null;
      }
      return broadcastChannel;
    }

    async function loadApps() {
      const apps = (await storage.apps) || [];
      const results = await Promise.all(
        apps.map(async (app) => {
          let manifest = null;
          try {
            const jsonFile = await get(`${app.path}/app.json`);
            if (jsonFile) {
              manifest = await jsonFile.json();
            }
          } catch (err) {
            console.warn(`读取 ${app.path}/app.json 失败：`, err);
          }

          return {
            icon: (manifest && manifest.icon) || "📦",
            name:
              (manifest && (manifest.displayName || manifest.name)) ||
              app.name,
            desc:
              (manifest && manifest.description) ||
              app.dirName ||
              "",
            path: app.path,
            source: app.source || "local",
            _recordName: app.name,
            opened: isWindowAlive(app.path),
          };
        })
      );
      return results;
    }

    function isWindowAlive(path) {
      // 优先看本页面维护的窗口引用
      const win = openedWindows.get(path);
      if (win) {
        try {
          if (!win.closed) return true;
          openedWindows.delete(path);
        } catch (err) {
          // 跨源窗口，无法判断，交给 openedNames 兜底
        }
      }
      // 若通过 BroadcastChannel 收到过应答，则认为仍存活
      return openedNames.has(path);
    }

    export default async () => {
      const initialApps = await loadApps();

      return {
        data: {
          dialogOpen: false,
          appList: initialApps,
        },
        attached() {
          // 监听子应用的 BroadcastChannel 应答
          const bc = getBroadcast();
          if (bc) {
            this._bcHandler = (event) => {
              const msg = event && event.data;
              if (!msg || !msg.type || !msg.path) return;
              if (msg.type === "alive" || msg.type === "pong") {
                openedNames.add(msg.path);
                const target = this.appList.find((a) => a.path === msg.path);
                if (target && !target.opened) target.opened = true;
              } else if (msg.type === "bye") {
                openedNames.delete(msg.path);
                const target = this.appList.find((a) => a.path === msg.path);
                if (target && target.opened) target.opened = false;
              }
            };
            bc.addEventListener("message", this._bcHandler);
            // 初次探测：清空后广播 ping，等待存活应用应答
            openedNames.clear();
            try {
              bc.postMessage({ type: "ping" });
            } catch (e) {}
          }

          // 定时检查窗口是否被用户关闭 / 定期 ping 子应用
          this._openedTimer = setInterval(() => {
            // 每次探测前清空快照，收到 pong/alive 会重新填入
            const prev = new Set(openedNames);
            openedNames.clear();
            try {
              if (bc) bc.postMessage({ type: "ping" });
            } catch (e) {}

            // 给子应用一小段时间应答，然后同步 UI 状态
            setTimeout(() => {
              this.appList.forEach((app) => {
                const alive = isWindowAlive(app.path);
                if (app.opened !== alive) app.opened = alive;
              });
            }, 300);

            // 顺带清理已关闭的窗口引用
            openedWindows.forEach((win, path) => {
              try {
                if (win.closed) openedWindows.delete(path);
              } catch (err) {}
            });
          }, 2000);
        },
        detached() {
          if (this._openedTimer) {
            clearInterval(this._openedTimer);
            this._openedTimer = null;
          }
          if (broadcastChannel && this._bcHandler) {
            broadcastChannel.removeEventListener("message", this._bcHandler);
            this._bcHandler = null;
          }
        },
        proto: {
          handleAdd() {
            this.dialogOpen = true;
          },

          // 检查一个 app 当前是否已经有存活的窗口/标签，如果有则聚焦
          _focusIfOpened(app) {
            const win = openedWindows.get(app.path);
            if (win) {
              try {
                if (!win.closed) {
                  win.focus();
                  return true;
                }
                openedWindows.delete(app.path);
              } catch (err) {
                openedWindows.delete(app.path);
              }
            }
            return false;
          },

          _markOpened(app, win) {
            openedWindows.set(app.path, win);
            const target = this.appList.find((a) => a.path === app.path);
            if (target) target.opened = true;
          },

          // 新标签页打开
          handleOpen(app) {
            if (!app || !app.path) {
              toast({ content: "无法打开：缺少应用路径", color: "error" });
              return;
            }
            if (this._focusIfOpened(app)) return;

            const url = `/${app.path}/index.html`;
            const win = window.open(url, `mazmot-app-${app.path}`);
            if (win) this._markOpened(app, win);
          },

          // 小窗口打开（尽量像原生应用）
          handleOpenWindow(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            if (!app || !app.path) {
              toast({ content: "无法打开：缺少应用路径", color: "error" });
              return;
            }
            if (this._focusIfOpened(app)) return;

            const url = `/${app.path}/index.html`;
            // 类原生应用窗口：无地址栏/工具栏/菜单栏；居中显示
            const width = 1024;
            const height = 720;
            const left = Math.max(
              0,
              Math.round((screen.availWidth - width) / 2)
            );
            const top = Math.max(
              0,
              Math.round((screen.availHeight - height) / 2)
            );
            const features = [
              `width=${width}`,
              `height=${height}`,
              `left=${left}`,
              `top=${top}`,
              "popup=yes",
              "resizable=yes",
              "scrollbars=yes",
              "toolbar=no",
              "menubar=no",
              "location=no",
              "status=no",
              "titlebar=no",
            ].join(",");

            const win = window.open(
              url,
              `mazmot-app-${app.path}`,
              features
            );
            if (!win) {
              toast({
                content: "窗口被浏览器拦截，请允许弹出窗口",
                color: "error",
              });
              return;
            }
            this._markOpened(app, win);
          },

          async handleDialogClose() {
            this.dialogOpen = false;
            await this.refreshApps();
          },
          async refreshApps() {
            const apps = await loadApps();
            this.appList.length = 0;
            apps.forEach((app) => this.appList.push(app));
          },
          async handleDelete(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }

            const ok = await confirm({
              title: "删除应用",
              message: `确定要从列表中删除应用「${app.name}」吗？该操作只会解除挂载并从列表中移除，不会删除本地目录中的文件。`,
              yes: "删除",
              cancel: "取消",
            });
            if (!ok) return;

            try {
              // 关闭对应打开的窗口（如果存在）
              const win = openedWindows.get(app.path);
              if (win) {
                try {
                  if (!win.closed) win.close();
                } catch (e) {
                  // 无权限关闭时忽略
                }
                openedWindows.delete(app.path);
              }

              if (app.path) {
                try {
                  const mounted = await get(app.path);
                  if (mounted) {
                    await unmount(mounted);
                  }
                } catch (unmountErr) {
                  console.warn("卸载目录失败（可忽略）：", unmountErr);
                }
              }

              const apps = (await storage.apps) || [];
              const next = apps.filter(
                (a) =>
                  !(
                    a.name === (app._recordName || app.name) &&
                    a.path === app.path
                  )
              );
              await storage.setItem("apps", next);

              await this.refreshApps();
              toast({ content: "已删除", color: "success" });
            } catch (err) {
              console.error(err);
              toast({
                content: "删除失败：" + (err.message || err),
                color: "error",
              });
            }
          },
        },
        watch: {
          async dialogOpen(val) {
            if (!val) {
              await this.refreshApps();
            }
          },
        },
      };
    };
  </script>
</template>
