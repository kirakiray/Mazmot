<template page>
  <style>
    :host {
      display: block;
      height: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
    }
    .header h2 {
      margin: 0;
      font-size: 20px;
    }
    .list-wrapper {
      padding: 0 16px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      height: 100%;
    }
    .app-item:hover {
      background-color: var(--md-sys-color-on-primary);
      border-radius: 12px;
    }
    .app-item:hover div {
      color: var(--md-sys-color-on-primary-container);
    }
    .empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.7;
    }

    .item-suffix {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .open-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
    }
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
      border: 1px solid var(--md-sys-color-outline-variant);
      color: var(--md-sys-color-on-surface-variant);
      background-color: var(--md-sys-color-surface);
    }
    .source-badge[data-source="local"] {
      border-color: var(--md-sys-color-tertiary);
      color: var(--md-sys-color-tertiary);
    }
    .source-badge[data-source="virtual"] {
      border-color: var(--md-sys-color-secondary);
      color: var(--md-sys-color-secondary);
    }
    .container-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
      border: 1px solid var(--md-sys-color-primary);
      color: var(--md-sys-color-primary);
      background-color: var(--md-sys-color-primary-container);
      font-family: monospace;
    }
    .sub-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .sub-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sub-info-label {
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.7;
      min-width: 72px;
    }
    .sub-info-value {
      font-family: monospace;
      color: var(--md-sys-color-on-surface);
      word-break: break-all;
    }

    .icon-btn {
      z-index: 3;
      --icon-color: var(--md-sys-color-on-surface-variant);
    }
    .window-btn:hover {
      --icon-color: var(--md-sys-color-primary);
    }
    .delete-btn:hover {
      --icon-color: var(--md-sys-color-error);
    }
  </style>

  <link
    rel="stylesheet"
    href="https://punch-ui-v2.pages.dev/packages/css/pui-global.css"
  />

  <l-m src="https://punch-ui-v2.pages.dev/packages/list/list.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/dialog/dialog.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>

  <p-dialog
    sync:open="dialogOpen"
    auto-close
    style="--dialog-max-width: 800px"
    on:close-dialog="handleDialogClose"
  >
    <span slot="title">添加应用</span>
    <o-page src="./home/add-app.html" style="width: 100%"></o-page>
  </p-dialog>

  <div class="container">
    <div class="header">
      <h2>应用列表</h2>
      <p-button color="primary" on:click="handleAdd" size="s">
        <n-icon></n-icon>
        添加应用
      </p-button>
    </div>

    <div class="list-wrapper">
      <o-if :value="appList.length > 0">
        <p-list>
          <o-fill :value="appList">
            <p-list-item class="app-item" collapsible button>
              <span slot="prefix" style="font-size: 24px">{{$data.icon}}</span>
              {{$data.name}}
              <div secondary>{{$data.desc}}</div>

              <div slot="suffix" class="item-suffix">
                <o-if :value="$data.opened">
                  <span class="open-badge" title="点击可切换到已打开的窗口">
                    <n-icon icon="mdi:circle-medium"></n-icon>
                    已打开
                  </span>
                </o-if>

                <p-button
                  class="icon-btn tab-btn"
                  variant="text"
                  color="primary"
                  icon
                  size="s"
                  on:click="$host.handleOpenTab($event, $data)"
                  title="在新标签页中打开"
                >
                  <n-icon icon="mdi:tab-plus"></n-icon>
                </p-button>

                <p-button
                  class="icon-btn window-btn"
                  variant="text"
                  color="primary"
                  icon
                  size="s"
                  on:click="$host.handleOpenWindow($event, $data)"
                  title="在小窗口中打开（类原生应用）"
                >
                  <n-icon icon="mdi:open-in-new"></n-icon>
                </p-button>
              </div>

              <p-list slot="sublist">
                <p-list-item>
                  <div class="sub-info">
                    <div class="sub-info-row">
                      <span class="sub-info-label">应用来源：</span>
                      <span
                        class="source-badge"
                        attr:data-source="$data.source"
                        title="应用来源"
                      >
                        <o-if :value="$data.source === 'local'">
                          <n-icon icon="mdi:folder-outline"></n-icon>
                          本地目录
                        </o-if>
                        <o-if :value="$data.source === 'virtual'">
                          <n-icon icon="mdi:database-outline"></n-icon>
                          虚拟目录
                        </o-if>
                      </span>
                    </div>
                    <div class="sub-info-row">
                      <span class="sub-info-label">目录名称：</span>
                      <span class="sub-info-value">{{$data.desc}}</span>
                    </div>
                    <div class="sub-info-row">
                      <span class="sub-info-label">容器地址：</span>
                      <o-if :value="$data.containerUrl">
                        <span
                          class="container-badge"
                          title="应用运行的容器地址"
                        >
                          <n-icon icon="mdi:docker"></n-icon>
                          {{$data.containerUrl}}
                        </span>
                      </o-if>
                      <o-if :value="!$data.containerUrl">
                        <span class="sub-info-value">未分配</span>
                      </o-if>
                    </div>
                    <div class="sub-info-row">
                      <span class="sub-info-label">操作：</span>
                      <p-button
                        variant="outlined"
                        color="error"
                        size="s"
                        on:click="$host.handleDelete($event, $data)"
                      >
                        <n-icon
                          icon="mdi:delete-outline"
                          slot="prefix"
                        ></n-icon>
                        删除应用
                      </p-button>
                    </div>
                  </div>
                </p-list-item>
              </p-list>
            </p-list-item>
          </o-fill>
        </p-list>
      </o-if>
      <o-if :value="appList.length === 0">
        <div class="empty">还没有应用，点击右上角「添加应用」开始创建吧。</div>
      </o-if>
    </div>
  </div>

  <script>
    import { storage } from "https://cdn.jsdelivr.net/gh/kirakiray/ever-cache/src/main.min.js";
    import { get } from "/nos/fs/main.js";
    import {
      toast,
      confirm,
    } from "https://punch-ui-v2.pages.dev/packages/util.js";
    import {
      openedWindows,
      readOpenedFromLS,
      isWindowAlive,
      startAppStatusWatcher,
      markOpened,
      clearOpened,
      focusIfOpened,
    } from "./home/app-status.js";
    import {
      getRunUrl,
      readAppFiles,
      pushFilesToContainer,
      clearContainer,
      extractPort,
    } from "./home/container-mgr.js";

    async function loadApps() {
      const apps = (await storage.apps) || [];
      // 从 localStorage 恢复已打开路径快照
      const lsOpened = new Set(readOpenedFromLS());
      const results = await Promise.all(
        apps.map(async (app) => {
          let manifest = null;
          try {
            // 直接通过句柄获取 app.json
            const jsonFile = await app.handle.get(`app.json`);
            if (jsonFile) {
              manifest = await jsonFile.json();
            }
          } catch (err) {
            console.warn(`读取 ${app.name}/app.json 失败：`, err);
          }

          return {
            icon: (manifest && manifest.icon) || "📦",
            name:
              (manifest && (manifest.displayName || manifest.name)) || app.name,
            desc: (manifest && manifest.description) || app.dirName || "",
            handle: app.handle,
            source: app.source || "local",
            containerUrl: app.containerUrl || "",
            _recordName: app.name,
            opened: isWindowAlive(app.name) || lsOpened.has(app.name),
          };
        }),
      );
      return results;
    }

    export default async () => {
      const initialApps = await loadApps();

      return {
        data: {
          dialogOpen: false,
          appList: initialApps,
        },
        attached() {
          // 启动广播监听 + 定时探测
          this._stopWatcher = startAppStatusWatcher({
            onAlive: (name) => {
              const target = this.appList.find((a) => a._recordName === name);
              if (target && !target.opened) target.opened = true;
            },
            onBye: (name) => {
              const target = this.appList.find((a) => a._recordName === name);
              if (target && target.opened) target.opened = false;
            },
            onTick: (aliveNames) => {
              this.appList.forEach((app) => {
                const alive = aliveNames.has(app._recordName);
                if (app.opened !== alive) app.opened = alive;
              });
            },
          });
        },
        detached() {
          if (this._stopWatcher) {
            this._stopWatcher();
            this._stopWatcher = null;
          }
        },
        proto: {
          handleAdd() {
            this.dialogOpen = true;
          },

          _markOpened(app, win) {
            markOpened(app._recordName, win);
            const target = this.appList.find((a) => a._recordName === app._recordName);
            if (target) target.opened = true;
          },

          // 新标签页打开（点击按钮版本，阻止冒泡）
          handleOpenTab(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            return this.handleOpen(app);
          },

          // 新标签页打开
          async handleOpen(app) {
            if (!app || !app.handle) {
              toast({ content: "无法打开：缺少应用句柄", color: "error" });
              return;
            }
            if (focusIfOpened(app._recordName)) return;

            if (!app.containerUrl) {
              toast({ content: "该应用未分配容器", color: "error" });
              return;
            }

            // 推送最新文件到容器
            const port = extractPort(app.containerUrl);
            try {
              toast({ content: "正在推送文件到容器...", color: "primary" });
              const files = await readAppFiles(app.handle);
              await pushFilesToContainer(
                port,
                files,
                app._recordName || app.name,
              );
            } catch (err) {
              toast({
                content: "推送文件失败：" + (err.message || err),
                color: "error",
              });
              return;
            }

            // 在容器上运行应用
            const url = getRunUrl(app.containerUrl);
            const win = window.open(url, `mazmot-app-${app._recordName}`);
            if (win) this._markOpened(app, win);
          },

          // 小窗口打开（尽量像原生应用）
          async handleOpenWindow(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }
            if (!app || !app.handle) {
              toast({ content: "无法打开：缺少应用句柄", color: "error" });
              return;
            }
            if (focusIfOpened(app._recordName)) return;

            if (!app.containerUrl) {
              toast({ content: "该应用未分配容器", color: "error" });
              return;
            }

            // 推送最新文件到容器
            const port = extractPort(app.containerUrl);
            try {
              toast({ content: "正在推送文件到容器...", color: "primary" });
              const files = await readAppFiles(app.handle);
              await pushFilesToContainer(
                port,
                files,
                app._recordName || app.name,
              );
            } catch (err) {
              toast({
                content: "推送文件失败：" + (err.message || err),
                color: "error",
              });
              return;
            }

            const url = getRunUrl(app.containerUrl);
            // 类原生应用窗口：无地址栏/工具栏/菜单栏；居中显示
            const width = 1024;
            const height = 720;
            const left = Math.max(
              0,
              Math.round((screen.availWidth - width) / 2),
            );
            const top = Math.max(
              0,
              Math.round((screen.availHeight - height) / 2),
            );
            const features = [
              `width=${width}`,
              `height=${height}`,
              `left=${left}`,
              `top=${top}`,
              "popup=yes",
              "resizable=yes",
              "scrollbars=yes",
              "toolbar=no",
              "menubar=no",
              "location=no",
              "status=no",
              "titlebar=no",
            ].join(",");

            const win = window.open(url, `mazmot-app-${app._recordName}`, features);
            if (!win) {
              toast({
                content: "窗口被浏览器拦截，请允许弹出窗口",
                color: "error",
              });
              return;
            }
            this._markOpened(app, win);
          },

          async handleDialogClose() {
            this.dialogOpen = false;
            await this.refreshApps();
          },
          async refreshApps() {
            const apps = await loadApps();
            this.appList.length = 0;
            apps.forEach((app) => this.appList.push(app));
          },
          async handleDelete(event, app) {
            if (event) {
              event.stopPropagation();
              if (event.preventDefault) event.preventDefault();
            }

            const ok = await confirm({
              title: "删除应用",
              message: `确定要从列表中删除应用「${app.name}」吗？该操作会释放占用的容器（${app.containerUrl || "无"}）并从列表中移除，不会删除本地目录中的文件。`,
              yes: "删除",
              cancel: "取消",
            });
            if (!ok) return;

            try {
              // 关闭对应打开的窗口 + 清理状态
              clearOpened(app._recordName);

              // 清空容器中的文件，释放容器
              if (app.containerUrl) {
                const port = extractPort(app.containerUrl);
                if (port) {
                  try {
                    await clearContainer(port);
                  } catch (clearErr) {
                    console.warn("清空容器失败（可忽略）：", clearErr);
                  }
                }
              }

              const apps = (await storage.apps) || [];
              const next = apps.filter(
                (a) =>
                  !(
                    a.name === (app._recordName || app.name)
                  ),
              );
              await storage.setItem("apps", next);

              await this.refreshApps();
              toast({ content: "已删除", color: "success" });
            } catch (err) {
              console.error(err);
              toast({
                content: "删除失败：" + (err.message || err),
                color: "error",
              });
            }
          },
        },
        watch: {
          async dialogOpen(val) {
            if (!val) {
              await this.refreshApps();
            }
          },
        },
      };
    };
  </script>
</template>
