<template page>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/list/list.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <l-m src="./test-dialog.html"></l-m>
  <style>
    :host {
      display: block;
    }
    .cap-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 16px;
    }
    .cap-item {
      padding: 16px;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .cap-item:hover {
      background: var(--md-sys-color-surface-container-high);
    }
    .cap-item h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    .cap-item p {
      margin: 0;
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--md-sys-color-on-surface-variant);
      animation: fadeIn 0.5s ease-in-out;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .empty-text {
      font-size: 14px;
    }
    .test-badge {
      display: inline-block;
      margin-left: 8px;
      color: var(--md-sys-color-primary);
      vertical-align: middle;
    }
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
  <link rel="stylesheet" href="./app-public.css" />
  <l-m src="https://punch-ui-v2.pages.dev/packages/list/list.html"></l-m>

  <o-if :value="loading">
    <div class="empty-state">
      <n-icon class="empty-icon" icon="eos-icons:loading"></n-icon>
      <p class="empty-text">加载中...</p>
    </div>
  </o-if>
  <o-if :value="!loading">
    <p-list>
      <o-fill :value="capList">
        <p-list-item>
          <span
            slot="prefix"
            class="avatar-prefix"
            style="
              background-color: var(--md-sys-color-primary-container);
              color: var(--md-sys-color-on-primary-container);
            "
            >{{$data.name[0].toUpperCase()}}</span
          >
          <b>{{$data.name}}</b>
          <o-if :value="$data.hasTest">
            <n-icon class="test-badge" icon="fluent-mdl2:test-case"></n-icon>
          </o-if>
          <div secondary>{{$data.desc}}</div>
          <o-if :value="$data.hasTest" slot="suffix">
            <p-button
              on:click="$host.runTest($data)"
              icon
              variant="outlined"
              size="xs"
            >
              <n-icon icon="pajamas:work-item-test-case"></n-icon>
            </p-button>
          </o-if>
        </p-list-item>
      </o-fill>
    </p-list>
    <o-if :value="!capList.length">
      <div class="empty-state">
        <n-icon class="empty-icon" icon="solar:box-linear"></n-icon>
        <p class="empty-text">暂时没有能力</p>
      </div>
    </o-if>
  </o-if>
  <test-dialog :open="showDialog" :iframe-src="testDialogSrc" on:click-mask="showDialog = false"></test-dialog>
  <script>
    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");
      const yaml = await load("/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs");

      return {
        data: {
          capList: [],
          loading: true,
          testDialogSrc: "",
          showDialog: false,
        },
        proto: {
          runTest(capData) {
            const testUrl = `/$mazmot/capabilities/${capData.name}/${capData.testPath}`;
            this.testDialogSrc = testUrl;
            this.showDialog = true;
          },
          async loadData() {
            const list = [];

            try {
              const capDir = await get("mazmot/capabilities");

              if (capDir) {
                for await (const [name, handle] of capDir.entries()) {
                  if (handle.kind === "dir") {
                    const skillFile = await get(
                      `mazmot/capabilities/${name}/SKILL.md`,
                      { create: false },
                    );
                    if (skillFile) {
                      const content = await skillFile.text();
                      const yamlStr = content.match(/^---(.*?)---/s);
                      if (yamlStr) {
                        const yamlConfig = yaml.load(yamlStr[1]);
                        list.push({
                          name,
                          desc: yamlConfig.description || "",
                          hasTest: !!yamlConfig.test,
                          testPath: yamlConfig.test || "",
                        });
                      }
                    }
                  }
                }
              }
            } catch (e) {
              console.error(e);
            } finally {
              this.capList = list;
              this.loading = false;
            }
          },
        },
        attached() {
          this.loadData();
        },
      };
    };
    export const parent = "../resources.html";
  </script>
</template>
