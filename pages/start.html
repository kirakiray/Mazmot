<template page>
  <l-m src="../comps/chatbox/chatbox.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }
    m-chat-item[role="system"] {
      display: none;
    }
  </style>
  <div class="container">
    <m-chatbox>
      <o-fill :value="msgs">
        <m-chat-item attr:role="$data.role">{{$data.content}}</m-chat-item>
      </o-fill>
    </m-chatbox>
    <div style="display: flex; gap: 10px; align-items: flex-end">
      <p-input sync:value="inputMessage" style="flex: 1">
        <span slot="label">输入消息</span>
      </p-input>
      <p-button on:click="sendMsg">发送</p-button>
    </div>
  </div>
  <script type="module">
    import { saveKey, getAssistant } from "../ai/main.js";

    export default async () => {
      return {
        data: {
          msgs: [],
          inputMessage: "",
        },
        proto: {
          async sendMsg() {
            const message = this.inputMessage.trim();
            if (!message) return;

            this.msgs.push({ role: "user", content: message });
            this.inputMessage = "";

            try {
              const assistant = await getAssistant();
              if (!assistant) {
                this.msgs.push({
                  role: "assistant",
                  content: "请先在设置中配置 DeepSeek API Key",
                });
                return;
              }

              const chatMessages = this.msgs.map((m) => ({
                role: m.role,
                content: m.content,
              }));

              const response = await assistant.chat({
                messages: chatMessages,
                model: "deepseek-v4-flash",
              });
              this.msgs.push({ role: "assistant", content: response.content });
            } catch (e) {
              this.msgs.push({
                role: "assistant",
                content: "请求失败：" + e.message,
              });
            }
          },
        },
      };
    };
  </script>
</template>
