<template page>
  <l-m src="../comps/chatbox/chatbox.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
      box-sizing: border-box;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      height: 100%;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }
    m-chatbox {
      display: block;
      overflow: auto;
      flex: 1;
    }
    m-chat-item[role="system"] {
      display: none;
    }
  </style>
  <div class="container">
    <m-chatbox>
      <o-fill :value="msgs">
        <m-chat-item attr:role="$data.role">
          <div>{{$data.content}}</div>
          <o-if :value="$data.usage">
            <div style="font-size: 12px; opacity: 0.6; margin-top: 8px">
              模型: {{$data.model}} | 输入: {{$data.usage.prompt_tokens}} tokens
              | 输出: {{$data.usage.completion_tokens}} tokens
            </div>
          </o-if>
        </m-chat-item>
      </o-fill>
      <o-if :value="isLoading">
        <m-chat-item role="assistant">AI 正在思考中...</m-chat-item>
      </o-if>
    </m-chatbox>
    <div style="display: flex; gap: 10px; align-items: flex-end">
      <p-input
        sync:value="inputMessage"
        style="flex: 1"
        on:keydown="handleKeyDown"
      >
        <span slot="label">输入消息</span>
      </p-input>
      <p-button on:click="sendMsg">发送</p-button>
    </div>
  </div>
  <script type="module">
    import { saveKey, getAssistant } from "../ai/main.js";

    export default async () => {
      return {
        data: {
          msgs: [],
          inputMessage: "",
          isLoading: false,
        },
        proto: {
          handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              this.sendMsg();
            }
          },
          async sendMsg() {
            const message = this.inputMessage.trim();
            if (!message || this.isLoading) return;

            this.msgs.push({ role: "user", content: message });
            this.inputMessage = "";
            this.isLoading = true;

            try {
              const assistant = await getAssistant();
              if (!assistant) {
                this.msgs.push({
                  role: "assistant",
                  content: "请先在设置中配置 DeepSeek API Key",
                });
                return;
              }

              const chatMessages = this.msgs.map((m) => ({
                role: m.role,
                content: m.content,
              }));

              const response = await assistant.chat({
                messages: chatMessages,
                model: "deepseek-v4-flash",
              });

              this.msgs.push({
                role: "assistant",
                content: response.content,
                usage: response.usage,
                model: response.model,
              });
            } catch (e) {
              this.msgs.push({
                role: "assistant",
                content: "请求失败：" + e.message,
              });
            } finally {
              this.isLoading = false;
            }
          },
        },
      };
    };
  </script>
</template>
