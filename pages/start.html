<template page>
  <l-m src="../comps/chatbox/chatbox.html"></l-m>
  <l-m src="../comps/o-md/o-md.html"></l-m>
  <l-m src="../comps/skill-request/skill-request.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/input/input.html"></l-m>
  <l-m src="https://punch-ui-v2.pages.dev/packages/button/button.html"></l-m>
  <style>
    :host {
      display: block;
      box-sizing: border-box;
      margin: 0 auto;
      padding: 20px;
      height: 100%;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }
    m-chatbox {
      display: block;
    }
    m-chat-item[role="system"] {
      display: none;
    }
  </style>
  <div class="container">
    <div style="flex: 1; overflow: auto">
      <m-chatbox>
        <o-fill :value="msgs">
          <m-chat-item attr:role="$data.role">
            <o-if :value="$data.role !== 'system' && !$data.isResponse">
              <o-md>{{$data.content}}</o-md>
            </o-if>

            <o-if :value="$data.usage">
              <div style="font-size: 12px; opacity: 0.6; margin-top: 8px">
                模型: {{$data.model}} | 输入: {{$data.usage.prompt_tokens}}
                tokens
                <span o-if="$data.usage.prompt_cache_hit_tokens"
                  >| 缓存命中: {{$data.usage.prompt_cache_hit_tokens}}
                  tokens</span
                >
                <span o-if="$data.usage.prompt_cache_miss_tokens"
                  >| 缓存未命中: {{$data.usage.prompt_cache_miss_tokens}}
                  tokens</span
                >
                | 输出: {{$data.usage.completion_tokens}} tokens
              </div>
            </o-if>
          </m-chat-item>
        </o-fill>
        <o-if :value="isLoading">
          <m-chat-item role="assistant">AI 正在思考中...</m-chat-item>
        </o-if>
      </m-chatbox>
    </div>
    <div
      style="
        display: flex;
        gap: 10px;
        align-items: flex-end;
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
      "
    >
      <p-input
        sync:value="inputMessage"
        style="flex: 1"
        on:keydown="handleKeyDown"
      >
        <span slot="label">输入消息</span>
      </p-input>
      <p-button on:click="sendMsg">发送</p-button>
    </div>
  </div>
  <script type="module">
    import { saveKey, getAssistant } from "../ai/main.js";
    import yaml from "/npm/js-yaml@4.1.1/dist/js-yaml.min.mjs";

    export default async () => {
      return {
        data: {
          msgs: [],
          inputMessage: "",
          isLoading: false,
          systemContent: "",
        },
        ready() {
          this.attr("dialogue-host", ""); // 标记为对话主机
        },
        attached() {
          fetch("skills/main.md")
            .then((res) => res.text())
            .then((content) => {
              this.systemContent = content;
            })
            .catch((e) => {
              console.error("Failed to fetch skills/main.md:", e);
            });
        },
        proto: {
          // 响应ai的技能请求
          async responseAssistant(skillData, result) {
            const skillName = skillData.skill || skillData.name;

            const resultArr = [];
            resultArr.push({
              skill: skillName,
              id: skillData.id,
              result: result,
            });

            this.msgs.push({
              role: "user",
              content: `<skill-response>
${yaml.dump(resultArr)}</skill-response>`,
              isResponse: true,
            });

            await this.callAssistant();
          },
          handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              this.sendMsg();
            }
          },
          async callAssistant() {
            if (!this.systemContent) return;
            if (!this.msgs.some((m) => m.role === "system")) {
              this.msgs.unshift({
                role: "system",
                content: this.systemContent,
              });
            }

            this.isLoading = true;

            try {
              const assistant = await getAssistant();
              if (!assistant) {
                this.msgs.push({
                  role: "assistant",
                  content: "请先在设置中配置 DeepSeek API Key",
                });
                return;
              }

              const chatMessages = this.msgs.map((m) => ({
                role: m.role,
                content: m.content,
              }));

              const response = await assistant.chat({
                messages: chatMessages,
                model: "deepseek-v4-flash",
              });

              this.msgs.push({
                role: "assistant",
                content: response.content,
                usage: response.usage,
                model: response.model,
              });
            } catch (e) {
              this.msgs.push({
                role: "assistant",
                content: "请求失败：" + e.message,
              });
            } finally {
              this.isLoading = false;
            }
          },
          async sendMsg() {
            const message = this.inputMessage.trim();
            if (!message || this.isLoading) return;

            this.msgs.push({ role: "user", content: message });
            this.inputMessage = "";

            await this.callAssistant();
          },
        },
      };
    };
  </script>
</template>
